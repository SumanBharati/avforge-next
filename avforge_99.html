    // ─── CALCULATORS ──────────────────────────────────────────────────

    function DisplaySizingCalc() {
      // Step 1
      const [eyeLevel, setEyeLevel] = useState(48);
      const [aspectRatio, setAspectRatio] = useState(1.78);
      // Column 1 - Find Farthest Viewer
      const [c1ImageH, setC1ImageH] = useState("");
      const [c1MinElem, setC1MinElem] = useState("");
      // Column 2 - Find Min Image Height
      const [c2Farthest, setC2Farthest] = useState("");
      const [c2MinElem, setC2MinElem] = useState("");
      // Column 3 - Find Min %Element Height
      const [c3Farthest, setC3Farthest] = useState("");
      const [c3ImageH, setC3ImageH] = useState("");
      // Optional floor-to-bottom for all columns
      const [c1Floor, setC1Floor] = useState("");
      const [c2Floor, setC2Floor] = useState("");
      const [c3Floor, setC3Floor] = useState("");
      // Results storage
      const [results1, setResults1] = useState(null);
      const [results2, setResults2] = useState(null);
      const [results3, setResults3] = useState(null);

      const compute = (imageH, farthestViewer, floorToBottom, minElemH) => {
        const ar = aspectRatio || 1.78;
        const el = eyeLevel || 48;
        const w = imageH * ar;
        const diag = Math.sqrt(w * w + imageH * imageH);
        const vr = farthestViewer / imageH;
        const fb = floorToBottom || (el - imageH / 2);
        // Closest viewer: based on vertical viewing angle limit (~30 degrees max above eye level)
        // DISCAS uses: closest viewer = max(image_height * 0.87, distance where top of screen is within 35deg above eye)
        const topOfScreen = fb + imageH;
        const aboveEye = topOfScreen - el;
        const closestByAngle = aboveEye > 0 ? aboveEye / Math.tan(35 * Math.PI / 180) : imageH * 0.87;
        const closestViewer = Math.max(imageH * 0.87, closestByAngle);
        const maxCVPlane = Math.max(farthestViewer - closestViewer, 0);
        return { imageH, minElemH, farthestViewer, floorToBottom: fb, closestViewer, maxCVPlane, imageW: w, imageDiag: diag, viewingRatio: vr };
      };

      const calcCol1 = () => {
        const h = parseFloat(c1ImageH);
        if (!h || h <= 0) return;
        const pctElem = parseFloat(c1MinElem);
        let fv, pctEH;
        if (pctElem && pctElem > 0) {
          // DISCAS: VR = 2 × %Element Height
          // Farthest Viewer = Image Height × VR = Image Height × 2 × %Element Height
          fv = h * 2 * pctElem;
          pctEH = pctElem;
        } else {
          // Default: VTR=6 (Basic Decision Making) → %EH = 3
          fv = h * 6;
          pctEH = 3;
        }
        const fb = parseFloat(c1Floor) || 0;
        setResults1(compute(h, fv, fb || null, pctEH));
      };

      const calcCol2 = () => {
        const fv = parseFloat(c2Farthest);
        if (!fv || fv <= 0) return;
        const pctElem = parseFloat(c2MinElem);
        let h, minE;
        if (pctElem && pctElem > 0) {
          // DISCAS: %Element Height = Viewing Ratio / 2
          // VR = Farthest Viewer / Image Height
          // So: Image Height = Farthest Viewer / (2 × %Element Height)
          h = fv / (2 * pctElem);
          minE = pctElem;
        } else {
          // Default: VTR=6 (Basic Decision Making for 4K)
          h = fv / 6;
          minE = 3; // VR=6 → %EH = 6/2 = 3%
        }
        const fb = parseFloat(c2Floor) || 0;
        setResults2(compute(h, fv, fb || null, minE));
      };

      const calcCol3 = () => {
        const fv = parseFloat(c3Farthest);
        const h = parseFloat(c3ImageH);
        if (!fv || fv <= 0 || !h || h <= 0) return;
        // %Element Height = Viewing Ratio / 2 = (Farthest Viewer / Image Height) / 2
        const vr = fv / h;
        const pctEH = vr / 2;
        const fb = parseFloat(c3Floor) || 0;
        setResults3(compute(h, fv, fb || null, pctEH));
      };

      const reset = () => {
        setC1ImageH(""); setC1MinElem(""); setC2Farthest(""); setC2MinElem(""); setC3Farthest(""); setC3ImageH("");
        setC1Floor(""); setC2Floor(""); setC3Floor("");
        setResults1(null); setResults2(null); setResults3(null);
      };

      const presets = [
        {label:"16:9 (HD/4K)", val:1.78},
        {label:"16:10 (WUXGA)", val:1.60},
        {label:"21:9 (Ultra-Wide)", val:2.33},
        {label:"4:3 (NTSC/PAL)", val:1.33},
        {label:"2.39:1 (Anamorphic)", val:2.39},

      const cellInput = {padding:"8px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontSize:13,fontFamily:"'JetBrains Mono', monospace",outline:"none",width:"100%",boxSizing:"border-box",textAlign:"center"};

    function ThrowRatioCalc() {
      const [throwDist, setThrowDist] = useState(15);
      const [imgWidth, setImgWidth] = useState(10);
      const [ambientFl, setAmbientFl] = useState(40);
      const [screenGain, setScreenGain] = useState(1.0);
      const tr = throwDist / imgWidth;
      const screenArea = imgWidth * (imgWidth / (16/9));
      const lumens = (ambientFl * screenArea) / screenGain;
      const lensType = tr < 0.5 ? "UST" : tr < 1.0 ? "Short Throw" : tr < 2.0 ? "Standard" : "Long Throw";
      return (
        <div>
          <CalcSection title="Inputs">
            <InputField label="Throw Distance" value={throwDist} onChange={setThrowDist} unit="ft" min={1} max={200} step={0.5} />
            <InputField label="Image Width" value={imgWidth} onChange={setImgWidth} unit="ft" min={2} max={60} step={0.5} />
            <InputField label="Target Brightness" value={ambientFl} onChange={setAmbientFl} unit="fL" min={10} max={100} hint="≥40 for bright rooms" />
            <InputField label="Screen Gain" value={screenGain} onChange={setScreenGain} unit="×" min={0.5} max={3} step={0.1} />
          </CalcSection>
          <CalcSection title="Results">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <ResultCard label="Throw Ratio" value={tr.toFixed(2)} unit=":1" accent />
              <ResultCard label="Lens Type" value={lensType} unit="" />
              <ResultCard label="Required Lumens" value={Math.ceil(lumens).toLocaleString()} unit="lm" accent />
              <ResultCard label="Screen Area" value={screenArea.toFixed(1)} unit="ft²" />
            </div>
          </CalcSection>

          <div style={{padding:14,background:"rgba(30,41,59,0.4)",borderRadius:8,border:"1px solid #1e293b",fontSize:12,color:"#64748b",lineHeight:1.9}}>
            <div style={{fontWeight:600,color:"#94a3b8",marginBottom:8}}>Formulas Used</div>
            <div style={{fontFamily:"'JetBrains Mono', monospace",fontSize:11,color:"#94a3b8"}}>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Throw Ratio</span> = Throw Distance ÷ Image Width = <span style={{color:"#e2e8f0"}}>{throwDist} ÷ {imgWidth} = {tr.toFixed(2)}:1</span></div>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Screen Area</span> = Width × Height = Width × (Width ÷ Aspect) = <span style={{color:"#e2e8f0"}}>{imgWidth} × {(imgWidth/(16/9)).toFixed(2)} = {screenArea.toFixed(1)} ft²</span></div>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Required Lumens</span> = (Target Brightness × Screen Area) ÷ Screen Gain = <span style={{color:"#e2e8f0"}}>({ambientFl} × {screenArea.toFixed(1)}) ÷ {screenGain} = {Math.ceil(lumens).toLocaleString()} lm</span></div>
            </div>
            <div style={{marginTop:10,borderTop:"1px solid #1e293b",paddingTop:8,fontSize:11,color:"#475569",lineHeight:1.7}}>
              <div><span style={{color:"#94a3b8",fontWeight:600}}>Lens Classification:</span> UST {"<"} 0.5 | Short Throw 0.5–1.0 | Standard 1.0–2.0 | Long Throw {">"} 2.0</div>
              <div><span style={{color:"#94a3b8",fontWeight:600}}>Brightness Guide:</span> 20–30 fL for dark rooms | 40–60 fL for ambient light | 80+ fL for bright rooms</div>
              <div><span style={{color:"#94a3b8",fontWeight:600}}>Screen Gain:</span> 1.0 = matte white (standard) | 1.3+ = high gain | 0.8 = ALR (ambient light rejecting)</div>
            </div>
          </div>
        </div>
      );
    }

    function LEDPixelPitchCalc() {
      const [viewDist, setViewDist] = useState(6);
      const [wallW, setWallW] = useState(4.8);
      const [wallH, setWallH] = useState(2.7);
      const [useFeet, setUseFeet] = useState(false);
      const ftToM = 0.3048;
      const distM = useFeet ? viewDist * ftToM : viewDist;
      const wM = useFeet ? wallW * ftToM : wallW;
      const hM = useFeet ? wallH * ftToM : wallH;
      const recPP = distM / 2.75;
      const pitches = [0.7, 0.9, 1.2, 1.5, 1.8, 2.0, 2.5, 2.9, 3.9, 4.8];
      const bestPP = pitches.reduce((a, b) => Math.abs(b - recPP) < Math.abs(a - recPP) ? b : a);
      const hPx = Math.round((wM * 1000) / bestPP);
      const vPx = Math.round((hM * 1000) / bestPP);
      const minViewM = bestPP * 1.5;
      const u = useFeet ? "ft" : "m";
      return (
        <div>
          <CalcSection title="Inputs">
            <div style={{display:"flex",gap:4,marginBottom:12}}>
              <button onClick={()=>{if(!useFeet){setViewDist(parseFloat((viewDist/ftToM).toFixed(1)));setWallW(parseFloat((wallW/ftToM).toFixed(1)));setWallH(parseFloat((wallH/ftToM).toFixed(1)));}setUseFeet(true);}} style={{flex:1,padding:"6px",borderRadius:5,fontSize:11,fontWeight:useFeet?700:400,background:useFeet?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.4)",border:"1px solid "+(useFeet?"rgba(59,130,246,0.4)":"#1e293b"),color:useFeet?"#60a5fa":"#64748b",cursor:"pointer"}}>Feet (ft)</button>
              <button onClick={()=>{if(useFeet){setViewDist(parseFloat((viewDist*ftToM).toFixed(1)));setWallW(parseFloat((wallW*ftToM).toFixed(1)));setWallH(parseFloat((wallH*ftToM).toFixed(1)));}setUseFeet(false);}} style={{flex:1,padding:"6px",borderRadius:5,fontSize:11,fontWeight:!useFeet?700:400,background:!useFeet?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.4)",border:"1px solid "+(!useFeet?"rgba(59,130,246,0.4)":"#1e293b"),color:!useFeet?"#60a5fa":"#64748b",cursor:"pointer"}}>Meters (m)</button>
            </div>
            <InputField label="Viewing Distance" value={viewDist} onChange={setViewDist} unit={u} min={1} max={useFeet?150:50} step={0.5} />
            <InputField label="Wall Width" value={wallW} onChange={setWallW} unit={u} min={0.5} max={useFeet?100:30} step={0.1} />
            <InputField label="Wall Height" value={wallH} onChange={setWallH} unit={u} min={0.5} max={useFeet?50:15} step={0.1} />
          </CalcSection>
          <CalcSection title="Results">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <ResultCard label="Recommended Pitch" value={`P${bestPP}`} unit="mm" accent />
              <ResultCard label="Ideal Pitch" value={recPP.toFixed(2)} unit="mm" />
              <ResultCard label="Resolution" value={`${hPx}×${vPx}`} unit="px" />
              <ResultCard label="Total Pixels" value={((hPx*vPx)/1e6).toFixed(2)} unit="MP" />
              <ResultCard label="Min Viewing Dist" value={useFeet?(minViewM/ftToM).toFixed(1):minViewM.toFixed(1)} unit={u} />
              <ResultCard label="Aspect Ratio" value={(wM/hM).toFixed(2)} unit=":1" />
            </div>
          </CalcSection>

          <div style={{padding:14,background:"rgba(30,41,59,0.4)",borderRadius:8,border:"1px solid #1e293b",fontSize:12,color:"#64748b",lineHeight:1.9}}>
            <div style={{fontWeight:600,color:"#94a3b8",marginBottom:8}}>Formulas Used</div>
            <div style={{fontFamily:"'JetBrains Mono', monospace",fontSize:11,color:"#94a3b8"}}>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Ideal Pitch</span> = Viewing Distance (m) ÷ 2.75 = <span style={{color:"#e2e8f0"}}>{distM.toFixed(2)} ÷ 2.75 = {recPP.toFixed(2)} mm</span></div>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Horizontal Pixels</span> = (Wall Width (m) × 1000) ÷ Pitch = <span style={{color:"#e2e8f0"}}>({wM.toFixed(2)} × 1000) ÷ {bestPP} = {hPx} px</span></div>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Vertical Pixels</span> = (Wall Height (m) × 1000) ÷ Pitch = <span style={{color:"#e2e8f0"}}>({hM.toFixed(2)} × 1000) ÷ {bestPP} = {vPx} px</span></div>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Total Pixels</span> = H × V = <span style={{color:"#e2e8f0"}}>{hPx} × {vPx} = {(hPx*vPx).toLocaleString()} pixels</span></div>
              <div style={{marginBottom:6}}><span style={{color:"#60a5fa",fontWeight:600}}>Min Viewing Distance</span> = Pitch × 1.5 = <span style={{color:"#e2e8f0"}}>{bestPP} × 1.5 = {minViewM.toFixed(1)} m{useFeet?" ("+(minViewM/ftToM).toFixed(1)+" ft)":""}</span></div>
              <div><span style={{color:"#60a5fa",fontWeight:600}}>Aspect Ratio</span> = Width ÷ Height = <span style={{color:"#e2e8f0"}}>{wM.toFixed(2)} ÷ {hM.toFixed(2)} = {(wM/hM).toFixed(2)}:1</span></div>
            </div>
            <div style={{marginTop:10,borderTop:"1px solid #1e293b",paddingTop:8,fontSize:11,color:"#475569",lineHeight:1.7}}>
              <div><span style={{color:"#94a3b8",fontWeight:600}}>Rule of Thumb:</span> Ideal pixel pitch (mm) ≈ viewing distance (m) ÷ 2.75</div>
              <div><span style={{color:"#94a3b8",fontWeight:600}}>Standard Pitches:</span> P0.7, P0.9, P1.2, P1.5, P1.8, P2.0, P2.5, P2.9, P3.9, P4.8</div>
              <div><span style={{color:"#94a3b8",fontWeight:600}}>Min Viewing:</span> Closest distance before individual pixels become visible ≈ pitch × 1.5m</div>
            </div>
          </div>
        </div>
      );
    }

    function SpeakerCoverageCalc() {
      const [ceilingH, setCeilingH] = useState(10);
      const [earH, setEarH] = useState(4);
      const [dispersion, setDispersion] = useState(90);
      const [roomW, setRoomW] = useState(30);
      const [roomL, setRoomL] = useState(40);
      const [overlap, setOverlap] = useState(15);
      const h = ceilingH - earH;
      const epr = 2 * h * Math.tan((dispersion / 2) * Math.PI / 180);
      const effectiveDia = epr * (1 - overlap / 100);
      const spkrsW = Math.ceil(roomW / effectiveDia);
      const spkrsL = Math.ceil(roomL / effectiveDia);
      return (
        <div>
          <CalcSection title="Inputs">
            <InputField label="Ceiling Height" value={ceilingH} onChange={setCeilingH} unit="ft" min={7} max={40} />
            <InputField label="Ear Height" value={earH} onChange={setEarH} unit="ft" min={3} max={6} />
            <InputField label="Speaker Dispersion" value={dispersion} onChange={setDispersion} unit="°" min={30} max={180} />
            <InputField label="Room Width" value={roomW} onChange={setRoomW} unit="ft" min={5} max={200} />
            <InputField label="Room Length" value={roomL} onChange={setRoomL} unit="ft" min={5} max={200} />
            <InputField label="Overlap %" value={overlap} onChange={setOverlap} unit="%" min={0} max={40} />
          </CalcSection>
          <CalcSection title="Results">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <ResultCard label="Coverage Diameter" value={epr.toFixed(1)} unit="ft" accent />
              <ResultCard label="Effective Spacing" value={effectiveDia.toFixed(1)} unit="ft" />
              <ResultCard label="Speakers Wide" value={spkrsW} unit="" />
              <ResultCard label="Speakers Long" value={spkrsL} unit="" />

              <ResultCard label="Height Above Ear" value={h} unit="ft" />
            </div>
          </CalcSection>
        </div>
      );
    }

    function PAGNAGCalc() {
      const [d1, setD1] = useState(20);
      const [d0, setD0] = useState(2);
      const [d2, setD2] = useState(15);
      const [ds, setDs] = useState(10);
      const pag = 20*Math.log10(d1) - 20*Math.log10(d0) - 20*Math.log10(d2) + 20*Math.log10(ds) - 6.5;
      const nag = 20*Math.log10(d1) - 20*Math.log10(d0);
      const margin = pag - nag;
      return (
        <div>
          <CalcSection title="Distances">
            <InputField label="D1 — Source to Farthest Listener" value={d1} onChange={setD1} unit="ft" min={1} max={200} />
            <InputField label="D0 — Mic to Source" value={d0} onChange={setD0} unit="ft" min={0.5} max={50} step={0.5} />
            <InputField label="D2 — Speaker to Mic (nearest)" value={d2} onChange={setD2} unit="ft" min={1} max={100} />
            <InputField label="DS — Speaker to Farthest Listener" value={ds} onChange={setDs} unit="ft" min={1} max={200} />
          </CalcSection>
          <CalcSection title="Results">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <ResultCard label="PAG" value={pag.toFixed(1)} unit="dB" accent />
              <ResultCard label="NAG" value={nag.toFixed(1)} unit="dB" accent />
              <ResultCard label="Margin (PAG-NAG)" value={margin.toFixed(1)} unit="dB" />
            </div>
            <StatusBanner ok={margin >= 6} okText={`✓ System STABLE — ${margin.toFixed(1)}dB margin exceeds 6dB minimum`} failText={`✗ System UNSTABLE — ${margin.toFixed(1)}dB margin below 6dB minimum. Move mic closer to source or speaker farther from mic.`} />
          </CalcSection>
        </div>
      );
    }

                <input type="number" value={sp.tap} onChange={e=>updateSpeaker(i,"tap",e.target.value)} min={0} style={{padding:"6px 8px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontSize:12,textAlign:"center"}} />

    function ConduitFillCalc() {
      const [conduit, setConduit] = useState('1"');
      const [cables, setCables] = useState([{type:"Cat6A (Plenum)",qty:4},{type:"14/2 Speaker",qty:2}]);
      const cond = CONDUIT_SIZES.find(c=>c.size===conduit);
      const totalCableArea = cables.reduce((s,c)=>{const ct=CABLE_TYPES.find(t=>t.name===c.type);return s+(ct?ct.area*c.qty:0);},0);
      const totalCount = cables.reduce((s,c)=>s+c.qty,0);
      const fillPct = totalCount===1?53:totalCount===2?31:40;
      const allowable = cond?cond.area*(fillPct/100):0;
      const actualFill = cond?(totalCableArea/cond.area)*100:0;
      const jamRatio = cond?cond.id/(cables.reduce((max,c)=>{const ct=CABLE_TYPES.find(t=>t.name===c.type);return ct?Math.max(max,ct.od):max;},0)):0;
      return (
        <div>
          <CalcSection title="Conduit">
            <SelectField label="Conduit Size (EMT)" value={conduit} onChange={setConduit} options={CONDUIT_SIZES.map(c=>({value:c.size,label:`${c.size} EMT — ID ${c.id}" — ${c.area.toFixed(3)} in²`}))} />
          </CalcSection>
          <CalcSection title="Cables">
            {cables.map((c,i)=>(
              <div key={i} style={{display:"grid",gridTemplateColumns:"1fr 60px 30px",gap:6,marginBottom:8,alignItems:"center"}}>
                <select value={c.type} onChange={e=>{const n=[...cables];n[i]={...n[i],type:e.target.value};setCables(n);}} style={{padding:"6px 8px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontSize:12}}>
                  {CABLE_TYPES.map(t=><option key={t.name} value={t.name}>{t.name}</option>)}
                </select>
                <input type="number" value={c.qty} onChange={e=>{const n=[...cables];n[i]={...n[i],qty:parseInt(e.target.value)||0};setCables(n);}} min={0} style={{padding:"6px 8px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontSize:12,textAlign:"center"}} />
                <button onClick={()=>setCables(cables.filter((_,j)=>j!==i))} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:16}}>×</button>
              </div>
            ))}
            <button onClick={()=>setCables([...cables,{type:"Cat6 (Plenum)",qty:1}])} style={{background:"rgba(59,130,246,0.1)",border:"1px dashed #3b82f6",borderRadius:6,padding:"6px 12px",color:"#60a5fa",fontSize:12,cursor:"pointer",width:"100%"}}>+ Add Cable</button>
          </CalcSection>
          <CalcSection title="Results">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <ResultCard label="Actual Fill" value={actualFill.toFixed(1)} unit="%" accent />
              <ResultCard label={`NEC Max Fill (${totalCount} cable${totalCount!==1?"s":""})`} value={fillPct} unit="%" />
              <ResultCard label="Cable Area Used" value={totalCableArea.toFixed(3)} unit="in²" />
              <ResultCard label="Allowable Area" value={allowable.toFixed(3)} unit="in²" />
              <ResultCard label="Jam Ratio" value={jamRatio.toFixed(1)} unit=":1" />
              <ResultCard label="Total Cables" value={totalCount} unit="" />
            </div>
            <StatusBanner ok={actualFill<=fillPct} okText={`✓ Fill ${actualFill.toFixed(1)}% within NEC ${fillPct}% max`} failText={`✗ Fill ${actualFill.toFixed(1)}% exceeds NEC ${fillPct}% max — upsize conduit`} />
          </CalcSection>
        </div>
      );
    }

    function DanteBandwidthCalc() {
      const [channels, setChannels] = useState(64);
      const [sampleRate, setSampleRate] = useState("48000");
      const [bitDepth, setBitDepth] = useState("24");
      const [flows, setFlows] = useState(4);
      const [redundancy, setRedundancy] = useState("yes");
      const bwPerFlow = (channels*parseInt(sampleRate)*parseInt(bitDepth)*1.25)/1e6;
      const totalBw = bwPerFlow*flows;
      const withRedundancy = redundancy==="yes"?totalBw*2:totalBw;
      const gigabitUtil = (withRedundancy/1000)*100;
      return (
        <div>
          <CalcSection title="Inputs">
            <InputField label="Audio Channels" value={channels} onChange={setChannels} unit="ch" min={1} max={512} />
            <SelectField label="Sample Rate" value={sampleRate} onChange={setSampleRate} options={[{value:"44100",label:"44.1 kHz"},{value:"48000",label:"48 kHz"},{value:"96000",label:"96 kHz"}]} />
            <SelectField label="Bit Depth" value={bitDepth} onChange={setBitDepth} options={[{value:"16",label:"16-bit"},{value:"24",label:"24-bit"},{value:"32",label:"32-bit"}]} />
            <InputField label="Dante Flows" value={flows} onChange={setFlows} unit="" min={1} max={32} />
            <SelectField label="Redundant Network" value={redundancy} onChange={setRedundancy} options={[{value:"yes",label:"Yes — Primary + Secondary"},{value:"no",label:"No — Single Network"}]} />
          </CalcSection>
          <CalcSection title="Results">
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <ResultCard label="BW Per Flow" value={bwPerFlow.toFixed(2)} unit="Mbps" accent />
              <ResultCard label="Total Bandwidth" value={withRedundancy.toFixed(2)} unit="Mbps" accent />
              <ResultCard label="Gigabit Utilization" value={gigabitUtil.toFixed(1)} unit="%" />
              <ResultCard label="Recommended Link" value={gigabitUtil>70?"10G":"1G"} unit="" />
            </div>
          </CalcSection>
        </div>
      );
    }

    function RackHeatCalc() {
      const [equipment, setEquipment] = useState([{name:"Q-SYS Core 110f",watts:150},{name:"Crestron DM-NVX-DIR-160",watts:180},{name:"Network Switch (PoE)",watts:370},{name:"UPS (Online)",watts:400},{name:"Amplifier",watts:350}]);
      const totalWatts = equipment.reduce((s,e)=>s+e.watts,0);
      const btu = totalWatts*3.412;
      return (

    function ScreenSizeCalc() {
      const [arW, setArW] = useState(16);
      const [arH, setArH] = useState(9);
      const [diagIn, setDiagIn] = useState("");
      const [widthIn, setWidthIn] = useState("");
      const [heightIn, setHeightIn] = useState("");
      const [diagCm, setDiagCm] = useState("");
      const [widthCm, setWidthCm] = useState("");
      const [heightCm, setHeightCm] = useState("");

      const inToCm = (v) => (v * 2.54).toFixed(2);
      const cmToIn = (v) => (v / 2.54).toFixed(2);
      const ar = arW / arH;

      const presets = [
        { label: "4K Ultra HD (3840×2160)", w: 16, h: 9 },
        { label: "Full HD (1920×1080)", w: 16, h: 9 },
        { label: "HD-Ready (1280×720)", w: 16, h: 9 },
        { label: "WUXGA (1920×1200)", w: 16, h: 10 },
        { label: "UWQHD (3440×1440)", w: 21, h: 9 },
        { label: "Anamorphic", w: 2.39, h: 1 },
        { label: "NTSC/PAL", w: 4, h: 3 },
      ];

      const calcFromDiag = (val, unit) => {
        const inches = unit === "cm" ? parseFloat(val) / 2.54 : parseFloat(val);
        if (!inches || isNaN(inches)) return;
        const w = inches * (ar / Math.sqrt(1 + ar * ar));
        const h = w / ar;
        setDiagIn(unit === "cm" ? cmToIn(parseFloat(val)) : val);
        setDiagCm(unit === "in" ? inToCm(parseFloat(val)) : val);
        setWidthIn(w.toFixed(2)); setWidthCm(inToCm(w));
        setHeightIn(h.toFixed(2)); setHeightCm(inToCm(h));
      };

      const calcFromWidth = (val, unit) => {
        const inches = unit === "cm" ? parseFloat(val) / 2.54 : parseFloat(val);
        if (!inches || isNaN(inches)) return;
        const h = inches / ar;
        const d = Math.sqrt(inches * inches + h * h);
        setWidthIn(unit === "cm" ? cmToIn(parseFloat(val)) : val);
        setWidthCm(unit === "in" ? inToCm(parseFloat(val)) : val);
        setDiagIn(d.toFixed(2)); setDiagCm(inToCm(d));
        setHeightIn(h.toFixed(2)); setHeightCm(inToCm(h));
      };

      const calcFromHeight = (val, unit) => {
        const inches = unit === "cm" ? parseFloat(val) / 2.54 : parseFloat(val);
        if (!inches || isNaN(inches)) return;
        const w = inches * ar;
        const d = Math.sqrt(w * w + inches * inches);
        setHeightIn(unit === "cm" ? cmToIn(parseFloat(val)) : val);
        setHeightCm(unit === "in" ? inToCm(parseFloat(val)) : val);
        setDiagIn(d.toFixed(2)); setDiagCm(inToCm(d));
        setWidthIn(w.toFixed(2)); setWidthCm(inToCm(w));
      };

      const clearAll = () => { setDiagIn(""); setDiagCm(""); setWidthIn(""); setWidthCm(""); setHeightIn(""); setHeightCm(""); };

      const dimRowStyle = {display:"grid",gridTemplateColumns:"70px 1fr 30px 1fr 30px 70px",gap:6,alignItems:"center",marginBottom:10};
      const dimInputStyle = {padding:"8px 10px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:6,color:"#e2e8f0",fontSize:14,fontFamily:"'JetBrains Mono', monospace",outline:"none",width:"100%",boxSizing:"border-box"};
      const dimLabelStyle = {fontSize:12,color:"#94a3b8",textAlign:"center"};
      const calcBtnStyle = {padding:"7px 14px",background:"#2563eb",border:"none",borderRadius:6,color:"#fff",fontSize:12,fontWeight:600,cursor:"pointer",whiteSpace:"nowrap",textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center"};

      return (
        <div>
          <CalcSection title="1. Choose Aspect Ratio">

              <span style={{fontSize:16,color:"#64748b",fontWeight:600}}>:</span>
              <input type="number" value={arH} onChange={e=>{setArH(parseFloat(e.target.value)||0);clearAll();}} min={1} max={100} step={0.01} style={{width:60,padding:"6px 8px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:6,color:"#e2e8f0",fontSize:14,fontFamily:"'JetBrains Mono', monospace",outline:"none",textAlign:"center"}} />

            <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
              {presets.map((p,i)=>{
                const active = arW===p.w && arH===p.h;
                return <button key={i} onClick={()=>{setArW(p.w);setArH(p.h);clearAll();}} style={{padding:"5px 12px",borderRadius:6,fontSize:12,background:active?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.5)",border:"1px solid "+(active?"rgba(59,130,246,0.4)":"#1e293b"),color:active?"#60a5fa":"#94a3b8",cursor:"pointer"}}>{p.label} <span style={{opacity:0.5,fontFamily:"'JetBrains Mono', monospace",fontSize:10}}>[{p.w}:{p.h}]</span></button>;

              <span style={dimLabelStyle}>in</span>

            <div style={dimRowStyle}>

              <span style={dimLabelStyle}>cm</span>
              <input type="number" value={widthIn} onChange={e=>setWidthIn(e.target.value)} placeholder="—" style={dimInputStyle} onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#1e293b"} />
              <span style={dimLabelStyle}>in</span>
              <button onClick={()=>widthIn?calcFromWidth(widthIn,"in"):widthCm?calcFromWidth(widthCm,"cm"):null} style={calcBtnStyle}>Calculate</button>
            </div>

            <div style={dimRowStyle}>
              <span style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>Height</span>
              <input type="number" value={heightCm} onChange={e=>setHeightCm(e.target.value)} placeholder="—" style={dimInputStyle} onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#1e293b"} />
              <span style={dimLabelStyle}>cm</span>
              <input type="number" value={heightIn} onChange={e=>setHeightIn(e.target.value)} placeholder="—" style={dimInputStyle} onFocus={e=>e.target.style.borderColor="#3b82f6"} onBlur={e=>e.target.style.borderColor="#1e293b"} />
              <span style={dimLabelStyle}>in</span>
              <button onClick={()=>heightIn?calcFromHeight(heightIn,"in"):heightCm?calcFromHeight(heightCm,"cm"):null} style={calcBtnStyle}>Calculate</button>
            </div>

            <button onClick={clearAll} style={{marginTop:8,padding:"6px 14px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.25)",borderRadius:6,color:"#f87171",fontSize:12,cursor:"pointer"}}>Clear All</button>
          </CalcSection>

          {(diagIn && widthIn && heightIn) && (
            <CalcSection title="Summary">
              <div style={{padding:16,background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:8}}>
                <div style={{display:"grid",gridTemplateColumns:"80px 1fr 1fr",gap:8,fontSize:13}}>
                  <div style={{color:"#64748b",fontWeight:600}}></div>
                  <div style={{color:"#64748b",fontWeight:600,textAlign:"center",fontSize:11,textTransform:"uppercase"}}>Inches</div>
                  <div style={{color:"#64748b",fontWeight:600,textAlign:"center",fontSize:11,textTransform:"uppercase"}}>Centimeters</div>
                  <div style={{color:"#e2e8f0",fontWeight:500}}>Diagonal</div>
                  <div style={{color:"#60a5fa",textAlign:"center",fontFamily:"'JetBrains Mono', monospace"}}>{parseFloat(diagIn).toFixed(2)}"</div>
                  <div style={{color:"#60a5fa",textAlign:"center",fontFamily:"'JetBrains Mono', monospace"}}>{parseFloat(diagCm).toFixed(2)} cm</div>
                  <div style={{color:"#e2e8f0",fontWeight:500}}>Width</div>
                  <div style={{color:"#e2e8f0",textAlign:"center",fontFamily:"'JetBrains Mono', monospace"}}>{parseFloat(widthIn).toFixed(2)}"</div>

                  <div style={{color:"#e2e8f0",fontWeight:500}}>Height</div>

                  <div style={{color:"#e2e8f0",textAlign:"center",fontFamily:"'JetBrains Mono', monospace"}}>{parseFloat(heightCm).toFixed(2)} cm</div>

                <div style={{marginTop:12,paddingTop:10,borderTop:"1px solid rgba(59,130,246,0.15)",fontSize:12,color:"#94a3b8"}}>

    function CameraFOVCalc() {
      const [distance, setDistance] = useState(20);
      const [unit, setUnit] = useState("ft");
      const [selectedCams, setSelectedCams] = useState(["nc-12x80","nc-20x60"]);

      const CAMERAS = [
        { id:"nc-12x80", name:"Q-SYS NC-12×80", mfr:"QSC", zoom:"12× Optical", sensor:"4K", hfovWide:80, hfovZoom:7.44, mount:"Wall/Ceiling PTZ", poe:"PoE+", output:"HDMI / SDI / Q-LAN" },
        { id:"nc-20x60", name:"Q-SYS NC-20×60", mfr:"QSC", zoom:"20× Optical", sensor:"4K", hfovWide:60, hfovZoom:3.44, mount:"Wall/Ceiling PTZ", poe:"PoE+", output:"HDMI / SDI / Q-LAN" },
      ];

      const calcFOV = (hfovDeg, dist) => {
        const hRad = (hfovDeg / 2) * Math.PI / 180;
        const w = 2 * dist * Math.tan(hRad);
        // 16:9 sensor: VFOV = 2 * atan(tan(HFOV/2) * 9/16)
        const vRad = Math.atan(Math.tan(hRad) * 9 / 16);
        const h = 2 * dist * Math.tan(vRad);
        return { w: Math.round(w * 10) / 10, h: Math.round(h * 10) / 10 };
      };

      const toggleCam = (id) => {
        setSelectedCams(prev => prev.includes(id) ? prev.filter(c=>c!==id) : [...prev, id]);
      };

      const activeCams = CAMERAS.filter(c => selectedCams.includes(c.id));

      return (
        <div>
          <CalcSection title="Camera Selection">
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
              {CAMERAS.map(cam => {
                const active = selectedCams.includes(cam.id);
                return (
                  <button key={cam.id} onClick={()=>toggleCam(cam.id)} style={{padding:"8px 14px",borderRadius:8,fontSize:12,background:active?"rgba(59,130,246,0.12)":"rgba(15,23,42,0.5)",border:"1px solid "+(active?"rgba(59,130,246,0.4)":"#1e293b"),color:active?"#60a5fa":"#94a3b8",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                    <div style={{fontWeight:600,marginBottom:2}}>{cam.name}</div>
                    <div style={{fontSize:10,opacity:0.7}}>{cam.zoom} · {cam.hfovWide}° HFOV · {cam.sensor}</div>
                  </button>
                );
              })}

          </CalcSection>

          <CalcSection title="Distance from Camera to Subject">
            <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}>
              <span style={{fontSize:24,fontWeight:600,color:"#60a5fa",fontFamily:"'JetBrains Mono', monospace",minWidth:60,textAlign:"center"}}>{distance}</span>
              <div style={{flex:1}}>
                <input type="range" min={1} max={80} step={0.5} value={distance} onChange={e=>setDistance(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#3b82f6",cursor:"pointer"}} />
                <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#475569",marginTop:2}}>
                  <span>1</span><span>20</span><span>40</span><span>60</span><span>80</span>
                </div>
              </div>
              <select value={unit} onChange={e=>setUnit(e.target.value)} style={{padding:"6px 10px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:6,color:"#e2e8f0",fontSize:13}}>
                <option value="ft">feet</option>
                <option value="m">meters</option>
              </select>
            </div>
            <div style={{fontSize:12,color:"#64748b",textAlign:"center"}}>All distances in {unit === "ft" ? "feet" : "meters"}</div>
          </CalcSection>

          {activeCams.length > 0 && (
            <CalcSection title="Field of View Results">
              <div style={{display:"grid",gridTemplateColumns:activeCams.length>1?"1fr 1fr":"1fr",gap:12}}>
                {activeCams.map(cam => {
                  const wide = calcFOV(cam.hfovWide, distance);
                  const zoom = calcFOV(cam.hfovZoom, distance);
                  return (
                    <div key={cam.id} style={{background:"rgba(15,23,42,0.5)",borderRadius:10,border:"1px solid #1e293b",overflow:"hidden"}}>
                      <div style={{padding:"12px 16px",borderBottom:"1px solid #1e293b",background:"rgba(59,130,246,0.06)"}}>
                        <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",fontFamily:"'JetBrains Mono', monospace"}}>{cam.name.split(" ").pop()}</div>
                        <div style={{fontSize:10,color:"#64748b",marginTop:2}}>{cam.mfr} · {cam.zoom} · {cam.sensor} sensor</div>
                      </div>
                      <div style={{padding:"0"}}>
                        <table style={{width:"100%",borderCollapse:"collapse"}}>
                          <thead>
                            <tr>
                              <th style={{padding:"10px 14px",fontSize:10,color:"#64748b",textAlign:"left",borderBottom:"1px solid #1e293b",textTransform:"uppercase",fontWeight:600}}></th>
                              <th style={{padding:"10px 10px",fontSize:10,color:"#64748b",textAlign:"center",borderBottom:"1px solid #1e293b",textTransform:"uppercase",fontWeight:600}}>Width</th>
                              <th style={{padding:"10px 10px",fontSize:10,color:"#64748b",textAlign:"center",borderBottom:"1px solid #1e293b",textTransform:"uppercase",fontWeight:600}}>Height</th>
                            </tr>
                          </thead>
                          <tbody>
                            <tr>
                              <td style={{padding:"10px 14px",fontSize:12,color:"#94a3b8",fontWeight:500,borderBottom:"1px solid #1e293b"}}>Full Wide</td>
                              <td style={{padding:"10px 10px",fontSize:18,color:"#e2e8f0",textAlign:"center",fontFamily:"'JetBrains Mono', monospace",fontWeight:600,borderBottom:"1px solid #1e293b"}}>{wide.w.toFixed(1)}</td>

                            </tr>
                          </tbody>
                        </table>
                      </div>
                      <div style={{padding:"8px 14px",borderTop:"1px solid #1e293b",fontSize:10,color:"#475569"}}>
                        {cam.hfovWide}° wide \u2192 {cam.hfovZoom.toFixed(1)}° zoom · {cam.output}
                      </div>
                    </div>
                  );
                })}
              </div>

            </CalcSection>
          )}
        </div>
      );
    }

    // ─── UNITS CONVERTER ──────────────────────────────────────

    function UnitsConverter() {
      const categories = [
        {name:"Length",units:[
          {id:"ft",label:"Feet",toBase:0.3048},
          {id:"in",label:"Inches",toBase:0.0254},
          {id:"m",label:"Meters",toBase:1},
          {id:"cm",label:"Centimeters",toBase:0.01},
          {id:"mm",label:"Millimeters",toBase:0.001},
          {id:"yd",label:"Yards",toBase:0.9144},
        ]},
        {name:"Weight",units:[
          {id:"kg",label:"Kilograms",toBase:1},
          {id:"lb",label:"Pounds",toBase:0.453592},
          {id:"oz",label:"Ounces",toBase:0.0283495},
          {id:"g",label:"Grams",toBase:0.001},
        ]},
        {name:"Temperature",units:[
          {id:"c",label:"\u00B0C (Celsius)"},
          {id:"f",label:"\u00B0F (Fahrenheit)"},
          {id:"k",label:"K (Kelvin)"},
        ]},
        {name:"Data Rate",units:[
          {id:"bps",label:"bps",toBase:1},
          {id:"kbps",label:"Kbps",toBase:1e3},
          {id:"mbps",label:"Mbps",toBase:1e6},
          {id:"gbps",label:"Gbps",toBase:1e9},
        ]},
        {name:"Power",units:[
          {id:"w",label:"Watts",toBase:1},
          {id:"kw",label:"Kilowatts",toBase:1000},
          {id:"btu",label:"BTU/hr",toBase:0.29307107},
          {id:"hp",label:"Horsepower",toBase:745.7},
          {id:"ton",label:"Cooling Tons",toBase:3516.85},
        ]},
        {name:"Area",units:[
          {id:"sqft",label:"sq ft",toBase:0.092903},
          {id:"sqm",label:"sq m",toBase:1},
          {id:"sqin",label:"sq in",toBase:0.00064516},
          {id:"sqcm",label:"sq cm",toBase:0.0001},
        ]},
      ];

      const [activeCat, setActiveCat] = useState("Length");
      const [fromUnit, setFromUnit] = useState("ft");
      const [toUnit, setToUnit] = useState("mm");
      const [fromVal, setFromVal] = useState("1");

      const cat = categories.find(c=>c.name===activeCat);

      // Temperature special handling
      const convertTemp = (val, from, to) => {
        let c;
        if(from==="c") c=val;
        else if(from==="f") c=(val-32)*5/9;
        else c=val-273.15;
        if(to==="c") return c;
        if(to==="f") return c*9/5+32;
        return c+273.15;
      };

      const convert = (val, from, to) => {
        if(!val||isNaN(parseFloat(val))) return "";
        const v = parseFloat(val);
        if(activeCat==="Temperature") return convertTemp(v,from,to);
        const fromU = cat.units.find(u=>u.id===from);
        const toU = cat.units.find(u=>u.id===to);
        if(!fromU||!toU) return "";
        return (v * fromU.toBase) / toU.toBase;
      };

      const result = convert(fromVal, fromUnit, toUnit);
      const resultStr = result===""?"":typeof result==="number"?(Math.abs(result)<0.001||Math.abs(result)>999999?result.toExponential(4):parseFloat(result.toFixed(6)).toString()):"";

      // Quick reference conversions
      const quickRefs = activeCat==="Length" ? [
        {from:1,fu:"ft",to:"in",label:"1 ft"},
        {from:1,fu:"ft",to:"mm",label:"1 ft"},
        {from:1,fu:"in",to:"mm",label:"1 in"},
        {from:1,fu:"m",to:"ft",label:"1 m"},
        {from:1,fu:"cm",to:"in",label:"1 cm"},
      ] : activeCat==="Weight" ? [
        {from:1,fu:"kg",to:"lb",label:"1 kg"},

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6}}>
                {cat.units.filter(u=>u.id!==fromUnit).map(u=>{
                  const val = convert(fromVal, fromUnit, u.id);
                  const valStr = typeof val==="number"?(Math.abs(val)<0.001||Math.abs(val)>999999?val.toExponential(4):parseFloat(val.toFixed(6)).toString()):"";
                  return (
                    <div key={u.id} onClick={()=>setToUnit(u.id)} style={{padding:"8px 12px",background:toUnit===u.id?"rgba(34,197,94,0.08)":"rgba(15,23,42,0.3)",border:"1px solid "+(toUnit===u.id?"rgba(34,197,94,0.25)":"#1e293b"),borderRadius:6,cursor:"pointer",transition:"all 0.15s"}}>

            </CalcSection>
          )}
        </div>
      );

    function RackPlanner() {
      const rackColors = ["#3b82f6","#8b5cf6","#22c55e","#f59e0b","#ef4444","#06b6d4","#f97316","#ec4899","#64748b","#334155"];
      const [items, setItems] = useState([{name:"Patch Panel",ru:1,color:"#64748b"},{name:"NETGEAR M4250-48G4X PoE+",ru:1,color:"#3b82f6"},{name:"Q-SYS Core 110f",ru:1,color:"#8b5cf6"},{name:"Extron DTP3 CrossPoint 642",ru:2,color:"#0e7a3a"},{name:"Biamp TesiraFORTÉ AVB",ru:1,color:"#10b981"},{name:"Extron DMP 128 Plus AT",ru:1,color:"#22c55e"},{name:"Crown DCi 4|300N",ru:2,color:"#ef4444"},{name:"1RU Vent Panel",ru:1,color:"#334155"},{name:"UPS 1500VA",ru:2,color:"#06b6d4"}]);
      const [editingIdx, setEditingIdx] = useState(null);
      const [dragIdx, setDragIdx] = useState(null);
      const [dragOverIdx, setDragOverIdx] = useState(null);
      const totalRU = items.reduce((s,i)=>s+i.ru,0);
      const maxRU = 42;
      const ruH = 18; // pixels per RU — realistic narrow proportion
      const rackW = 340;

      const handleDrop = (targetIdx) => {
        if(dragIdx===null||dragIdx===targetIdx) return;
        const n=[...items]; const [moved]=n.splice(dragIdx,1); n.splice(targetIdx,0,moved);
        setItems(n); setDragIdx(null); setDragOverIdx(null);
      };

      // Calculate cumulative RU position for numbering
      let ruCounter = 0;

      return (
        <div style={{display:"flex",gap:20}}>
          {/* Left: Device Editor Panel */}
          <div style={{width:260,flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <div style={{fontSize:12,color:"#94a3b8"}}><span style={{color:totalRU>maxRU?"#f87171":"#60a5fa",fontWeight:700,fontFamily:"'JetBrains Mono', monospace",fontSize:16}}>{totalRU}</span><span style={{fontSize:11}}>/{maxRU} RU</span></div>
              <button onClick={()=>setItems([...items,{name:"New Device",ru:1,color:rackColors[items.length%rackColors.length]}])} style={{background:"rgba(59,130,246,0.1)",border:"1px dashed rgba(59,130,246,0.4)",borderRadius:6,padding:"5px 12px",color:"#60a5fa",fontSize:10,cursor:"pointer"}}>+ Add Device</button>
            </div>
            <div style={{maxHeight:500,overflowY:"auto",paddingRight:4}}>
              {items.map((item,i)=>(
                <div key={i} style={{padding:"8px 10px",marginBottom:4,background:editingIdx===i?"rgba(59,130,246,0.08)":"rgba(15,23,42,0.4)",border:"1px solid "+(editingIdx===i?"rgba(59,130,246,0.3)":"#1e293b"),borderRadius:6,borderLeft:"3px solid "+item.color,cursor:"pointer"}} onClick={()=>setEditingIdx(editingIdx===i?null:i)}>
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div style={{fontSize:11,color:"#e2e8f0",fontWeight:500,flex:1,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</div>
                    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0}}>
                      <span style={{fontSize:9,color:"#64748b",fontFamily:"'JetBrains Mono',monospace"}}>{item.ru}U</span>
                      <button onClick={(e)=>{e.stopPropagation();setItems(items.filter((_,j)=>j!==i));if(editingIdx===i)setEditingIdx(null);}} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,opacity:0.4,padding:0}}>×</button>
                    </div>
                  </div>
                  {editingIdx===i && (
                    <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:6}}>
                      <input value={item.name} onChange={e=>{const n=[...items];n[i]={...n[i],name:e.target.value};setItems(n);}} style={{padding:"4px 8px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontSize:11,outline:"none"}} />
                      <div style={{display:"flex",gap:6,alignItems:"center"}}>
                        <select value={item.ru} onChange={e=>{const n=[...items];n[i]={...n[i],ru:parseInt(e.target.value)};setItems(n);}} style={{padding:"3px 6px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontSize:11,outline:"none",cursor:"pointer"}}>
                          {[1,2,3,4,5,6,8,10,12].map(r=><option key={r} value={r}>{r} RU</option>)}
                        </select>
                        <div style={{display:"flex",gap:3}}>
                          {rackColors.map(c=>(
                            <div key={c} onClick={()=>{const n=[...items];n[i]={...n[i],color:c};setItems(n);}} style={{width:14,height:14,borderRadius:3,background:c,border:item.color===c?"2px solid #fff":"2px solid transparent",cursor:"pointer",opacity:item.color===c?1:0.5}} />
                          ))}
                        </div>
                      </div>
                      <div style={{display:"flex",gap:4}}>
                        <button disabled={i===0} onClick={(e)=>{e.stopPropagation();const n=[...items];[n[i-1],n[i]]=[n[i],n[i-1]];setItems(n);setEditingIdx(i-1);}} style={{flex:1,padding:"3px",background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:3,color:i===0?"#334155":"#60a5fa",fontSize:9,cursor:i===0?"default":"pointer"}}>▲ Move Up</button>

                      </div>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>

          {/* Right: Rack Visualization */}
          <div style={{flex:1,display:"flex",justifyContent:"center"}}>
            <div style={{position:"relative"}}>
              {/* Rack frame */}
              <div style={{width:rackW+60,background:"#0a0e18",borderRadius:6,border:"2px solid #2d3748",padding:"6px 0",boxShadow:"0 4px 20px rgba(0,0,0,0.5),inset 0 0 30px rgba(0,0,0,0.3)"}}>
                {/* Top plate */}

                <div style={{position:"relative",margin:"0 8px"}}>
                  {(()=>{
                    let y = 0;
                    const elements = [];
                    items.forEach((item,i) => {
                      const h = item.ru * ruH;
                      elements.push(
                        <div key={"item-"+i} style={{display:"flex",alignItems:"stretch",height:h,marginBottom:1}}>
                          {/* Left rail with RU numbers */}
                          <div style={{width:26,display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",background:"#111827",borderLeft:"2px solid #374151",borderRight:"1px solid #1e293b"}}>
                            {Array.from({length:item.ru},(_,r)=>(
                              <div key={r} style={{fontSize:7,color:"#475569",fontFamily:"'JetBrains Mono',monospace",lineHeight:ruH+"px",textAlign:"center"}}>{y/ruH+r+1}</div>
                            ))}
                            {/* Cage nut holes */}
                            {Array.from({length:item.ru},(_,r)=>(
                              <React.Fragment key={"h"+r}>
                              </React.Fragment>
                            ))}
