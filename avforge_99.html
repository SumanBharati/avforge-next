                      <span>Distance to Wall</span><span style={{fontFamily:"'JetBrains Mono',monospace",color:"#e2e8f0"}}>{toDisplay(tableWallDist)} {u}</span>
                    </div>
                    <input type="range" min={0.3} max={Math.max(0.5,roomL*0.6)} step={0.05} value={tableWallDist} onChange={e=>setTableWallDist(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#22c55e",height:4}} />
                  </div>
                  {/* Table info */}
                  <div style={{fontSize:8,color:"#475569",marginTop:4}}>
                    Table length: {toDisplay(tableShape==="round"?Math.max(tableWidth,tableSeats*0.3+0.6):Math.max(1.5,tableSeats*0.35))} {u} · {tableSeats} seats
                  </div>
                </div>
              )}
            </div>

            {/* Wall Selector */}
            <div style={{padding:"8px 12px",borderBottom:"1px solid #1e293b"}}>
              <div style={{fontSize:9,fontWeight:600,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>Place On Wall</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
                {[{id:"north",label:"North",sub:"(Front)"},{id:"south",label:"South",sub:"(Back)"},{id:"west",label:"West",sub:"(Left)"},{id:"east",label:"East",sub:"(Right)"}].map(w=>(
                  <button key={w.id} onClick={()=>setSelectedWall(w.id)} style={{padding:"5px 4px",borderRadius:4,fontSize:9,fontWeight:selectedWall===w.id?700:400,background:selectedWall===w.id?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.4)",border:"1px solid "+(selectedWall===w.id?"rgba(59,130,246,0.4)":"#1e293b"),color:selectedWall===w.id?"#60a5fa":"#64748b",cursor:"pointer",textAlign:"center",lineHeight:1.3}}>
                    {w.label}<br/><span style={{fontSize:7,opacity:0.7}}>{w.sub}</span>
                  </button>
                ))}
              </div>
              <div style={{fontSize:8,color:"#475569",marginTop:4}}>Wall-mounted devices will be placed on the selected wall</div>
            </div>

            {/* Device categories - sticky at top of scroll */}
            <div style={{display:"flex",flexWrap:"wrap",gap:2,padding:"6px 8px",borderBottom:"1px solid #1e293b",position:"sticky",top:0,background:"#080d17",zIndex:2}}>
              {deviceCatalog.map(c=>(
                <button key={c.cat} onClick={()=>setActiveCat(c.cat)} style={{padding:"3px 7px",borderRadius:4,fontSize:8,fontWeight:activeCat===c.cat?600:400,background:activeCat===c.cat?"rgba(59,130,246,0.15)":"transparent",border:"1px solid "+(activeCat===c.cat?"rgba(59,130,246,0.3)":"transparent"),color:activeCat===c.cat?"#60a5fa":"#64748b",cursor:"pointer"}}>{c.cat}</button>
              ))}
            </div>

            {/* Device items */}
            <div style={{padding:"6px"}}>
              {deviceCatalog.find(c=>c.cat===activeCat)?.items.map(item=>(
                <button key={item.id} onClick={()=>addDeviceToRoom(item)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 10px",background:"rgba(15,23,42,0.4)",border:"1px solid #1e293b",borderRadius:6,cursor:"pointer",marginBottom:4,textAlign:"left"}} onMouseEnter={e=>e.currentTarget.style.borderColor="#334155"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}>
                  <span style={{fontSize:16}}>{item.icon}</span>
                  <div>
                    <div style={{fontSize:11,color:"#e2e8f0",fontWeight:500}}>{item.name}</div>
                    <div style={{fontSize:9,color:"#475569"}}>{item.wall} mount · {toDisplay(item.w)}×{toDisplay(item.h)} {u}</div>
                  </div>
                </button>
              ))}
            </div>

            {/* Placed devices list - sticky at bottom of scroll */}
            {placedDevices.length>0 && (
              <div style={{borderTop:"1px solid #1e293b",padding:"8px",position:"sticky",bottom:0,background:"#080d17",zIndex:2}}>
                <div style={{fontSize:9,fontWeight:600,color:"#64748b",textTransform:"uppercase",marginBottom:4}}>Placed ({placedDevices.length})</div>
                <div style={{maxHeight:120,overflowY:"auto"}}>
                {placedDevices.map(d=>(
                  <div key={d.uid} onClick={()=>setSelectedUid(selectedUid===d.uid?null:d.uid)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"3px 6px",fontSize:10,color:selectedUid===d.uid?"#60a5fa":"#94a3b8",marginBottom:2,background:selectedUid===d.uid?"rgba(59,130,246,0.1)":"rgba(15,23,42,0.3)",border:"1px solid "+(selectedUid===d.uid?"rgba(59,130,246,0.3)":"transparent"),borderRadius:4,cursor:"pointer"}}>
                    <span style={{flex:1,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.icon} {d.name} {d.mountWall&&d.mountWall!=="floor"&&d.mountWall!=="ceiling"?<span style={{fontSize:7,opacity:0.5,textTransform:"uppercase"}}>({d.mountWall[0]})</span>:""}</span>
                    <button onClick={()=>removeDevice(d.uid)} style={{background:"none",border:"none",color:"#ef4444",cursor:"pointer",fontSize:12,opacity:0.5,padding:0}}>×</button>
                  </div>
                ))}
                </div>
              </div>
            )}

            </div>{/* end scrollable sidebar content */}
          </div>

          {/* Right: 3D Isometric View */}
          <div style={{flex:1,position:"relative",background:"#0a0f1a",overflow:"hidden"}}>
            <svg ref={svgRef} width="100%" height="100%" viewBox="0 0 600 420" style={{background:"radial-gradient(ellipse at center, #111827 0%, #0a0f1a 100%)",cursor:dragUid?"grabbing":"default"}} onMouseMove={handleSvgMouseMove} onMouseUp={handleSvgMouseUp} onMouseLeave={handleSvgMouseUp} onClick={()=>setSelectedUid(null)}>
            {viewMode==="plan" ? (
              <g>
                <defs>
                  <pattern id="carpetPlanPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
                  <rect width="8" height="8" fill="#1a2235"/>
                  <line x1="0" y1="0" x2="0" y2="8" stroke="#1f2940" strokeWidth="1"/>
                  <line x1="4" y1="0" x2="4" y2="8" stroke="#172030" strokeWidth="0.5"/>
                  <line x1="0" y1="0" x2="8" y2="0" stroke="#1f2940" strokeWidth="1"/>
                  <line x1="0" y1="4" x2="8" y2="4" stroke="#172030" strokeWidth="0.5"/>
                </pattern>
                </defs>
                {/* Plan view - top-down */}
                {/* Room outline */}
                <rect x={pX(0)} y={pY(0)} width={roomW*planScale} height={roomL*planScale} fill="url(#carpetPlanPattern)" stroke="#b0b5be" strokeWidth={2}/>
                {/* Grid */}
                {Array.from({length:Math.ceil(roomW)+1},(_,i)=>(
                  <line key={"pgw"+i} x1={pX(i)} y1={pY(0)} x2={pX(i)} y2={pY(roomL)} stroke="#1e293b" strokeWidth={0.5}/>
                ))}
                {Array.from({length:Math.ceil(roomL)+1},(_,i)=>(
                  <line key={"pgl"+i} x1={pX(0)} y1={pY(i)} x2={pX(roomW)} y2={pY(i)} stroke="#1e293b" strokeWidth={0.5}/>
                ))}
                {/* Wall labels */}
                <text x={pX(roomW/2)} y={pY(-0.15)} textAnchor="middle" fontSize={9} fill="#64748b" fontFamily="'JetBrains Mono',monospace">North Wall</text>
                <text x={pX(roomW/2)} y={pY(roomL)+16} textAnchor="middle" fontSize={9} fill="#64748b" fontFamily="'JetBrains Mono',monospace">{toDisplay(roomW)} {u}</text>
                <text x={pX(-0.2)} y={pY(roomL/2)} textAnchor="end" fontSize={9} fill="#64748b" fontFamily="'JetBrains Mono',monospace" transform={`rotate(-90,${pX(-0.2)},${pY(roomL/2)})`}>{toDisplay(roomL)} {u}</text>
                {/* Door indicator */}
                <rect x={pX(roomW)-1} y={pY(roomL*0.7)} width={3} height={roomL*0.15*planScale} fill="#475569" rx={1}/>
                <text x={pX(roomW)+10} y={pY(roomL*0.77)} fontSize={7} fill="#475569">Door</text>

                {/* Table */}
                {showTable && (()=>{
                  const tW = tableWidth;
                  const tL = tableShape==="round" ? Math.max(tW, tableSeats*0.3+0.6) : Math.max(1.5, tableSeats*0.35);
                  const cx = roomW/2, cy = tableWallDist + tL/2;
                  const hw = tW/2, hl = tL/2;
                  const seatDist = tableShape==="round" ? -0.28 : 0.35;

                  if(tableShape==="round") {
                    const r = Math.max(tW,tL)/2;
                    return (
                      <g>
                        <circle cx={pX(cx)} cy={pY(cy)} r={r*planScale} fill="#cbd5e1" fillOpacity={0.3} stroke="#94a3b8" strokeWidth={1.5}/>
                        {Array.from({length:tableSeats},(_,i)=>{
                          const a = (i/tableSeats)*Math.PI*2 - Math.PI/2;
                          const chairX = pX(cx+(r+seatDist)*Math.cos(a));
                          const chairY = pY(cy+(r+seatDist)*Math.sin(a));
                          const deg = a*180/Math.PI+90;
                          return (
                            <g key={"ps"+i} transform={`rotate(${deg},${chairX},${chairY})`}>
                              <rect x={chairX-9} y={chairY-6} width={18} height={16} rx={3} fill="#d1d5db" stroke="#b0b5be" strokeWidth={0.8}/>
                              <rect x={chairX-9} y={chairY-11.5} width={18} height={5} rx={2} fill="#9ca3af" stroke="#b0b5be" strokeWidth={0.6}/>
                            </g>
                          );
                        })}
                      </g>
                    );
                  }
                  const taperIn = tableShape==="tapered" ? tW*0.15 : 0;
                  const seatsPerSide = Math.floor(tableSeats/2);
                  const leftover = tableSeats - seatsPerSide*2;
                  return (
                    <g>
                      {/* Table shape */}
                      <polygon points={`${pX(cx-hw+taperIn)},${pY(cy-hl)} ${pX(cx+hw-taperIn)},${pY(cy-hl)} ${pX(cx+hw)},${pY(cy+hl)} ${pX(cx-hw)},${pY(cy+hl)}`} fill="#cbd5e1" fillOpacity={0.3} stroke="#94a3b8" strokeWidth={1.5}/>
                      {/* Left chairs - facing right (toward table) */}
                      {Array.from({length:seatsPerSide},(_,i)=>{
                        const t=(i+0.5)/seatsPerSide;
                        const lw=hw-taperIn+(taperIn)*t;
                        const cx2=pX(cx-lw-seatDist), cy2=pY(cy-hl+tL*t);
                        return (
                          <g key={"pcl"+i}>
                            <rect x={cx2-6} y={cy2-9} width={16} height={18} rx={3} fill="#d1d5db" stroke="#b0b5be" strokeWidth={0.8}/>
                            <rect x={cx2-11.5} y={cy2-9} width={5} height={18} rx={2} fill="#9ca3af" stroke="#b0b5be" strokeWidth={0.6}/>
                          </g>
                        );
                      })}
                      {/* Right chairs - facing left (toward table) */}
                      {Array.from({length:seatsPerSide},(_,i)=>{
                        const t=(i+0.5)/seatsPerSide;
                        const rw=hw-taperIn+(taperIn)*t;
                        const cx2=pX(cx+rw+seatDist), cy2=pY(cy-hl+tL*t);
                        return (
                          <g key={"pcr"+i}>
                            <rect x={cx2-10} y={cy2-9} width={16} height={18} rx={3} fill="#d1d5db" stroke="#b0b5be" strokeWidth={0.8}/>
                            <rect x={cx2+6.5} y={cy2-9} width={5} height={18} rx={2} fill="#9ca3af" stroke="#b0b5be" strokeWidth={0.6}/>
                          </g>
                        );
                      })}
                      {/* End chair - facing up (toward table) */}
                      {leftover>=1 && (()=>{const cx2=pX(cx),cy2=pY(cy+hl+seatDist); return (
                        <g>
                          <rect x={cx2-9} y={cy2-6} width={18} height={16} rx={3} fill="#d1d5db" stroke="#b0b5be" strokeWidth={0.8}/>
                          <rect x={cx2-9} y={cy2+10.5} width={18} height={5} rx={2} fill="#9ca3af" stroke="#b0b5be" strokeWidth={0.6}/>
                        </g>
                      );})()}
                      {/* Front chair - facing down (toward table) */}
                      {leftover>=2 && (()=>{const cx2=pX(cx),cy2=pY(cy-hl-seatDist); return (
                        <g>
                          <rect x={cx2-9} y={cy2-10} width={18} height={16} rx={3} fill="#d1d5db" stroke="#b0b5be" strokeWidth={0.8}/>
                          <rect x={cx2-9} y={cy2-15.5} width={18} height={5} rx={2} fill="#9ca3af" stroke="#b0b5be" strokeWidth={0.6}/>
                        </g>
                      );})()}
                    </g>
                  );
                })()}

                {/* Placed devices in plan view */}
                {placedDevices.map(dev=>{
                  const isSelected = selectedUid===dev.uid;
                  const isDragging = dragUid===dev.uid;
                  const dx = pX(dev.x), dy = pY(dev.y || 0.1);

                  if(dev.type==="display") {
                    const dw = dev.w*planScale;
                    const mw = dev.mountWall||"north";
                    let rx, ry, rw, rh;
                    if(mw==="north") { rx=dx-dw/2; ry=pY(0)+2; rw=dw; rh=6; }
                    else if(mw==="south") { rx=dx-dw/2; ry=pY(roomL)-8; rw=dw; rh=6; }
                    else if(mw==="west") { rx=pX(0)+2; ry=pY(dev.y)-dw/2; rw=6; rh=dw; }
                    else { rx=pX(roomW)-8; ry=pY(dev.y)-dw/2; rw=6; rh=dw; }
                    return (
                      <g key={dev.uid} className="dev-group" style={{cursor:isDragging?"grabbing":"grab"}} onMouseDown={e=>handleDeviceMouseDown(e,dev.uid)} opacity={isDragging?0.7:1}>
                        {isSelected && <rect x={rx-4} y={ry-4} width={rw+8} height={rh+8} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="3 2" rx={3}/>}
                        <rect x={rx} y={ry} width={rw} height={rh} rx={1} fill="#0a0a0a" stroke="#000000" strokeWidth={1.5}/>
                        <text x={rx+rw/2} y={ry+rh+12} textAnchor="middle" fontSize={7} fill={dev.color} fontWeight={600} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  if(dev.type==="camera") {
                    const mw = dev.mountWall||"north";
                    const isCeiling = dev.wall==="ceiling";
                    let cpx, cpy, fovPath;
                    if(isCeiling) { cpx=dx; cpy=pY(dev.y); fovPath=null; }
                    else if(mw==="north") { cpx=dx; cpy=pY(0.1); fovPath=`M${cpx} ${cpy} L${cpx-20} ${cpy+35} L${cpx+20} ${cpy+35} Z`; }
                    else if(mw==="south") { cpx=dx; cpy=pY(roomL-0.1); fovPath=`M${cpx} ${cpy} L${cpx-20} ${cpy-35} L${cpx+20} ${cpy-35} Z`; }
                    else if(mw==="west") { cpx=pX(0.1); cpy=pY(dev.y); fovPath=`M${cpx} ${cpy} L${cpx+35} ${cpy-20} L${cpx+35} ${cpy+20} Z`; }
                    else { cpx=pX(roomW-0.1); cpy=pY(dev.y); fovPath=`M${cpx} ${cpy} L${cpx-35} ${cpy-20} L${cpx-35} ${cpy+20} Z`; }
                    return (
                      <g key={dev.uid} className="dev-group" style={{cursor:isDragging?"grabbing":"grab"}} onMouseDown={e=>handleDeviceMouseDown(e,dev.uid)} opacity={isDragging?0.7:1}>
                        {isSelected && <rect x={cpx-14} y={cpy-10} width={28} height={20} rx={4} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="3 2"/>}
                        {fovPath && <path d={fovPath} fill={dev.color} opacity={0.06} stroke={dev.color} strokeWidth={0.5} strokeDasharray="2 2" strokeOpacity={0.15}/>}
                        <rect x={cpx-8} y={cpy-5} width={16} height={10} rx={2.5} fill="#111827" stroke={dev.color+"88"} strokeWidth={0.8}/>
                        <circle cx={cpx} cy={cpy-4} r={0.8} fill={dev.color}/>
                        <text x={cpx} y={cpy-14} textAnchor="middle" fontSize={7} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  if(dev.type==="mic") {
                    const mpx = dx, mpy = pY(dev.y);
                    const covR = dev.wall==="ceiling" ? roomH*0.5*planScale : 8;
                    return (
                      <g key={dev.uid} className="dev-group" style={{cursor:isDragging?"grabbing":"grab"}} onMouseDown={e=>handleDeviceMouseDown(e,dev.uid)} opacity={isDragging?0.7:1}>
                        {isSelected && <circle cx={mpx} cy={mpy} r={covR+6} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="3 2"/>}
                        {dev.wall==="ceiling" && <circle cx={mpx} cy={mpy} r={covR} fill={dev.color} opacity={0.05} stroke={dev.color} strokeWidth={0.5} strokeDasharray="3 2"/>}
                        <circle cx={mpx} cy={mpy} r={5} fill={dev.color+"33"} stroke={dev.color} strokeWidth={1.5}/>
                        <circle cx={mpx} cy={mpy} r={2} fill={dev.color}/>
                        <text x={mpx} y={mpy-10} textAnchor="middle" fontSize={7} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  if(dev.type==="speaker") {
                    const spx = dev.wall==="front"?dx:dx, spy = dev.wall==="front"?pY(0.05):pY(dev.y);
                    const isWall = dev.wall==="front";
                    return (
                      <g key={dev.uid} className="dev-group" style={{cursor:isDragging?"grabbing":"grab"}} onMouseDown={e=>handleDeviceMouseDown(e,dev.uid)} opacity={isDragging?0.7:1}>
                        {isSelected && <circle cx={spx} cy={spy} r={14} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="3 2"/>}
                        {!isWall && <circle cx={spx} cy={spy} r={roomH*0.5*planScale} fill={dev.color} opacity={0.05} stroke={dev.color} strokeWidth={0.5} strokeDasharray="3 2"/>}
                        <circle cx={spx} cy={spy} r={6} fill={dev.color+"22"} stroke={dev.color} strokeWidth={1.5}/>
                        <circle cx={spx} cy={spy} r={2.5} fill={dev.color}/>
                        <text x={spx} y={spy-10} textAnchor="middle" fontSize={7} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  if(dev.type==="control") {
                    const mw = dev.mountWall||"floor";
                    let cpx, cpy;
                    if(mw==="north") { cpx=dx; cpy=pY(0.05); }
                    else if(mw==="south") { cpx=dx; cpy=pY(roomL-0.05); }
                    else if(mw==="west") { cpx=pX(0.05); cpy=pY(dev.y); }
                    else if(mw==="east") { cpx=pX(roomW-0.05); cpy=pY(dev.y); }
                    else { cpx=dx; cpy=pY(dev.y); }
                    return (
                      <g key={dev.uid} className="dev-group" style={{cursor:isDragging?"grabbing":"grab"}} onMouseDown={e=>handleDeviceMouseDown(e,dev.uid)} opacity={isDragging?0.7:1}>
                        {isSelected && <rect x={cpx-8} y={cpy-6} width={16} height={12} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="3 2" rx={3}/>}
                        <rect x={cpx-5} y={cpy-3.5} width={10} height={7} rx={2} fill={dev.color+"33"} stroke={dev.color} strokeWidth={1}/>
                        <text x={cpx} y={cpy+14} textAnchor="middle" fontSize={7} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  return null;
                })}

              </g>
            ) : (
              <g>
              <defs>
                <linearGradient id="floorGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#2a3040" stopOpacity="0.8"/>
                  <stop offset="100%" stopColor="#1e2836" stopOpacity="0.9"/>
                </linearGradient>
                <pattern id="carpetPattern" x="0" y="0" width="6" height="6" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
                  <rect width="6" height="6" fill="#222c3a"/>
                  <line x1="0" y1="0" x2="0" y2="6" stroke="#283345" strokeWidth="0.8"/>
                  <line x1="3" y1="0" x2="3" y2="6" stroke="#1e2836" strokeWidth="0.5"/>
                  <line x1="0" y1="0" x2="6" y2="0" stroke="#283345" strokeWidth="0.8"/>
                  <line x1="0" y1="3" x2="6" y2="3" stroke="#1e2836" strokeWidth="0.5"/>
                </pattern>
                <pattern id="carpetPlanPattern" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
                  <rect width="8" height="8" fill="#1a2235"/>
                  <line x1="0" y1="0" x2="0" y2="8" stroke="#1f2940" strokeWidth="1"/>
                  <line x1="4" y1="0" x2="4" y2="8" stroke="#172030" strokeWidth="0.5"/>
                  <line x1="0" y1="0" x2="8" y2="0" stroke="#1f2940" strokeWidth="1"/>
                  <line x1="0" y1="4" x2="8" y2="4" stroke="#172030" strokeWidth="0.5"/>
                </pattern>
                <linearGradient id="backWallGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                  <stop offset="0%" stopColor="#d1d5db" stopOpacity="0.5"/>
                  <stop offset="100%" stopColor="#e5e7eb" stopOpacity="0.4"/>
                </linearGradient>
                <linearGradient id="leftWallGrad" x1="100%" y1="100%" x2="0%" y2="0%">
                  <stop offset="0%" stopColor="#c4c8cf" stopOpacity="0.45"/>
                  <stop offset="100%" stopColor="#d1d5db" stopOpacity="0.35"/>
                </linearGradient>
                <linearGradient id="tableTopGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#e2e8f0" stopOpacity="0.85"/>
                  <stop offset="50%" stopColor="#cbd5e1" stopOpacity="0.75"/>
                  <stop offset="100%" stopColor="#94a3b8" stopOpacity="0.65"/>
                </linearGradient>
                <linearGradient id="tableFrontGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                  <stop offset="0%" stopColor="#94a3b8" stopOpacity="0.5"/>
                  <stop offset="100%" stopColor="#64748b" stopOpacity="0.4"/>
                </linearGradient>
                <linearGradient id="tableSideGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#94a3b8" stopOpacity="0.4"/>
                  <stop offset="100%" stopColor="#475569" stopOpacity="0.3"/>
                </linearGradient>
                <linearGradient id="chairSeatGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stopColor="#e2e8f0" stopOpacity="0.7"/>
                  <stop offset="100%" stopColor="#94a3b8" stopOpacity="0.5"/>
                </linearGradient>
                <radialGradient id="chairBackGrad" cx="50%" cy="30%">
                  <stop offset="0%" stopColor="#cbd5e1" stopOpacity="0.7"/>
                  <stop offset="100%" stopColor="#64748b" stopOpacity="0.4"/>
                </radialGradient>
                <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feGaussianBlur in="SourceAlpha" stdDeviation="3"/>
                  <feOffset dx="2" dy="3"/>
                  <feComponentTransfer><feFuncA type="linear" slope="0.15"/></feComponentTransfer>
                  <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
                </filter>
              </defs>

              {/* Floor */}
              <polygon points={floorPts} fill="url(#carpetPattern)" stroke="#b0b5be" strokeWidth={1}/>
              <polygon points={floorPts} fill="url(#floorGrad)" stroke="none"/>
              {/* Floor grid */}
              {Array.from({length:Math.ceil(roomW)+1},(_,i)=>i).map(i=>(
                <line key={"gw"+i} x1={sX(i,0,0)} y1={sY(i,0,0)} x2={sX(i,roomL,0)} y2={sY(i,roomL,0)} stroke="#1e293b" strokeWidth={0.5} opacity={0.5}/>
              ))}
              {Array.from({length:Math.ceil(roomL)+1},(_,i)=>i).map(i=>(
                <line key={"gl"+i} x1={sX(0,i,0)} y1={sY(0,i,0)} x2={sX(roomW,i,0)} y2={sY(roomW,i,0)} stroke="#1e293b" strokeWidth={0.5} opacity={0.5}/>
              ))}

              {/* Back wall */}
              <polygon points={backWallPts} fill="url(#backWallGrad)" stroke="#b0b5be" strokeWidth={1}/>
              {/* Left wall */}
              <polygon points={leftWallPts} fill="url(#leftWallGrad)" stroke="#b0b5be" strokeWidth={1}/>

              {/* Wall-ceiling edges */}
              <line x1={sX(0,0,roomH)} y1={sY(0,0,roomH)} x2={sX(roomW,0,roomH)} y2={sY(roomW,0,roomH)} stroke="#b0b5be" strokeWidth={0.8} opacity={0.5}/>
              <line x1={sX(0,0,roomH)} y1={sY(0,0,roomH)} x2={sX(0,roomL,roomH)} y2={sY(0,roomL,roomH)} stroke="#b0b5be" strokeWidth={0.8} opacity={0.5}/>

              {/* Dimension labels */}
              <text x={sX(roomW/2,roomL+0.3,0)} y={sY(roomW/2,roomL+0.3,0)+4} textAnchor="middle" fontSize={9} fill="#64748b" fontFamily="'JetBrains Mono',monospace">{toDisplay(roomW)} {u}</text>
              <text x={sX(roomW+0.4,roomL/2,0)} y={sY(roomW+0.4,roomL/2,0)+4} textAnchor="middle" fontSize={9} fill="#64748b" fontFamily="'JetBrains Mono',monospace">{toDisplay(roomL)} {u}</text>
              <text x={sX(-0.5,0,roomH/2)} y={sY(-0.5,0,roomH/2)} textAnchor="middle" fontSize={9} fill="#64748b" fontFamily="'JetBrains Mono',monospace">{toDisplay(roomH)} {u}</text>

              {/* Table */}
              {showTable && (()=>{
                const tH = 0.76;
                const tW = tableWidth;
                const tL = tableShape==="round" ? Math.max(tW, tableSeats*0.3+0.6) : Math.max(1.5, tableSeats*0.35);
                const cx = roomW/2, cy = tableWallDist + tL/2;
                const hw = tW/2, hl = tL/2;
                const seatDist = tableShape==="round" ? -0.28 : 0.35;

                // Chair renderer - simple 4-leg chair, backDir = direction backrest faces away from table
                // backDir: "up"=backrest at -y, "down"=+y, "left"=-x, "right"=+x
                const renderChair = (sx, sy, backDir) => {
                  const legW = 0.13;
                  const seatZ = 0.45;
                  const backZ = 0.82;
                  // 4 corner positions
                  const corners = [
                    [sx-legW, sy-legW], // 0: -x,-y
                    [sx+legW, sy-legW], // 1: +x,-y
                    [sx+legW, sy+legW], // 2: +x,+y
                    [sx-legW, sy+legW], // 3: -x,+y
                  ];
                  // Which two corners get the backrest (extend higher)
                  let backCorners;
                  if(backDir==="up") backCorners=[0,1];       // backrest at -y edge
                  else if(backDir==="down") backCorners=[2,3]; // backrest at +y edge
                  else if(backDir==="left") backCorners=[0,3]; // backrest at -x edge
                  else backCorners=[1,2];                      // backrest at +x edge
                  // Seat top quad
                  const seatPts = corners.map(c=>`${sX(c[0],c[1],seatZ)},${sY(c[0],c[1],seatZ)}`).join(" ");
                  // Seat front edge (the +y edge)
                  const seatEdgePts = [
                    `${sX(corners[2][0],corners[2][1],seatZ-0.02)},${sY(corners[2][0],corners[2][1],seatZ-0.02)}`,
                    `${sX(corners[3][0],corners[3][1],seatZ-0.02)},${sY(corners[3][0],corners[3][1],seatZ-0.02)}`,
                    `${sX(corners[3][0],corners[3][1],seatZ)},${sY(corners[3][0],corners[3][1],seatZ)}`,
                    `${sX(corners[2][0],corners[2][1],seatZ)},${sY(corners[2][0],corners[2][1],seatZ)}`,
                  ].join(" ");
                  // Backrest panel between the two back corners
                  const bc0 = corners[backCorners[0]], bc1 = corners[backCorners[1]];
                  const backPts = [
                    `${sX(bc0[0],bc0[1],backZ)},${sY(bc0[0],bc0[1],backZ)}`,
                    `${sX(bc1[0],bc1[1],backZ)},${sY(bc1[0],bc1[1],backZ)}`,
                    `${sX(bc1[0],bc1[1],seatZ+0.04)},${sY(bc1[0],bc1[1],seatZ+0.04)}`,
                    `${sX(bc0[0],bc0[1],seatZ+0.04)},${sY(bc0[0],bc0[1],seatZ+0.04)}`,
                  ].join(" ");
                  return (
                    <g>
                      <ellipse cx={sX(sx,sy,0)} cy={sY(sx,sy,0)+2} rx={6} ry={3.5} fill="#000" opacity={0.07}/>
                      {/* All 4 legs - same height to seat */}
                      {corners.map((c,i)=>(
                        <line key={i} x1={sX(c[0],c[1],0)} y1={sY(c[0],c[1],0)} x2={sX(c[0],c[1],seatZ)} y2={sY(c[0],c[1],seatZ)} stroke="#d1d5db" strokeWidth={1.8} strokeLinecap="round"/>
                      ))}
                      {/* Two backrest posts from seat to back height */}
                      <line x1={sX(bc0[0],bc0[1],seatZ)} y1={sY(bc0[0],bc0[1],seatZ)} x2={sX(bc0[0],bc0[1],backZ)} y2={sY(bc0[0],bc0[1],backZ)} stroke="#d1d5db" strokeWidth={1.8} strokeLinecap="round"/>
                      <line x1={sX(bc1[0],bc1[1],seatZ)} y1={sY(bc1[0],bc1[1],seatZ)} x2={sX(bc1[0],bc1[1],backZ)} y2={sY(bc1[0],bc1[1],backZ)} stroke="#d1d5db" strokeWidth={1.8} strokeLinecap="round"/>
                      <polygon points={seatEdgePts} fill="#b0b8c4" stroke="#cbd5e1" strokeWidth={0.3}/>
                      <polygon points={seatPts} fill="#e5e7eb" stroke="#d1d5db" strokeWidth={0.8}/>
                      <polygon points={backPts} fill="#dde1e7" stroke="#cbd5e1" strokeWidth={0.6}/>
                    </g>
                  );
                };

                if(tableShape==="round") {
                  const r = Math.max(tW, tL)/2;
                  const legOff = r*0.4;
                  const legPts = [[-legOff,-legOff],[legOff,-legOff],[legOff,legOff],[-legOff,legOff]];
                  return (
                    <g>
                      {/* Floor shadow */}
                      <ellipse cx={sX(cx,cy,0)} cy={sY(cx,cy,0)+4} rx={r*32*scale} ry={r*19*scale} fill="#000" opacity={0.1}/>
                      {/* Back chairs first (behind table) */}
                      {Array.from({length:tableSeats},(_,i)=>{
                        const angle = (i/tableSeats)*Math.PI*2 - Math.PI/2;
                        const chairX = cx + (r+seatDist)*Math.cos(angle);
                        const chairY = cy + (r+seatDist)*Math.sin(angle);
                        if(chairY < cy) {
                          const dx = chairX-cx, dy = chairY-cy;
                          const dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : "up";
                          return renderChair(chairX, chairY, dir);
                        }
                        return null;
                      })}
                      {/* Table legs */}
                      {legPts.map((lp,i)=>(
                        <line key={"rl"+i} x1={sX(cx+lp[0],cy+lp[1],0.05)} y1={sY(cx+lp[0],cy+lp[1],0.05)} x2={sX(cx+lp[0]*0.6,cy+lp[1]*0.6,tH)} y2={sY(cx+lp[0]*0.6,cy+lp[1]*0.6,tH)} stroke="#94a3b8" strokeWidth={2.5} strokeLinecap="round" opacity={0.5}/>
                      ))}
                      {/* Table edge (rim) */}
                      <ellipse cx={sX(cx,cy,tH-0.02)} cy={sY(cx,cy,tH-0.02)} rx={r*31*scale} ry={r*18*scale} fill="#94a3b8" opacity={0.15} stroke="#cbd5e1" strokeWidth={0.5}/>
                      {/* Table top */}
                      <ellipse cx={sX(cx,cy,tH)} cy={sY(cx,cy,tH)} rx={r*30*scale} ry={r*17*scale} fill="url(#tableTopGrad)" stroke="#e2e8f0" strokeWidth={1}/>
                      {/* Surface highlight */}
                      <ellipse cx={sX(cx-r*0.15,cy-r*0.15,tH+0.01)} cy={sY(cx-r*0.15,cy-r*0.15,tH+0.01)} rx={r*15*scale} ry={r*9*scale} fill="#f1f5f9" opacity={0.15}/>
                      {/* Front chairs (in front of table) */}
                      {Array.from({length:tableSeats},(_,i)=>{
                        const angle = (i/tableSeats)*Math.PI*2 - Math.PI/2;
                        const chairX = cx + (r+seatDist)*Math.cos(angle);
                        const chairY = cy + (r+seatDist)*Math.sin(angle);
                        if(chairY >= cy) {
                          const dx = chairX-cx, dy = chairY-cy;
                          const dir = Math.abs(dx)>Math.abs(dy) ? (dx>0?"right":"left") : "down";
                          return renderChair(chairX, chairY, dir);
                        }
                        return null;
                      })}
                    </g>
                  );
                }

                // Rectangular / Tapered
                const taperIn = tableShape==="tapered" ? tW*0.15 : 0;
                const fhw = hw - taperIn;
                const bhw = hw;

                const topPts = [
                  `${sX(cx-fhw, cy-hl, tH)},${sY(cx-fhw, cy-hl, tH)}`,
                  `${sX(cx+fhw, cy-hl, tH)},${sY(cx+fhw, cy-hl, tH)}`,
                  `${sX(cx+bhw, cy+hl, tH)},${sY(cx+bhw, cy+hl, tH)}`,
                  `${sX(cx-bhw, cy+hl, tH)},${sY(cx-bhw, cy+hl, tH)}`,
                ].join(" ");
                const frontPts = [
                  `${sX(cx-bhw, cy+hl, tH-0.04)},${sY(cx-bhw, cy+hl, tH-0.04)}`,
                  `${sX(cx+bhw, cy+hl, tH-0.04)},${sY(cx+bhw, cy+hl, tH-0.04)}`,
                  `${sX(cx+bhw, cy+hl, tH)},${sY(cx+bhw, cy+hl, tH)}`,
                  `${sX(cx-bhw, cy+hl, tH)},${sY(cx-bhw, cy+hl, tH)}`,
                ].join(" ");
                const rightPts = [
                  `${sX(cx+fhw, cy-hl, tH-0.04)},${sY(cx+fhw, cy-hl, tH-0.04)}`,
                  `${sX(cx+bhw, cy+hl, tH-0.04)},${sY(cx+bhw, cy+hl, tH-0.04)}`,
                  `${sX(cx+bhw, cy+hl, tH)},${sY(cx+bhw, cy+hl, tH)}`,
                  `${sX(cx+fhw, cy-hl, tH)},${sY(cx+fhw, cy-hl, tH)}`,
                ].join(" ");

                const legs = [
                  [cx-fhw+0.06, cy-hl+0.06],
                  [cx+fhw-0.06, cy-hl+0.06],
                  [cx-bhw+0.06, cy+hl-0.06],
                  [cx+bhw-0.06, cy+hl-0.06],
                ];

                // Seat positions
                const seats = [];
                const seatsPerSide = Math.floor(tableSeats/2);
                const leftover = tableSeats - seatsPerSide*2;
                for(let i=0; i<seatsPerSide; i++){
                  const t = (i+0.5)/seatsPerSide;
                  const lw = fhw + (bhw-fhw)*t;
                  seats.push({x: cx-lw-seatDist, y: cy - hl + tL*t, side:"left"});
                }
                for(let i=0; i<seatsPerSide; i++){
                  const t = (i+0.5)/seatsPerSide;
                  const rw = fhw + (bhw-fhw)*t;
                  seats.push({x: cx+rw+seatDist, y: cy - hl + tL*t, side:"right"});
                }
                if(leftover>=1) seats.push({x:cx, y:cy+hl+seatDist, side:"end"});
                if(leftover>=2) seats.push({x:cx, y:cy-hl-seatDist, side:"front"});

                return (
                  <g>
                    {/* Floor shadow */}
                    <polygon points={[
                      `${sX(cx-bhw-0.1,cy-hl-0.1,0)},${sY(cx-bhw-0.1,cy-hl-0.1,0)+5}`,
                      `${sX(cx+bhw+0.1,cy-hl-0.1,0)},${sY(cx+bhw+0.1,cy-hl-0.1,0)+5}`,
                      `${sX(cx+bhw+0.1,cy+hl+0.1,0)},${sY(cx+bhw+0.1,cy+hl+0.1,0)+5}`,
                      `${sX(cx-bhw-0.1,cy+hl+0.1,0)},${sY(cx-bhw-0.1,cy+hl+0.1,0)+5}`,
                    ].join(" ")} fill="#000" opacity={0.08}/>

                    {/* Back row chairs (behind table, rendered first) */}
                    {seats.filter(s=>s.y < cy).map((s,i)=>{
                      const dir = s.side==="left"?"left":s.side==="right"?"right":"up";
                      return (<React.Fragment key={"cb"+i}>{renderChair(s.x, s.y, dir)}</React.Fragment>);
                    })}

                    {/* Table legs - cylindrical white */}
                    {legs.map((lp,i)=>(
                      <g key={"leg"+i}>
                        <line x1={sX(lp[0],lp[1],0.02)} y1={sY(lp[0],lp[1],0.02)} x2={sX(lp[0],lp[1],tH-0.02)} y2={sY(lp[0],lp[1],tH-0.02)} stroke="#cbd5e1" strokeWidth={3} strokeLinecap="round" opacity={0.6}/>
                        <line x1={sX(lp[0],lp[1],0.02)} y1={sY(lp[0],lp[1],0.02)} x2={sX(lp[0],lp[1],tH-0.02)} y2={sY(lp[0],lp[1],tH-0.02)} stroke="#e2e8f0" strokeWidth={1.5} strokeLinecap="round" opacity={0.3}/>
                      </g>
                    ))}

                    {/* Table edge (thin lip) */}
                    <polygon points={frontPts} fill="url(#tableFrontGrad)" stroke="#cbd5e1" strokeWidth={0.5}/>
                    <polygon points={rightPts} fill="url(#tableSideGrad)" stroke="#cbd5e1" strokeWidth={0.5}/>

                    {/* Table top surface */}
                    <polygon points={topPts} fill="url(#tableTopGrad)" stroke="#e2e8f0" strokeWidth={1}/>

                    {/* Surface highlight / reflection */}
                    <polygon points={[
                      `${sX(cx-fhw*0.6, cy-hl*0.7, tH+0.008)},${sY(cx-fhw*0.6, cy-hl*0.7, tH+0.008)}`,
                      `${sX(cx+fhw*0.3, cy-hl*0.5, tH+0.008)},${sY(cx+fhw*0.3, cy-hl*0.5, tH+0.008)}`,
                      `${sX(cx+bhw*0.1, cy+hl*0.2, tH+0.008)},${sY(cx+bhw*0.1, cy+hl*0.2, tH+0.008)}`,
                      `${sX(cx-bhw*0.5, cy+hl*0.1, tH+0.008)},${sY(cx-bhw*0.5, cy+hl*0.1, tH+0.008)}`,
                    ].join(" ")} fill="#f8fafc" opacity={0.12}/>

                    {/* Front row chairs and side chairs (in front of table) */}
                    {seats.filter(s=>s.y >= cy).map((s,i)=>{
                      const dir = s.side==="left"?"left":s.side==="right"?"right":"down";
                      return (<React.Fragment key={"cf"+i}>{renderChair(s.x, s.y, dir)}</React.Fragment>);
                    })}
                  </g>
                );
              })()}

              {/* Placed devices */}
              {placedDevices.map(dev => {
                const isSelected = selectedUid===dev.uid;
                const isDragging = dragUid===dev.uid;
                const wrapDevice = (inner) => (
                  <g key={dev.uid} className="dev-group" style={{cursor:isDragging?"grabbing":"grab"}} onMouseDown={(e)=>handleDeviceMouseDown(e,dev.uid)} opacity={isDragging?0.8:1}>
                    {isSelected && (()=>{
                      const px = sX(dev.x,dev.y,dev.z);
                      const py = sY(dev.x,dev.y,dev.z);
                      return <circle cx={px} cy={py} r={16} fill="none" stroke="#3b82f6" strokeWidth={1.5} strokeDasharray="3 2" opacity={0.6}/>;
                    })()}
                    {inner}
                  </g>
                );
                // All devices use isometric projection based on their wall/mount type
                if(dev.type==="display") {
                  const hw = dev.w/2, hh = dev.h/2;
                  const mw = dev.mountWall||"north";
                  let pts, innerPts, labelX, labelY;
                  if(mw==="north") {
                    pts = [`${sX(dev.x-hw,0.02,dev.z+hh)},${sY(dev.x-hw,0.02,dev.z+hh)}`,`${sX(dev.x+hw,0.02,dev.z+hh)},${sY(dev.x+hw,0.02,dev.z+hh)}`,`${sX(dev.x+hw,0.02,dev.z-hh)},${sY(dev.x+hw,0.02,dev.z-hh)}`,`${sX(dev.x-hw,0.02,dev.z-hh)},${sY(dev.x-hw,0.02,dev.z-hh)}`].join(" ");
                    innerPts = [`${sX(dev.x-hw+0.04,0.02,dev.z+hh-0.03)},${sY(dev.x-hw+0.04,0.02,dev.z+hh-0.03)}`,`${sX(dev.x+hw-0.04,0.02,dev.z+hh-0.03)},${sY(dev.x+hw-0.04,0.02,dev.z+hh-0.03)}`,`${sX(dev.x+hw-0.04,0.02,dev.z-hh+0.03)},${sY(dev.x+hw-0.04,0.02,dev.z-hh+0.03)}`,`${sX(dev.x-hw+0.04,0.02,dev.z-hh+0.03)},${sY(dev.x-hw+0.04,0.02,dev.z-hh+0.03)}`].join(" ");
                    labelX=sX(dev.x,0.02,dev.z); labelY=sY(dev.x,0.02,dev.z);
                  } else if(mw==="south") {
                    pts = [`${sX(dev.x-hw,roomL-0.02,dev.z+hh)},${sY(dev.x-hw,roomL-0.02,dev.z+hh)}`,`${sX(dev.x+hw,roomL-0.02,dev.z+hh)},${sY(dev.x+hw,roomL-0.02,dev.z+hh)}`,`${sX(dev.x+hw,roomL-0.02,dev.z-hh)},${sY(dev.x+hw,roomL-0.02,dev.z-hh)}`,`${sX(dev.x-hw,roomL-0.02,dev.z-hh)},${sY(dev.x-hw,roomL-0.02,dev.z-hh)}`].join(" ");
                    innerPts = [`${sX(dev.x-hw+0.04,roomL-0.02,dev.z+hh-0.03)},${sY(dev.x-hw+0.04,roomL-0.02,dev.z+hh-0.03)}`,`${sX(dev.x+hw-0.04,roomL-0.02,dev.z+hh-0.03)},${sY(dev.x+hw-0.04,roomL-0.02,dev.z+hh-0.03)}`,`${sX(dev.x+hw-0.04,roomL-0.02,dev.z-hh+0.03)},${sY(dev.x+hw-0.04,roomL-0.02,dev.z-hh+0.03)}`,`${sX(dev.x-hw+0.04,roomL-0.02,dev.z-hh+0.03)},${sY(dev.x-hw+0.04,roomL-0.02,dev.z-hh+0.03)}`].join(" ");
                    labelX=sX(dev.x,roomL-0.02,dev.z); labelY=sY(dev.x,roomL-0.02,dev.z);
                  } else if(mw==="west") {
                    pts = [`${sX(0.02,dev.y-hw,dev.z+hh)},${sY(0.02,dev.y-hw,dev.z+hh)}`,`${sX(0.02,dev.y+hw,dev.z+hh)},${sY(0.02,dev.y+hw,dev.z+hh)}`,`${sX(0.02,dev.y+hw,dev.z-hh)},${sY(0.02,dev.y+hw,dev.z-hh)}`,`${sX(0.02,dev.y-hw,dev.z-hh)},${sY(0.02,dev.y-hw,dev.z-hh)}`].join(" ");
                    innerPts = [`${sX(0.02,dev.y-hw+0.04,dev.z+hh-0.03)},${sY(0.02,dev.y-hw+0.04,dev.z+hh-0.03)}`,`${sX(0.02,dev.y+hw-0.04,dev.z+hh-0.03)},${sY(0.02,dev.y+hw-0.04,dev.z+hh-0.03)}`,`${sX(0.02,dev.y+hw-0.04,dev.z-hh+0.03)},${sY(0.02,dev.y+hw-0.04,dev.z-hh+0.03)}`,`${sX(0.02,dev.y-hw+0.04,dev.z-hh+0.03)},${sY(0.02,dev.y-hw+0.04,dev.z-hh+0.03)}`].join(" ");
                    labelX=sX(0.02,dev.y,dev.z); labelY=sY(0.02,dev.y,dev.z);
                  } else { // east
                    pts = [`${sX(roomW-0.02,dev.y-hw,dev.z+hh)},${sY(roomW-0.02,dev.y-hw,dev.z+hh)}`,`${sX(roomW-0.02,dev.y+hw,dev.z+hh)},${sY(roomW-0.02,dev.y+hw,dev.z+hh)}`,`${sX(roomW-0.02,dev.y+hw,dev.z-hh)},${sY(roomW-0.02,dev.y+hw,dev.z-hh)}`,`${sX(roomW-0.02,dev.y-hw,dev.z-hh)},${sY(roomW-0.02,dev.y-hw,dev.z-hh)}`].join(" ");
                    innerPts = [`${sX(roomW-0.02,dev.y-hw+0.04,dev.z+hh-0.03)},${sY(roomW-0.02,dev.y-hw+0.04,dev.z+hh-0.03)}`,`${sX(roomW-0.02,dev.y+hw-0.04,dev.z+hh-0.03)},${sY(roomW-0.02,dev.y+hw-0.04,dev.z+hh-0.03)}`,`${sX(roomW-0.02,dev.y+hw-0.04,dev.z-hh+0.03)},${sY(roomW-0.02,dev.y+hw-0.04,dev.z-hh+0.03)}`,`${sX(roomW-0.02,dev.y-hw+0.04,dev.z-hh+0.03)},${sY(roomW-0.02,dev.y-hw+0.04,dev.z-hh+0.03)}`].join(" ");
                    labelX=sX(roomW-0.02,dev.y,dev.z); labelY=sY(roomW-0.02,dev.y,dev.z);
                  }
                  return wrapDevice(
                    <g>
                      <polygon points={pts} fill="#0a0a0a" stroke="#000000" strokeWidth={2.5}/>
                      <polygon points={innerPts} fill="#050810" stroke="#1a1a1a" strokeWidth={0.5} opacity={0.95}/>
                      <text x={labelX} y={labelY+3} textAnchor="middle" fontSize={8} fill={dev.color} className="dev-label" fontFamily="'JetBrains Mono',monospace" fontWeight={600}>{dev.name}</text>
                    </g>
                  );
                }
                if(dev.type==="camera") {
                  // Camera - small device on back wall or ceiling
                  if(dev.wall==="ceiling") {
                    const px = sX(dev.x, dev.y, roomH);
                    const py = sY(dev.x, dev.y, roomH);
                    return wrapDevice(
                      <g>
                        <circle cx={px} cy={py} r={6} fill={dev.color+"33"} stroke={dev.color} strokeWidth={1.5}/>
                        <circle cx={px} cy={py} r={2.5} fill={dev.color}/>
                        <text x={px} y={py+14} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  // PTZ Camera on wall - 3D isometric, supports all walls
                  const mw = dev.mountWall||"north";
                  const camW = 0.12, camH = 0.06, camD = 0.12;
                  // Compute wall-relative coordinates
                  let wx=dev.x, wy=dev.y, wz=dev.z;
                  // Wall anchor point
                  let wallPx = sX(wx,wy,wz), wallPy = sY(wx,wy,wz);
                  // Camera body center (offset from wall into room)
                  let bx=wx, by=wy, bz=wz;
                  if(mw==="north") by=camD*0.5;
                  else if(mw==="south") by=roomL-camD*0.5;
                  else if(mw==="west") bx=camD*0.5;
                  else bx=roomW-camD*0.5;
                  const bpx = sX(bx,by,bz), bpy = sY(bx,by,bz);
                  // Body box corners depend on wall orientation
                  let bodyPts, lensPx, lensPy;
                  if(mw==="north"||mw==="south") {
                    const topP = [`${sX(bx-camW,by-0.04,bz+camH)},${sY(bx-camW,by-0.04,bz+camH)}`,`${sX(bx+camW,by-0.04,bz+camH)},${sY(bx+camW,by-0.04,bz+camH)}`,`${sX(bx+camW,by+0.04,bz+camH)},${sY(bx+camW,by+0.04,bz+camH)}`,`${sX(bx-camW,by+0.04,bz+camH)},${sY(bx-camW,by+0.04,bz+camH)}`].join(" ");
                    const fDir = mw==="north"?0.04:-0.04;
                    const frP = [`${sX(bx-camW,by+fDir,bz+camH)},${sY(bx-camW,by+fDir,bz+camH)}`,`${sX(bx+camW,by+fDir,bz+camH)},${sY(bx+camW,by+fDir,bz+camH)}`,`${sX(bx+camW,by+fDir,bz-camH)},${sY(bx+camW,by+fDir,bz-camH)}`,`${sX(bx-camW,by+fDir,bz-camH)},${sY(bx-camW,by+fDir,bz-camH)}`].join(" ");
                    const rtP = [`${sX(bx+camW,by-0.04,bz+camH)},${sY(bx+camW,by-0.04,bz+camH)}`,`${sX(bx+camW,by+0.04,bz+camH)},${sY(bx+camW,by+0.04,bz+camH)}`,`${sX(bx+camW,by+0.04,bz-camH)},${sY(bx+camW,by+0.04,bz-camH)}`,`${sX(bx+camW,by-0.04,bz-camH)},${sY(bx+camW,by-0.04,bz-camH)}`].join(" ");
                    bodyPts = {top:topP,front:frP,right:rtP};
                    lensPx = sX(bx,by+fDir+0.005,bz); lensPy = sY(bx,by+fDir+0.005,bz);
                  } else {
                    const topP = [`${sX(bx-0.04,by-camW,bz+camH)},${sY(bx-0.04,by-camW,bz+camH)}`,`${sX(bx+0.04,by-camW,bz+camH)},${sY(bx+0.04,by-camW,bz+camH)}`,`${sX(bx+0.04,by+camW,bz+camH)},${sY(bx+0.04,by+camW,bz+camH)}`,`${sX(bx-0.04,by+camW,bz+camH)},${sY(bx-0.04,by+camW,bz+camH)}`].join(" ");
                    const fDir = mw==="west"?0.04:-0.04;
                    const frP = [`${sX(bx+fDir,by-camW,bz+camH)},${sY(bx+fDir,by-camW,bz+camH)}`,`${sX(bx+fDir,by+camW,bz+camH)},${sY(bx+fDir,by+camW,bz+camH)}`,`${sX(bx+fDir,by+camW,bz-camH)},${sY(bx+fDir,by+camW,bz-camH)}`,`${sX(bx+fDir,by-camW,bz-camH)},${sY(bx+fDir,by-camW,bz-camH)}`].join(" ");
                    const rtP = [`${sX(bx-0.04,by+camW,bz+camH)},${sY(bx-0.04,by+camW,bz+camH)}`,`${sX(bx+0.04,by+camW,bz+camH)},${sY(bx+0.04,by+camW,bz+camH)}`,`${sX(bx+0.04,by+camW,bz-camH)},${sY(bx+0.04,by+camW,bz-camH)}`,`${sX(bx-0.04,by+camW,bz-camH)},${sY(bx-0.04,by+camW,bz-camH)}`].join(" ");
                    bodyPts = {top:topP,front:frP,right:rtP};
                    lensPx = sX(bx+fDir+0.005,by,bz); lensPy = sY(bx+fDir+0.005,by,bz);
                  }
                  return wrapDevice(
                    <g>
                      {/* Neck from wall */}
                      <line x1={wallPx} y1={wallPy} x2={bpx} y2={bpy} stroke="#4b5563" strokeWidth={2.5} strokeLinecap="round"/>
                      {/* Body */}
                      <polygon points={bodyPts.front} fill="#111827" stroke="#334155" strokeWidth={0.6}/>
                      <polygon points={bodyPts.right} fill="#1a2332" stroke="#334155" strokeWidth={0.5}/>
                      <polygon points={bodyPts.top} fill="#2d3748" stroke="#475569" strokeWidth={0.5}/>
                      {/* Lens */}
                      <circle cx={lensPx} cy={lensPy} r={4} fill="#0a0f1a" stroke="#475569" strokeWidth={0.8}/>
                      <circle cx={lensPx} cy={lensPy} r={2.5} fill="#111827" stroke="#334155" strokeWidth={0.5}/>
                      <circle cx={lensPx} cy={lensPy} r={1.2} fill="#1e293b"/>
                      {/* LED */}
                      <circle cx={sX(bx,by,bz+camH+0.005)} cy={sY(bx,by,bz+camH+0.005)} r={1} fill={dev.color}/>
                      <text x={bpx} y={bpy+18} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                    </g>
                  );
                }
                if(dev.type==="mic") {
                  if(dev.wall==="ceiling") {
                    const px = sX(dev.x, dev.y, roomH);
                    const py = sY(dev.x, dev.y, roomH);
                    // Ceiling mic with coverage ring on floor - isometric circles
                    const fpx = sX(dev.x, dev.y, 0);
                    const fpy = sY(dev.x, dev.y, 0);
                    const isoCirc = (r, z, n) => Array.from({length:n},(_,i)=>{
                      const a=(i/n)*Math.PI*2;
                      return `${sX(dev.x+r*Math.cos(a),dev.y+r*Math.sin(a),z)},${sY(dev.x+r*Math.cos(a),dev.y+r*Math.sin(a),z)}`;
                    }).join(" ");
                    return wrapDevice(
                      <g>
                        <line x1={px} y1={py} x2={fpx} y2={fpy} stroke={dev.color} strokeWidth={0.5} strokeDasharray="3 2" opacity={0.2}/>
                        <ellipse cx={fpx} cy={fpy} rx={roomH*12*scale} ry={roomH*7*scale} fill={dev.color} opacity={0.04} stroke={dev.color} strokeWidth={0.5} strokeDasharray="2 2" opacity={0.15}/>
                        <polygon points={isoCirc(0.18, roomH, 20)} fill={dev.color+"22"} stroke={dev.color} strokeWidth={1}/>
                        <polygon points={isoCirc(0.07, roomH+0.002, 12)} fill={dev.color}/>
                        <text x={sX(dev.x,dev.y,roomH)} y={sY(dev.x,dev.y,roomH)-12} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  // Table mic
                  const px = sX(dev.x, dev.y, dev.z);
                  const py = sY(dev.x, dev.y, dev.z);
                  return wrapDevice(
                    <g>
                      <circle cx={px} cy={py} r={4} fill={dev.color+"33"} stroke={dev.color} strokeWidth={1}/>
                      <circle cx={px} cy={py} r={1.5} fill={dev.color}/>
                      <text x={px} y={py+12} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                    </g>
                  );
                }
                if(dev.type==="speaker") {
                  const px = sX(dev.x, dev.y, dev.z);
                  const py = sY(dev.x, dev.y, dev.z);
                  if(dev.wall==="front") {
                    // Soundbar on wall - uses mountWall
                    const hw=dev.w/2;
                    const mw = dev.mountWall||"north";
                    let pts, lx, ly;
                    if(mw==="north") {
                      pts = [`${sX(dev.x-hw,0.02,dev.z+0.03)},${sY(dev.x-hw,0.02,dev.z+0.03)}`,`${sX(dev.x+hw,0.02,dev.z+0.03)},${sY(dev.x+hw,0.02,dev.z+0.03)}`,`${sX(dev.x+hw,0.02,dev.z-0.03)},${sY(dev.x+hw,0.02,dev.z-0.03)}`,`${sX(dev.x-hw,0.02,dev.z-0.03)},${sY(dev.x-hw,0.02,dev.z-0.03)}`].join(" ");
                      lx=sX(dev.x,0.02,dev.z); ly=sY(dev.x,0.02,dev.z);
                    } else if(mw==="south") {
                      pts = [`${sX(dev.x-hw,roomL-0.02,dev.z+0.03)},${sY(dev.x-hw,roomL-0.02,dev.z+0.03)}`,`${sX(dev.x+hw,roomL-0.02,dev.z+0.03)},${sY(dev.x+hw,roomL-0.02,dev.z+0.03)}`,`${sX(dev.x+hw,roomL-0.02,dev.z-0.03)},${sY(dev.x+hw,roomL-0.02,dev.z-0.03)}`,`${sX(dev.x-hw,roomL-0.02,dev.z-0.03)},${sY(dev.x-hw,roomL-0.02,dev.z-0.03)}`].join(" ");
                      lx=sX(dev.x,roomL-0.02,dev.z); ly=sY(dev.x,roomL-0.02,dev.z);
                    } else if(mw==="west") {
                      pts = [`${sX(0.02,dev.y-hw,dev.z+0.03)},${sY(0.02,dev.y-hw,dev.z+0.03)}`,`${sX(0.02,dev.y+hw,dev.z+0.03)},${sY(0.02,dev.y+hw,dev.z+0.03)}`,`${sX(0.02,dev.y+hw,dev.z-0.03)},${sY(0.02,dev.y+hw,dev.z-0.03)}`,`${sX(0.02,dev.y-hw,dev.z-0.03)},${sY(0.02,dev.y-hw,dev.z-0.03)}`].join(" ");
                      lx=sX(0.02,dev.y,dev.z); ly=sY(0.02,dev.y,dev.z);
                    } else {
                      pts = [`${sX(roomW-0.02,dev.y-hw,dev.z+0.03)},${sY(roomW-0.02,dev.y-hw,dev.z+0.03)}`,`${sX(roomW-0.02,dev.y+hw,dev.z+0.03)},${sY(roomW-0.02,dev.y+hw,dev.z+0.03)}`,`${sX(roomW-0.02,dev.y+hw,dev.z-0.03)},${sY(roomW-0.02,dev.y+hw,dev.z-0.03)}`,`${sX(roomW-0.02,dev.y-hw,dev.z-0.03)},${sY(roomW-0.02,dev.y-hw,dev.z-0.03)}`].join(" ");
                      lx=sX(roomW-0.02,dev.y,dev.z); ly=sY(roomW-0.02,dev.y,dev.z);
                    }
                    return wrapDevice(
                      <g>
                        <polygon points={pts} fill={dev.color+"33"} stroke={dev.color} strokeWidth={1}/>
                        <text x={lx} y={ly+14} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  // Ceiling speaker - isometric circles like mic
                  const isoCircS = (r, z, n) => Array.from({length:n},(_,i)=>{
                    const a=(i/n)*Math.PI*2;
                    return `${sX(dev.x+r*Math.cos(a),dev.y+r*Math.sin(a),z)},${sY(dev.x+r*Math.cos(a),dev.y+r*Math.sin(a),z)}`;
                  }).join(" ");
                  const spx = sX(dev.x, dev.y, roomH);
                  const spy = sY(dev.x, dev.y, roomH);
                  const sfpx = sX(dev.x, dev.y, 0);
                  const sfpy = sY(dev.x, dev.y, 0);
                  return wrapDevice(
                    <g>
                      <line x1={spx} y1={spy} x2={sfpx} y2={sfpy} stroke={dev.color} strokeWidth={0.5} strokeDasharray="3 2" opacity={0.15}/>
                      <ellipse cx={sfpx} cy={sfpy} rx={roomH*10*scale} ry={roomH*6*scale} fill={dev.color} opacity={0.04} stroke={dev.color} strokeWidth={0.5} strokeDasharray="2 2" opacity={0.12}/>
                      <polygon points={isoCircS(0.18, roomH, 20)} fill={dev.color+"22"} stroke={dev.color} strokeWidth={1}/>
                      <polygon points={isoCircS(0.07, roomH+0.002, 12)} fill={dev.color}/>
                      <text x={sX(dev.x,dev.y,roomH)} y={sY(dev.x,dev.y,roomH)-12} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                    </g>
                  );
                }
                if(dev.type==="furniture") {
                  // Furniture on floor - isometric parallelogram
                  const hw=dev.w/2, hh=dev.h/2;
                  const pts = [
                    `${sX(dev.x-hw, dev.y-hh, 0)},${sY(dev.x-hw, dev.y-hh, 0)}`,
                    `${sX(dev.x+hw, dev.y-hh, 0)},${sY(dev.x+hw, dev.y-hh, 0)}`,
                    `${sX(dev.x+hw, dev.y+hh, 0)},${sY(dev.x+hw, dev.y+hh, 0)}`,
                    `${sX(dev.x-hw, dev.y+hh, 0)},${sY(dev.x-hw, dev.y+hh, 0)}`,
                  ].join(" ");
                  // Table top surface (slightly raised)
                  const tH = 0.76;
                  const topPts = [
                    `${sX(dev.x-hw, dev.y-hh, tH)},${sY(dev.x-hw, dev.y-hh, tH)}`,
                    `${sX(dev.x+hw, dev.y-hh, tH)},${sY(dev.x+hw, dev.y-hh, tH)}`,
                    `${sX(dev.x+hw, dev.y+hh, tH)},${sY(dev.x+hw, dev.y+hh, tH)}`,
                    `${sX(dev.x-hw, dev.y+hh, tH)},${sY(dev.x-hw, dev.y+hh, tH)}`,
                  ].join(" ");
                  // Front edge
                  const frontPts = [
                    `${sX(dev.x-hw, dev.y+hh, 0)},${sY(dev.x-hw, dev.y+hh, 0)}`,
                    `${sX(dev.x+hw, dev.y+hh, 0)},${sY(dev.x+hw, dev.y+hh, 0)}`,
                    `${sX(dev.x+hw, dev.y+hh, tH)},${sY(dev.x+hw, dev.y+hh, tH)}`,
                    `${sX(dev.x-hw, dev.y+hh, tH)},${sY(dev.x-hw, dev.y+hh, tH)}`,
                  ].join(" ");
                  // Right edge
                  const rightPts = [
                    `${sX(dev.x+hw, dev.y-hh, 0)},${sY(dev.x+hw, dev.y-hh, 0)}`,
                    `${sX(dev.x+hw, dev.y+hh, 0)},${sY(dev.x+hw, dev.y+hh, 0)}`,
                    `${sX(dev.x+hw, dev.y+hh, tH)},${sY(dev.x+hw, dev.y+hh, tH)}`,
                    `${sX(dev.x+hw, dev.y-hh, tH)},${sY(dev.x+hw, dev.y-hh, tH)}`,
                  ].join(" ");
                  const lx = sX(dev.x, dev.y, tH);
                  const ly = sY(dev.x, dev.y, tH);
                  return wrapDevice(
                    <g>
                      <polygon points={frontPts} fill="#475569" opacity={0.2} stroke="#64748b" strokeWidth={0.5}/>
                      <polygon points={rightPts} fill="#334155" opacity={0.2} stroke="#64748b" strokeWidth={0.5}/>
                      <polygon points={topPts} fill="#334155" opacity={0.35} stroke="#94a3b8" strokeWidth={0.8}/>
                      <text x={lx} y={ly+3} textAnchor="middle" fontSize={7} fill="#94a3b8" fontWeight={500} className="dev-label">{dev.name}</text>
                    </g>
                  );
                }
                if(dev.type==="control") {
                  const mw = dev.mountWall||"floor";
                  if(mw==="north"||mw==="south"||mw==="west"||mw==="east") {
                    const hw=dev.w/2, hh=dev.h/2;
                    let pts, lx, ly;
                    if(mw==="north") {
                      pts = [`${sX(dev.x-hw,0.02,dev.z+hh)},${sY(dev.x-hw,0.02,dev.z+hh)}`,`${sX(dev.x+hw,0.02,dev.z+hh)},${sY(dev.x+hw,0.02,dev.z+hh)}`,`${sX(dev.x+hw,0.02,dev.z-hh)},${sY(dev.x+hw,0.02,dev.z-hh)}`,`${sX(dev.x-hw,0.02,dev.z-hh)},${sY(dev.x-hw,0.02,dev.z-hh)}`].join(" ");
                      lx=sX(dev.x,0.02,dev.z); ly=sY(dev.x,0.02,dev.z);
                    } else if(mw==="south") {
                      pts = [`${sX(dev.x-hw,roomL-0.02,dev.z+hh)},${sY(dev.x-hw,roomL-0.02,dev.z+hh)}`,`${sX(dev.x+hw,roomL-0.02,dev.z+hh)},${sY(dev.x+hw,roomL-0.02,dev.z+hh)}`,`${sX(dev.x+hw,roomL-0.02,dev.z-hh)},${sY(dev.x+hw,roomL-0.02,dev.z-hh)}`,`${sX(dev.x-hw,roomL-0.02,dev.z-hh)},${sY(dev.x-hw,roomL-0.02,dev.z-hh)}`].join(" ");
                      lx=sX(dev.x,roomL-0.02,dev.z); ly=sY(dev.x,roomL-0.02,dev.z);
                    } else if(mw==="west") {
                      pts = [`${sX(0.02,dev.y-hw,dev.z+hh)},${sY(0.02,dev.y-hw,dev.z+hh)}`,`${sX(0.02,dev.y+hw,dev.z+hh)},${sY(0.02,dev.y+hw,dev.z+hh)}`,`${sX(0.02,dev.y+hw,dev.z-hh)},${sY(0.02,dev.y+hw,dev.z-hh)}`,`${sX(0.02,dev.y-hw,dev.z-hh)},${sY(0.02,dev.y-hw,dev.z-hh)}`].join(" ");
                      lx=sX(0.02,dev.y,dev.z); ly=sY(0.02,dev.y,dev.z);
                    } else {
                      pts = [`${sX(roomW-0.02,dev.y-hw,dev.z+hh)},${sY(roomW-0.02,dev.y-hw,dev.z+hh)}`,`${sX(roomW-0.02,dev.y+hw,dev.z+hh)},${sY(roomW-0.02,dev.y+hw,dev.z+hh)}`,`${sX(roomW-0.02,dev.y+hw,dev.z-hh)},${sY(roomW-0.02,dev.y+hw,dev.z-hh)}`,`${sX(roomW-0.02,dev.y-hw,dev.z-hh)},${sY(roomW-0.02,dev.y-hw,dev.z-hh)}`].join(" ");
                      lx=sX(roomW-0.02,dev.y,dev.z); ly=sY(roomW-0.02,dev.y,dev.z);
                    }
                    return wrapDevice(
                      <g>
                        <polygon points={pts} fill={dev.color+"22"} stroke={dev.color} strokeWidth={1.2}/>
                        <text x={lx} y={ly+16} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                      </g>
                    );
                  }
                  // Table-mounted control
                  const px = sX(dev.x, dev.y, dev.z);
                  const py = sY(dev.x, dev.y, dev.z);
                  return wrapDevice(
                    <g>
                      <rect x={px-8} y={py-5} width={16} height={10} rx={2} fill={dev.color+"33"} stroke={dev.color} strokeWidth={1} transform={`skewX(-15) translate(${px*0.04},0)`}/>
                      <text x={px} y={py+16} textAnchor="middle" fontSize={6} fill={dev.color} className="dev-label">{dev.name}</text>
                    </g>
                  );
                }
                return null;

    // ─── AI ASSISTANT ───────────────────────────────────────────

    function AIAssistant() {
      const [messages, setMessages] = useState([{role:"assistant",content:"I'm AVForge AI \u2014 your AV design assistant. Ask me about system design, troubleshooting, equipment selection, or acoustic calculations.\n\nTry asking:\n\u2022 \"Design a 10-person conference room with Extron\"\n\u2022 \"What\u2019s the difference between Dante and AES67?\"\n\u2022 \"How do I prevent audio feedback?\"\n\u2022 \"Recommend a DSP for a 20-person boardroom\""}]);
      const [input, setInput] = useState("");
      const [loading, setLoading] = useState(false);
      const messagesRef = useRef(null);
      useEffect(()=>{if(messagesRef.current) messagesRef.current.scrollTop=messagesRef.current.scrollHeight;},[messages]);

      const send = async () => {
        if(!input.trim()||loading) return;
        const userMsg=input.trim(); setInput(""); setMessages(prev=>[...prev,{role:"user",content:userMsg}]); setLoading(true);
        try {
          const apiMessages=[...messages.filter((m,idx)=>!(m.role==="assistant"&&idx===0)),{role:"user",content:userMsg}];
          if(apiMessages[0]?.role!=="user") apiMessages.shift();
          const response = await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:"You are AVForge AI, an expert AV engineering assistant. You have deep knowledge of: Q-SYS, Crestron, Extron (DTP3, CrossPoint, NAV, DMP, IPCP Pro, ProDSP, Vector 4K, SIS, ShareLink Pro, XPA/NetPA Ultra, GlobalViewer), Biamp (Tesira, Devio, Parle), Shure (MXA920, MXA710, P300, ANIUSB-MATRIX, Axient Digital), Sennheiser (TCC2, TeamConnect), Dante/AES67/HDBaseT/SDVoE/NDI, room acoustics, AVIXA DISCAS display calculations, speaker coverage EPR, PAG/NAG, 70V audio, conduit fill, PoE budgeting, rack design. Give concise, technically precise answers. Use formulas and specific product recommendations when relevant. Format responses clearly.",messages:apiMessages})});
          const data = await response.json();
          const text = data.content?.map(i=>i.text||"").join("\n")||"Sorry, I couldn't process that request.";
          setMessages(prev=>[...prev,{role:"assistant",content:text}]);
        } catch(err) { setMessages(prev=>[...prev,{role:"assistant",content:"Connection error \u2014 please check your internet connection and try again."}]); }
        setLoading(false);
      };

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100%"}}>
          <div ref={messagesRef} style={{flex:1,overflowY:"auto",padding:"16px 0"}}>
            {messages.map((m,i)=>(
              <div key={i} style={{marginBottom:16,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
                <div style={{maxWidth:"85%",padding:"10px 14px",borderRadius:12,fontSize:13,lineHeight:1.6,background:m.role==="user"?"#1d4ed8":"rgba(30,41,59,0.7)",color:m.role==="user"?"#fff":"#e2e8f0",border:m.role==="user"?"none":"1px solid #1e293b",whiteSpace:"pre-wrap"}}>{m.content}</div>
              </div>
            ))}
            {loading && <div style={{display:"flex",gap:4,padding:"10px 14px"}}>{[0,1,2].map(i=><div key={i} style={{width:7,height:7,borderRadius:"50%",background:"#3b82f6",animation:"pulse 1.2s ease-in-out "+(i*0.2)+"s infinite"}} />)}</div>}
          </div>
          <div style={{display:"flex",gap:8,padding:"12px 0 0",borderTop:"1px solid #1e293b"}}>
            <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Ask about AV design, troubleshooting, equipment selection..." style={{flex:1,padding:"10px 14px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,color:"#e2e8f0",fontSize:13,outline:"none"}} />
            <button onClick={send} disabled={loading} style={{padding:"10px 16px",background:"#2563eb",border:"none",borderRadius:8,color:"#fff",cursor:loading?"not-allowed":"pointer",display:"flex",alignItems:"center",gap:6,fontSize:13,opacity:loading?0.5:1}}>
              <Icons.Send /> Send
            </button>
          </div>
        </div>
      );
    }

            <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:12,marginBottom:28}}>
              {sections.map((card,i)=>(
                <button key={i} onClick={card.action} style={{padding:20,background:card.gradient,border:"1px solid #1e293b",borderRadius:12,cursor:"pointer",textAlign:"left",transition:"all 0.25s",display:"flex",gap:16,alignItems:"flex-start"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=card.color+"66";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow=`0 8px 24px ${card.color}15`;}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.transform="none";e.currentTarget.style.boxShadow="none";}}>
                  <div style={{width:48,height:48,borderRadius:10,background:`${card.color}12`,border:`1px solid ${card.color}30`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{card.icon}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                      <div style={{fontSize:15,fontWeight:600,color:"#e2e8f0"}}>{card.name}</div>
                      <div style={{fontSize:10,color:card.color,background:`${card.color}15`,padding:"2px 8px",borderRadius:10,fontWeight:500}}>{card.count}</div>
                    </div>
                    <div style={{fontSize:12,color:"#64748b",lineHeight:1.5}}>{card.desc}</div>
                  </div>
                  <svg width="16" height="16" viewBox="0 0 16 16" fill="none" style={{flexShrink:0,marginTop:4,opacity:0.4}}><path d="M6 3L11 8L6 13" stroke="#64748b" strokeWidth="1.5" strokeLinecap="round"/></svg>
                </button>
              ))}
            </div>

            {/* Tool Preview */}
            <div style={{marginBottom:28,borderRadius:12,overflow:"hidden",border:"1px solid #1e293b",position:"relative",cursor:"pointer"}} onClick={()=>{setSection("tools");setActiveTool("signal");}}>
              <img src={heroImgSignal} alt="Signal Flow Builder" style={{width:"100%",display:"block"}}/>
              <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"24px 20px 16px",background:"linear-gradient(to top, rgba(10,15,26,0.95), transparent)"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:16}}>🔀</span>
                  <span style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>Signal Flow Builder</span>
                  <span style={{fontSize:10,color:"#8b5cf6",background:"rgba(139,92,246,0.15)",padding:"2px 8px",borderRadius:10}}>Design Tool</span>
                  <span style={{fontSize:11,color:"#60a5fa",marginLeft:"auto"}}>Open →</span>
                </div>
              </div>
            </div>

            {/* Quick Start */}
            <div style={{padding:"18px 22px",background:"rgba(15,23,42,0.6)",border:"1px solid #1e293b",borderRadius:12}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12}}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1L9 5.5L14 6.5L10.5 9.5L11.5 14L7 11.5L2.5 14L3.5 9.5L0 6.5L5 5.5Z" fill="#f59e0b" opacity="0.7"/></svg>
                <div style={{fontSize:12,fontWeight:600,color:"#f59e0b",textTransform:"uppercase",letterSpacing:"0.06em"}}>Quick Start</div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:6}}>
                {quickStarts.map(qs=>{
                  const calc=CALCULATORS.find(c=>c.name===qs.name);
                  return <button key={qs.name} onClick={()=>{if(qs.name==="Rack Planner"){setSection("tools");setActiveTool("rack");}else if(qs.name==="Room Designer"){setSection("tools");setActiveTool("room3d");}else if(qs.name==="Signal Flow"){setSection("tools");setActiveTool("signal");}else if(calc){setSection("calc");setActiveCalc(calc.id);}}} style={{padding:"7px 14px",background:"rgba(15,23,42,0.5)",border:"1px solid #1e293b",borderRadius:8,color:"#94a3b8",fontSize:12,cursor:"pointer",transition:"all 0.15s",display:"flex",alignItems:"center",gap:6}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#334155";e.currentTarget.style.color="#e2e8f0";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.color="#94a3b8";}}><span style={{fontSize:13}}>{qs.icon}</span>{qs.name}</button>;
                })}
              </div>
            </div>
          </div>
        );
      };

      const renderCalcList = () => (
        <div style={{padding:"24px 24px"}} className="fade-in">
          <h2 style={{fontSize:18,fontWeight:600,color:"#f1f5f9",marginBottom:4}}>Calculators</h2>
          <p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Interactive tools with live results and INFOCOMM standard references</p>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(180px, 1fr))",gap:10}}>
            {CALCULATORS.map(calc=>(
              <button key={calc.id} onClick={()=>setActiveCalc(calc.id)} style={{padding:14,background:activeCalc===calc.id?"rgba(59,130,246,0.1)":"rgba(15,23,42,0.4)",border:`1px solid ${activeCalc===calc.id?"rgba(59,130,246,0.4)":"#1e293b"}`,borderRadius:8,cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
                <div style={{fontSize:20,marginBottom:8}}>{calc.icon}</div>
                <div style={{fontSize:13,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>{calc.name}</div>
                <div style={{fontSize:11,color:"#64748b"}}>{calc.desc}</div>
              </button>
            ))}
          </div>
        </div>
      );

      const renderActiveCalc = () => {
        const calc=CALCULATORS.find(c=>c.id===activeCalc);
        if(!calc) return null;
        const Comp=calc.component;
        return (
          <div style={{padding:"20px 24px"}} className="fade-in">
            <button onClick={()=>setActiveCalc(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:12,cursor:"pointer",marginBottom:12,display:"flex",alignItems:"center",gap:4}}>← Back to calculators</button>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:20}}>
              <span style={{fontSize:24}}>{calc.icon}</span>
              <div><h2 style={{fontSize:18,fontWeight:600,color:"#f1f5f9"}}>{calc.name}</h2><p style={{fontSize:12,color:"#64748b"}}>{calc.desc}</p></div>
            </div>
            <Comp/>
          </div>
        );
      };

      const renderContent = () => {
        switch(section) {
          case "home": return renderHome();
          case "calc": return activeCalc ? renderActiveCalc() : renderCalcList();
          case "tools": {
            const tool=DESIGN_TOOLS.find(t=>t.id===activeTool);
            if(tool){const Comp=tool.component;return(<div style={{padding:"20px 24px"}} className="fade-in"><button onClick={()=>setActiveTool(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:12,cursor:"pointer",marginBottom:12}}>← Back to tools</button><h2 style={{fontSize:18,fontWeight:600,color:"#f1f5f9",marginBottom:16}}>{tool.icon} {tool.name}</h2><Comp/></div>);}
            return(<div style={{padding:"24px 24px"}} className="fade-in"><h2 style={{fontSize:18,fontWeight:600,color:"#f1f5f9",marginBottom:4}}>Design Tools</h2><p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Visual builders for AV system design</p><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:10}}>{DESIGN_TOOLS.map(tool=>(<button key={tool.id} onClick={()=>setActiveTool(tool.id)} style={{padding:16,background:"rgba(15,23,42,0.4)",border:"1px solid #1e293b",borderRadius:8,cursor:"pointer",textAlign:"left"}}><div style={{fontSize:24,marginBottom:8}}>{tool.icon}</div><div style={{fontSize:14,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>{tool.name}</div><div style={{fontSize:12,color:"#64748b"}}>{tool.desc}</div></button>))}</div></div>);
          }
          case "ref": {
            const ref=REFERENCE_TABS.find(t=>t.id===activeRef);
            if(ref){const Comp=ref.component;return(<div style={{padding:"20px 24px"}} className="fade-in"><button onClick={()=>setActiveRef(null)} style={{background:"none",border:"none",color:"#64748b",fontSize:12,cursor:"pointer",marginBottom:12}}>← Back to reference</button><h2 style={{fontSize:18,fontWeight:600,color:"#f1f5f9",marginBottom:16}}>{ref.icon} {ref.name}</h2><Comp/></div>);}
            return(<div style={{padding:"24px 24px"}} className="fade-in"><h2 style={{fontSize:18,fontWeight:600,color:"#f1f5f9",marginBottom:4}}>Reference Library</h2><p style={{fontSize:13,color:"#64748b",marginBottom:20}}>Standards, formulas, and device databases</p><div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill, minmax(200px, 1fr))",gap:10}}>{REFERENCE_TABS.map(ref=>(<button key={ref.id} onClick={()=>setActiveRef(ref.id)} style={{padding:16,background:"rgba(15,23,42,0.4)",border:"1px solid #1e293b",borderRadius:8,cursor:"pointer",textAlign:"left"}}><div style={{fontSize:24,marginBottom:8}}>{ref.icon}</div><div style={{fontSize:14,fontWeight:600,color:"#e2e8f0",marginBottom:3}}>{ref.name}</div></button>))}</div></div>);
          }
          case "ai": return renderHome();
          default: return renderHome();
        }
      };

      return (
        <div style={{display:"flex",flexDirection:"column",height:"100vh",background:"#0c1220",color:"#e2e8f0",fontFamily:"'Inter', -apple-system, sans-serif"}}>
          {/* Header */}
          <header style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"0 32px",height:72,background:"#080d17",borderBottom:"1px solid #1e293b",flexShrink:0,zIndex:100}}>
            <div style={{display:"flex",alignItems:"center",gap:12,cursor:"pointer"}} onClick={()=>{setSection("home");setActiveCalc(null);setActiveRef(null);setActiveTool(null);}}>
              <div style={{width:36,height:36,borderRadius:8,background:"#2563eb",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><span style={{color:"#fff",fontSize:18,fontWeight:800}}>▲</span></div>
              <span style={{fontSize:20,fontWeight:700,color:"#f1f5f9",whiteSpace:"nowrap",letterSpacing:"-0.02em"}}>AV<span style={{color:"#3b82f6"}}>Forge</span></span>
            </div>
            <nav style={{display:"flex",alignItems:"center",gap:6}}>
              {NAV_SECTIONS.map(nav=>{
                const active=section===nav.id;const Icon=nav.icon;
                return(<button key={nav.id} onClick={()=>{setSection(nav.id);setActiveCalc(null);setActiveRef(null);setActiveTool(null);}} style={{display:"flex",alignItems:"center",gap:8,padding:"10px 18px",background:active?"rgba(59,130,246,0.12)":"transparent",border:"none",borderRadius:8,cursor:"pointer",color:active?"#60a5fa":"#94a3b8",transition:"all 0.15s",fontSize:15,fontWeight:active?700:500}} onMouseEnter={e=>{if(!active)e.currentTarget.style.color="#e2e8f0";}} onMouseLeave={e=>{if(!active)e.currentTarget.style.color="#94a3b8";}}><Icon/><span>{nav.name}</span></button>);
              })}
            </nav>
          </header>
          {/* Main content */}
          <div style={{flex:1,overflowY:"auto",minHeight:0}}>{renderContent()}</div>
          {/* Floating AI Chat */}
          {aiChatOpen && (
            <div style={{position:"fixed",bottom:80,right:24,width:400,height:520,background:"#0c1220",border:"1px solid #1e293b",borderRadius:16,boxShadow:"0 16px 48px rgba(0,0,0,0.5)",display:"flex",flexDirection:"column",zIndex:1000,overflow:"hidden"}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 18px",borderBottom:"1px solid #1e293b",background:"#080d17"}}>
                <div style={{display:"flex",alignItems:"center",gap:8}}>
                  <div style={{width:28,height:28,borderRadius:8,background:"rgba(245,158,11,0.15)",display:"flex",alignItems:"center",justifyContent:"center"}}><Icons.Bot/></div>
                  <div><div style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>AI Assistant</div><div style={{fontSize:10,color:"#64748b"}}>AV system design expert</div></div>
                </div>
                <button onClick={()=>setAiChatOpen(false)} style={{background:"none",border:"none",color:"#64748b",cursor:"pointer",fontSize:18,padding:4,lineHeight:1}}>✕</button>
              </div>
              <div style={{flex:1,minHeight:0}}><AIAssistant/></div>
            </div>
          )}
          <button onClick={()=>setAiChatOpen(!aiChatOpen)} style={{position:"fixed",bottom:20,right:24,width:52,height:52,borderRadius:16,background:aiChatOpen?"#1e293b":"#2563eb",border:"none",cursor:"pointer",boxShadow:"0 4px 20px rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:1001,transition:"all 0.2s"}} onMouseEnter={e=>e.currentTarget.style.transform="scale(1.08)"} onMouseLeave={e=>e.currentTarget.style.transform="scale(1)"}>
            {aiChatOpen ? <span style={{color:"#94a3b8",fontSize:20}}>✕</span> : <Icons.Bot/>}
          </button>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<AVForge />);
  </script>
</body>
</html>
