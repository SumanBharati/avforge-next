    function SignalFlowBuilder() {
      const [devices, setDevices] = useState([]);
      const [connections, setConnections] = useState([]);
      const [dragging, setDragging] = useState(null);
      const [connecting, setConnecting] = useState(null);
      const [selected, setSelected] = useState(null);
      const [selectedConn, setSelectedConn] = useState(null);
      const [selectedRoom, setSelectedRoom] = useState(null);
      const [rooms, setRooms] = useState([]);
      const [editingRoom, setEditingRoom] = useState(null);
      const [panOffset, setPanOffset] = useState({x:0,y:0});
      const [libOpen, setLibOpen] = useState(true);
      const [libCat, setLibCat] = useState(DEVICE_LIBRARY[0].cat);
      const [showBOM, setShowBOM] = useState(false);
      const [bomPrices, setBomPrices] = useState({});
      const [sheetUrl, setSheetUrl] = useState("https://docs.google.com/spreadsheets/d/e/2PACX-1vSWVcwxYq18USBNkFpnj5vpHekr7JG9WdIu4ZBaTjurHnmWY78K2024BqxX4KYi8h1xdDzSEVl0QngK/pub?output=csv");
      const [sheetStatus, setSheetStatus] = useState("");
      const [deviceLib, setDeviceLib] = useState(DEVICE_LIBRARY);
      const [showSheetConfig, setShowSheetConfig] = useState(false);
      const canvasRef = useRef(null);
      const nextId = useRef(1);

      // Parse CSV text into device library format
      const parseCSV = (csvText) => {
        const lines = csvText.split("\n").map(l=>l.trim()).filter(l=>l);
        if(lines.length<2) return null;
        const headers = lines[0].split(",").map(h=>h.trim());
        const catIdx=headers.indexOf("Category"), typeIdx=headers.indexOf("Type"), mfrIdx=headers.indexOf("Manufacturer"),
              modelIdx=headers.indexOf("Model"), priceIdx=headers.indexOf("Price"), colorIdx=headers.indexOf("Color"), portsIdx=headers.indexOf("Ports");
        if(typeIdx===-1||portsIdx===-1) return null;

        const catMap = {};
        for(let i=1;i<lines.length;i++){
          // Handle CSV with possible quoted fields
          const row = [];
          let current="", inQuote=false;
          for(let c=0;c<lines[i].length;c++){
            const ch=lines[i][c];
            if(ch==='"'){inQuote=!inQuote;}
            else if(ch===','&&!inQuote){row.push(current.trim());current="";}
            else{current+=ch;}
          }
          row.push(current.trim());
          if(row.length<Math.max(typeIdx,portsIdx)+1) continue;

          const cat = catIdx>=0 ? row[catIdx] : "Other";
          const type = row[typeIdx];
          const mfr = mfrIdx>=0 ? row[mfrIdx] : "Generic";
          const model = modelIdx>=0 ? row[modelIdx] : "";
          const price = priceIdx>=0 ? parseFloat(row[priceIdx])||0 : 0;
          const color = colorIdx>=0 ? row[colorIdx] : "#64748b";
          const portsStr = row[portsIdx]||"";

          // Parse ports: "left:hdmi:in:HDMI In|right:cat6:out:DTP3 Out"
          const ports = portsStr.split("|").filter(p=>p).map(p=>{
            const parts=p.split(":");
            if(parts.length<4) return null;
            return {side:parts[0],signal:parts[1],dir:parts[2],label:parts.slice(3).join(":")};
          }).filter(Boolean);

          if(!type) continue;
          const portCount = ports.length;
          const hasMany = portCount > 4;
          const item = {type,mfr,model,price,w:Math.max(120,type.length*7+30),h:Math.max(56, hasMany?80:portCount>2?70:56),color,ports};

          if(!catMap[cat]) catMap[cat]=[];
          catMap[cat].push(item);
        }

        return Object.entries(catMap).map(([cat,items])=>({cat,items}));
      };

      // Load from Google Sheet URL
      const loadFromSheet = async () => {
        if(!sheetUrl.trim()){setSheetStatus("Enter a Google Sheet URL");return;}
        setSheetStatus("Loading...");
        try {
          // Convert various Google Sheet URL formats to CSV export
          let csvUrl = sheetUrl.trim();
          // If it's already a published CSV URL, use as-is
          if(csvUrl.includes("/pub?") || csvUrl.includes("/pub?output=csv")){
            // Already a published URL — use directly
            if(!csvUrl.includes("output=csv")) csvUrl += "&output=csv";
          } else if(csvUrl.includes("docs.google.com/spreadsheets")){
            const match = csvUrl.match(/\/d\/([a-zA-Z0-9_-]+)/);
            if(match) {
              const sheetId = match[1];
              const gidMatch = csvUrl.match(/gid=(\d+)/);
              const gid = gidMatch ? gidMatch[1] : "0";
              csvUrl = "https://docs.google.com/spreadsheets/d/"+sheetId+"/export?format=csv&gid="+gid;
            }
          }
          // Try direct fetch first, then CORS proxies as fallback
          let text = null;
          const urls = [
            csvUrl,
            "https://corsproxy.io/?"+encodeURIComponent(csvUrl),
            "https://api.codetabs.com/v1/proxy?quest="+encodeURIComponent(csvUrl),
            "https://api.allorigins.win/raw?url="+encodeURIComponent(csvUrl),
            "https://cors-anywhere.herokuapp.com/"+csvUrl,
          ];
          let lastErr = "";
          for(const url of urls){
            try {
              setSheetStatus("Trying connection method "+(urls.indexOf(url)+1)+" of "+urls.length+"...");
              const resp = await fetch(url);
              if(resp.ok){ text = await resp.text(); break; }
              else { lastErr = "HTTP "+resp.status; }
            } catch(e){ lastErr = e.message; continue; }
          }
          if(!text) throw new Error("All fetch methods failed. Last error: "+lastErr);
          const parsed = parseCSV(text);
          if(!parsed||parsed.length===0){setSheetStatus("Error: Could not parse CSV. Check column headers.");return;}
          const totalDevices = parsed.reduce((s,c)=>s+c.items.length,0);
          setDeviceLib(parsed);
          setLibCat(parsed[0].cat);
          setSheetStatus("\u2713 Loaded "+totalDevices+" devices in "+parsed.length+" categories");
        } catch(err) {
          setSheetStatus("Error: "+err.message);
        }
      };

      const resetToDefault = () => { setDeviceLib(DEVICE_LIBRARY); setLibCat(DEVICE_LIBRARY[0].cat); setSheetUrl(""); setSheetStatus("Reset to built-in library"); };

      // Extract manufacturer from device type name
      const getMfr = (type) => {
        if(type.startsWith("Extron")) return "Extron";
        if(type.startsWith("Crestron")) return "Crestron";
        if(type.startsWith("QSC")) return "QSC";
        if(type.startsWith("Biamp")) return "Biamp";
        if(type.startsWith("Shure")) return "Shure";
        if(type.startsWith("Sennheiser")) return "Sennheiser";
        if(type.startsWith("NETGEAR")) return "NETGEAR";
        if(type.startsWith("Cisco")) return "Cisco";
        if(type.startsWith("Logitech")) return "Logitech";
        if(type.startsWith("Barco")) return "Barco";
        if(type.startsWith("Neat")) return "Neat";
        return "Generic";
      };

      // Generate BOM from devices
      const generateBOM = () => {
        const counts = {};
        devices.forEach(d => {
          if(!counts[d.type]) counts[d.type] = {type:d.type, mfr:d.mfr||getMfr(d.type), qty:0, color:d.color, cat: ""};
          counts[d.type].qty++;
        });
        // Find category for each device
        deviceLib.forEach(cat => {
          cat.items.forEach(item => {
            if(counts[item.type]) {
              counts[item.type].cat = cat.cat;
              if(item.price) counts[item.type].listPrice = item.price;
            }
          });
        });
        return Object.values(counts).sort((a,b) => a.cat.localeCompare(b.cat) || a.type.localeCompare(b.type));
      };

      // Generate cable schedule from connections
      const generateCableSchedule = () => {
        return connections.map((conn, i) => {
          const fromDev = devices.find(d=>d.id===conn.from.deviceId);
          const toDev = devices.find(d=>d.id===conn.to.deviceId);
          if(!fromDev||!toDev) return null;
          const fromPort = fromDev.ports.find(p=>p.id===conn.from.portId);
          const toPort = toDev.ports.find(p=>p.id===conn.to.portId);
          const sig = SIGNAL_TYPES.find(s=>s.id===conn.signal)||SIGNAL_TYPES[0];
          return {id:i+1, from:fromDev.type, fromPort:fromPort?.label||"", to:toDev.type, toPort:toPort?.label||"", signal:sig.name, color:sig.color};
        }).filter(Boolean);
      };

      const addDevice = (template, x, y) => {
        const id = nextId.current++;
        const ports = template.ports.map((p,i)=>({...p,id:`${id}-p${i}`}));
        setDevices(prev=>[...prev,{...template,id,x:x||200+Math.random()*300,y:y||100+Math.random()*200,ports}]);
      };

      // Room boundary functions
      const roomColors = ["#3b82f6","#22c55e","#f59e0b","#a855f7","#ef4444","#06b6d4","#f97316","#ec4899"];
      const addRoom = () => {
        const id = "room-"+(Date.now());
        const colorIdx = rooms.length % roomColors.length;
        setRooms(prev=>[...prev,{id,label:"Location "+(prev.length+1),x:80+Math.random()*100,y:80+Math.random()*100,w:400,h:300,color:roomColors[colorIdx]}]);
        setSelectedRoom(id);
      };

      const handleRoomMouseDown = (e, room) => {
        e.stopPropagation();
        setSelectedRoom(room.id); setSelected(null); setSelectedConn(null);
        const startX = e.clientX - room.x - panOffset.x;
        const startY = e.clientY - room.y - panOffset.y;
        const onMove = (me) => {
          const nx = me.clientX - startX - panOffset.x;
          const ny = me.clientY - startY - panOffset.y;
          setRooms(prev=>prev.map(r=>r.id===room.id?{...r,x:nx,y:ny}:r));
        };
        const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove);
        window.addEventListener("mouseup",onUp);
      };

      const handleRoomResize = (e, room, handle) => {
        e.stopPropagation();
        setSelectedRoom(room.id);
        const startX = e.clientX, startY = e.clientY;
        const origX = room.x, origY = room.y, origW = room.w, origH = room.h;
        const onMove = (me) => {
          const dx = me.clientX - startX, dy = me.clientY - startY;
          setRooms(prev=>prev.map(r=>{
            if(r.id!==room.id) return r;
            let {x,y,w,h} = {x:origX,y:origY,w:origW,h:origH};
            if(handle.includes("e")) w = Math.max(150, origW+dx);
            if(handle.includes("s")) h = Math.max(100, origH+dy);
            if(handle.includes("w")){ w = Math.max(150, origW-dx); x = origX+dx; if(w<=150) x = origX+origW-150; }
            if(handle.includes("n")){ h = Math.max(100, origH-dy); y = origY+dy; if(h<=100) y = origY+origH-100; }
            return {...r,x,y,w,h};
          }));
        };
        const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove);
        window.addEventListener("mouseup",onUp);
      };

      const handleRoomLabelEdit = (roomId) => { setEditingRoom(roomId); };
      const finishRoomEdit = (roomId, newLabel) => {
        setRooms(prev=>prev.map(r=>r.id===roomId?{...r,label:newLabel}:r));
        setEditingRoom(null);
      };
      const deleteRoom = (roomId) => { setRooms(prev=>prev.filter(r=>r.id!==roomId)); if(selectedRoom===roomId) setSelectedRoom(null); };
      const cycleRoomColor = (roomId) => {
        setRooms(prev=>prev.map(r=>{
          if(r.id!==roomId) return r;
          const idx = roomColors.indexOf(r.color);
          return {...r, color: roomColors[(idx+1)%roomColors.length]};
        }));
      };

      const getPortPos = useCallback((device, port) => {
        const leftPorts = device.ports.filter(p=>p.side==="left");
        const rightPorts = device.ports.filter(p=>p.side==="right");
        const isLeft = port.side==="left";
        const arr = isLeft?leftPorts:rightPorts;
        const idx = arr.indexOf(port);
        const spacing = device.h/(arr.length+1);
        return {
          x: device.x + panOffset.x + (isLeft?0:device.w),
          y: device.y + panOffset.y + spacing*(idx+1)
        };
      },[panOffset]);

      const handleCanvasMouseDown = (e) => {
        if(e.target===canvasRef.current || e.target.tagName==="svg"){
          setSelected(null); setSelectedConn(null); setSelectedRoom(null);
        }
      };

      const handleDeviceMouseDown = (e, dev) => {
        e.stopPropagation();
        setSelected(dev.id); setSelectedConn(null); setSelectedRoom(null);
        const rect = canvasRef.current.getBoundingClientRect();
        const startX = e.clientX - dev.x - panOffset.x;
        const startY = e.clientY - dev.y - panOffset.y;
        const onMove = (me) => {
          const nx = me.clientX - startX - panOffset.x;
          const ny = me.clientY - startY - panOffset.y;
          setDevices(prev=>prev.map(d=>d.id===dev.id?{...d,x:nx,y:ny}:d));
        };
        const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
        window.addEventListener("mousemove",onMove);
        window.addEventListener("mouseup",onUp);
      };

      const handlePortClick = (e, device, port) => {
        e.stopPropagation();
        if(!connecting){
          setConnecting({deviceId:device.id,portId:port.id,signal:port.signal});
        } else {
          if(connecting.deviceId!==device.id){
            const sig = SIGNAL_TYPES.find(s=>s.id===connecting.signal) || SIGNAL_TYPES.find(s=>s.id===port.signal) || SIGNAL_TYPES[0];
            setConnections(prev=>[...prev,{id:Date.now(),from:{deviceId:connecting.deviceId,portId:connecting.portId},to:{deviceId:device.id,portId:port.id},signal:sig.id}]);
          }
          setConnecting(null);
        }
      };

      const deleteSelected = () => {
        if(selectedRoom!==null){
          deleteRoom(selectedRoom);
        } else if(selectedConn!==null){
          setConnections(prev=>prev.filter(c=>c.id!==selectedConn));
          setSelectedConn(null);
        } else if(selected!==null){
          setConnections(prev=>prev.filter(c=>c.from.deviceId!==selected&&c.to.deviceId!==selected));
          setDevices(prev=>prev.filter(d=>d.id!==selected));
          setSelected(null);
        }
      };

      const clearAll = () => { setDevices([]); setConnections([]); setRooms([]); setSelected(null); setSelectedConn(null); setSelectedRoom(null); nextId.current=1; };

      const renderConnection = (conn) => {
        const fromDev = devices.find(d=>d.id===conn.from.deviceId);
        const toDev = devices.find(d=>d.id===conn.to.deviceId);
        if(!fromDev||!toDev) return null;
        const fromPort = fromDev.ports.find(p=>p.id===conn.from.portId);
        const toPort = toDev.ports.find(p=>p.id===conn.to.portId);
        if(!fromPort||!toPort) return null;
        const p1 = getPortPos(fromDev,fromPort);
        const p2 = getPortPos(toDev,toPort);
        const sig = SIGNAL_TYPES.find(s=>s.id===conn.signal)||SIGNAL_TYPES[0];
        const dx = Math.abs(p2.x-p1.x)*0.5;
        const path = `M${p1.x},${p1.y} C${p1.x+dx},${p1.y} ${p2.x-dx},${p2.y} ${p2.x},${p2.y}`;
        const isSelected = selectedConn===conn.id;
        const mx = (p1.x+p2.x)/2, my = (p1.y+p2.y)/2;
        return (
          <g key={conn.id} onClick={(e)=>{e.stopPropagation();setSelectedConn(conn.id);setSelected(null);}} style={{cursor:"pointer"}}>
            {isSelected && <path d={path} fill="none" stroke="#fff" strokeWidth={5} strokeOpacity={0.3} />}
            <path d={path} fill="none" stroke={sig.color} strokeWidth={isSelected?3:2} strokeOpacity={0.8} />
            <rect x={mx-24} y={my-9} width={48} height={18} rx={4} fill="#0f172a" stroke={sig.color} strokeWidth={1} opacity={0.95}/>
            <text x={mx} y={my+4} textAnchor="middle" fontSize={8} fill={sig.color} fontFamily="'JetBrains Mono', monospace" fontWeight={600}>{sig.name}</text>
            <circle cx={p1.x} cy={p1.y} r={3} fill={sig.color} />
            <circle cx={p2.x} cy={p2.y} r={3} fill={sig.color} />
          </g>
        );
      };

      return (
        <div style={{display:"flex",height:"calc(100vh - 136px)",gap:0,margin:"-20px -24px",overflow:"hidden"}}>
          {/* Library Panel */}
          <div style={{width:libOpen?210:40,background:"#080d17",borderRight:"1px solid #1e293b",transition:"width 0.2s",flexShrink:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>
            <div style={{padding:"10px 12px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"space-between",cursor:"pointer"}} onClick={()=>setLibOpen(!libOpen)}>
              {libOpen && <span style={{fontSize:12,fontWeight:600,color:"#e2e8f0"}}>Device Library</span>}
              <span style={{color:"#64748b",fontSize:14}}>{libOpen?"\u25C0":"\u25B6"}</span>
            </div>
            {libOpen && (
              <div style={{flex:1,overflowY:"auto"}}>
                {/* Google Sheet Config Toggle */}
                <div style={{padding:"6px",borderBottom:"1px solid #1e293b"}}>
                  <button onClick={()=>setShowSheetConfig(!showSheetConfig)} style={{width:"100%",padding:"5px 8px",borderRadius:4,fontSize:9,background:showSheetConfig?"rgba(59,130,246,0.12)":"rgba(15,23,42,0.5)",border:"1px solid "+(showSheetConfig?"rgba(59,130,246,0.3)":"#1e293b"),color:showSheetConfig?"#60a5fa":"#64748b",cursor:"pointer",textAlign:"left"}}>
                    {"\u2699"} {showSheetConfig?"Hide":"Load from"} Google Sheet
                  </button>
                  {showSheetConfig && (
                    <div style={{marginTop:6,padding:6,background:"rgba(15,23,42,0.4)",borderRadius:6,border:"1px solid #1e293b"}}>
                      <div style={{fontSize:9,color:"#64748b",marginBottom:4,fontWeight:600}}>Option 1: Google Sheet URL</div>
                      <input value={sheetUrl} onChange={e=>setSheetUrl(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/e/..." style={{width:"100%",padding:"5px 6px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontSize:10,outline:"none",boxSizing:"border-box",marginBottom:4}} />
                      <div style={{display:"flex",gap:4,marginBottom:8}}>
                        <button onClick={loadFromSheet} style={{flex:1,padding:"4px 6px",background:"#2563eb",border:"none",borderRadius:4,color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>Load from URL</button>
                        <button onClick={resetToDefault} style={{padding:"4px 6px",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:4,color:"#f87171",fontSize:9,cursor:"pointer"}}>Reset</button>
                      </div>
                      <div style={{fontSize:9,color:"#64748b",marginBottom:4,fontWeight:600}}>Option 2: Paste CSV Data Directly</div>
                      <textarea id="csvPasteArea" placeholder="Open your Google Sheet → Select All (Ctrl+A) → Copy (Ctrl+C) → Paste here. Or: File → Download → CSV, then open the CSV in a text editor and paste contents here." style={{width:"100%",height:70,padding:"5px 6px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontSize:9,outline:"none",boxSizing:"border-box",resize:"vertical",fontFamily:"'JetBrains Mono',monospace",marginBottom:4}} />
                      <button onClick={()=>{
                        const ta=document.getElementById("csvPasteArea");
                        if(!ta||!ta.value.trim()){setSheetStatus("Paste CSV data first");return;}
                        // Convert tab-separated (from Google Sheets copy) to comma-separated
                        let csvText = ta.value.trim();
                        const firstLine = csvText.split("\n")[0];
                        if(firstLine.includes("\t") && !firstLine.includes(",")){
                          csvText = csvText.split("\n").map(line=>line.split("\t").map(cell=>{
                            if(cell.includes(",")||cell.includes('"')) return '"'+cell.replace(/"/g,'""')+'"';
                            return cell;
                          }).join(",")).join("\n");
                        }
                        const parsed=parseCSV(csvText);
                        if(!parsed||parsed.length===0){setSheetStatus("Error: Could not parse. Check headers & format.");return;}
                        const total=parsed.reduce((s,c)=>s+c.items.length,0);
                        setDeviceLib(parsed);setLibCat(parsed[0].cat);
                        setSheetStatus("\u2713 Loaded "+total+" devices from pasted data");
                      }} style={{width:"100%",padding:"4px 6px",background:"#22c55e",border:"none",borderRadius:4,color:"#fff",fontSize:9,fontWeight:600,cursor:"pointer"}}>Load from Paste</button>
                      {sheetStatus && <div style={{marginTop:4,fontSize:9,color:sheetStatus.startsWith("\u2713")?"#4ade80":sheetStatus.startsWith("Error")||sheetStatus.startsWith("All")?"#f87171":"#64748b"}}>{sheetStatus}</div>}
                      <div style={{marginTop:6,fontSize:8,color:"#475569",lineHeight:1.5}}>
                        <strong>Columns:</strong> Category, Type, Manufacturer, Model, Price, Color, Ports<br/>
                        <strong>Ports:</strong> side:signal:dir:label (pipe separated)<br/>
                        Example: left:hdmi:in:HDMI In|right:cat6:out:DTP3
                      </div>
                    </div>
                  )}
                </div>
                {/* Category buttons */}
                <div style={{display:"flex",flexWrap:"wrap",gap:2,padding:"8px 6px",borderBottom:"1px solid #1e293b"}}>
                  {deviceLib.map(cat=>(
                    <button key={cat.cat} onClick={()=>setLibCat(cat.cat)} style={{padding:"3px 8px",borderRadius:4,fontSize:9,background:libCat===cat.cat?"rgba(59,130,246,0.15)":"transparent",border:"1px solid "+(libCat===cat.cat?"rgba(59,130,246,0.4)":"transparent"),color:libCat===cat.cat?"#60a5fa":"#64748b",cursor:"pointer",fontWeight:libCat===cat.cat?600:400}}>{cat.cat}</button>
                  ))}
                </div>
                {/* Device items */}
                <div style={{padding:"6px"}}>
                  {deviceLib.find(c=>c.cat===libCat)?.items.map((item,i)=>(
                    <button key={i} onClick={()=>addDevice(item)} style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"8px 10px",background:"rgba(15,23,42,0.4)",border:"1px solid #1e293b",borderRadius:6,cursor:"pointer",marginBottom:4,textAlign:"left",transition:"all 0.15s"}}
                      onMouseEnter={e=>e.currentTarget.style.borderColor="#334155"} onMouseLeave={e=>e.currentTarget.style.borderColor="#1e293b"}>
                      <div style={{width:8,height:8,borderRadius:2,background:item.color,flexShrink:0}} />
                      <div>
                        <div style={{fontSize:11,color:"#e2e8f0",fontWeight:500}}>{item.type}</div>
                        <div style={{fontSize:9,color:"#475569"}}>{item.mfr||"Generic"} · {item.ports.length} ports</div>
                      </div>
                    </button>
                  ))}
                </div>
              </div>
            )}
          </div>

          {/* Canvas */}
          <div style={{flex:1,position:"relative",overflow:"hidden",background:"#0a0f1a"}}>
            {/* Toolbar */}
            <div style={{position:"absolute",top:10,left:10,right:10,display:"flex",gap:6,zIndex:10,flexWrap:"wrap"}}>
              <button onClick={deleteSelected} disabled={selected===null&&selectedConn===null&&selectedRoom===null} style={{padding:"5px 12px",background:(selected||selectedConn||selectedRoom)?"rgba(239,68,68,0.15)":"rgba(30,41,59,0.5)",border:"1px solid "+((selected||selectedConn||selectedRoom)?"rgba(239,68,68,0.3)":"#1e293b"),borderRadius:5,color:(selected||selectedConn||selectedRoom)?"#f87171":"#475569",fontSize:11,cursor:(selected||selectedConn||selectedRoom)?"pointer":"default"}}>Delete Selected</button>
              <button onClick={clearAll} style={{padding:"5px 12px",background:"rgba(30,41,59,0.5)",border:"1px solid #1e293b",borderRadius:5,color:"#94a3b8",fontSize:11,cursor:"pointer"}}>Clear All</button>
              <button onClick={addRoom} style={{padding:"5px 12px",background:"rgba(59,130,246,0.1)",border:"1px dashed rgba(59,130,246,0.4)",borderRadius:5,color:"#60a5fa",fontSize:11,cursor:"pointer",fontWeight:500}}>+ Add Location</button>
              {selectedRoom && <button onClick={()=>cycleRoomColor(selectedRoom)} style={{padding:"5px 12px",background:"rgba(168,85,247,0.1)",border:"1px solid rgba(168,85,247,0.3)",borderRadius:5,color:"#a855f7",fontSize:11,cursor:"pointer"}}>Change Color</button>}
              <button onClick={()=>setShowBOM(!showBOM)} style={{padding:"5px 12px",background:showBOM?"rgba(59,130,246,0.2)":"rgba(30,41,59,0.5)",border:"1px solid "+(showBOM?"rgba(59,130,246,0.4)":"#1e293b"),borderRadius:5,color:showBOM?"#60a5fa":"#94a3b8",fontSize:11,cursor:"pointer",fontWeight:showBOM?600:400}}>{showBOM?"\u2610 Hide BOM":"\u2611 Show BOM"} ({devices.length})</button>
              {connecting && <span style={{padding:"5px 12px",background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:5,color:"#60a5fa",fontSize:11}}>Click a port to complete connection... <button onClick={()=>setConnecting(null)} style={{background:"none",border:"none",color:"#f87171",cursor:"pointer",fontSize:11,marginLeft:4}}>Cancel</button></span>}
              <div style={{marginLeft:"auto",display:"flex",gap:4,flexWrap:"wrap"}}>
                {SIGNAL_TYPES.map(s=>(
                  <span key={s.id} style={{display:"inline-flex",alignItems:"center",gap:3,padding:"3px 8px",borderRadius:4,fontSize:9,background:"rgba(15,23,42,0.6)",border:"1px solid #1e293b",color:s.color}}>
                    <span style={{width:8,height:2,background:s.color,borderRadius:1,display:"inline-block"}}></span>{s.name}
                  </span>
                ))}
              </div>
            </div>

            {/* SVG Canvas */}
            <svg ref={canvasRef} width="100%" height="100%" onMouseDown={handleCanvasMouseDown} style={{cursor:"default"}}>
              <defs>
                <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
                  <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#1e293b" strokeWidth="0.5" opacity="0.4"/>
                </pattern>
              </defs>
              <rect width="100%" height="100%" fill="url(#grid)" />

              {/* Room Boundaries */}
              {rooms.map(room=>{
                const isSel = selectedRoom===room.id;
                const rx = room.x+panOffset.x, ry = room.y+panOffset.y;
                const handleSize = 8;
                return (
                  <g key={room.id}>
                    {/* Room fill */}
                    <rect x={rx} y={ry} width={room.w} height={room.h} rx={3} fill={room.color+"08"} stroke={room.color+(isSel?"88":"44")} strokeWidth={isSel?2.5:1.5} strokeDasharray={isSel?"8 4":"6 4"} onMouseDown={(e)=>handleRoomMouseDown(e,room)} style={{cursor:"move"}} />
                    {/* Label background */}
                    <rect x={rx} y={ry-1} width={Math.min(room.w,Math.max(100,room.label.length*9+24))} height={24} rx={3} fill={room.color+"22"} stroke={room.color+"55"} strokeWidth={1} onMouseDown={(e)=>handleRoomMouseDown(e,room)} style={{cursor:"move"}} />
                    {/* Label text or input */}
                    {editingRoom===room.id ? (
                      <foreignObject x={rx+4} y={ry+1} width={Math.max(160,room.label.length*9+30)} height={22}>
                        <input autoFocus defaultValue={room.label} onBlur={(e)=>finishRoomEdit(room.id,e.target.value)} onKeyDown={(e)=>{if(e.key==="Enter")finishRoomEdit(room.id,e.target.value);}} style={{width:"100%",padding:"2px 6px",background:"#0f172a",border:"1px solid "+room.color,borderRadius:3,color:"#e2e8f0",fontSize:11,fontWeight:600,fontFamily:"Inter, sans-serif",outline:"none",boxSizing:"border-box",height:"20px"}} />
                      </foreignObject>
                    ) : (
                      <text x={rx+12} y={ry+15} fontSize={11} fill={room.color} fontFamily="Inter, sans-serif" fontWeight={700} style={{cursor:"pointer"}} onDoubleClick={()=>handleRoomLabelEdit(room.id)} onMouseDown={(e)=>handleRoomMouseDown(e,room)}>
                        {room.label}
                      </text>
                    )}
                    {/* Resize handles (visible when selected) */}
                    {isSel && <>
                      <rect x={rx+room.w-handleSize} y={ry+room.h-handleSize} width={handleSize} height={handleSize} fill={room.color} rx={2} opacity={0.7} style={{cursor:"se-resize"}} onMouseDown={(e)=>handleRoomResize(e,room,"se")} />
                      <rect x={rx+room.w-handleSize} y={ry} width={handleSize} height={handleSize} fill={room.color} rx={2} opacity={0.5} style={{cursor:"ne-resize"}} onMouseDown={(e)=>handleRoomResize(e,room,"ne")} />
                      <rect x={rx} y={ry+room.h-handleSize} width={handleSize} height={handleSize} fill={room.color} rx={2} opacity={0.5} style={{cursor:"sw-resize"}} onMouseDown={(e)=>handleRoomResize(e,room,"sw")} />
                      <rect x={rx+room.w/2-handleSize/2} y={ry+room.h-handleSize} width={handleSize} height={handleSize} fill={room.color} rx={2} opacity={0.4} style={{cursor:"s-resize"}} onMouseDown={(e)=>handleRoomResize(e,room,"s")} />
                      <rect x={rx+room.w-handleSize} y={ry+room.h/2-handleSize/2} width={handleSize} height={handleSize} fill={room.color} rx={2} opacity={0.4} style={{cursor:"e-resize"}} onMouseDown={(e)=>handleRoomResize(e,room,"e")} />
                    </>}
                  </g>
                );
              })}

              {/* Connections */}
              {connections.map(renderConnection)}

              {/* Devices */}
              {devices.map(dev=>{
                const isSel = selected===dev.id;
                const leftPorts = dev.ports.filter(p=>p.side==="left");
                const rightPorts = dev.ports.filter(p=>p.side==="right");
                return (
                  <g key={dev.id} onMouseDown={(e)=>handleDeviceMouseDown(e,dev)} style={{cursor:"grab"}}>
                    {/* Shadow */}
                    <rect x={dev.x+panOffset.x+2} y={dev.y+panOffset.y+2} width={dev.w} height={dev.h} rx={6} fill="#000" opacity={0.3} />
                    {/* Body */}
                    <rect x={dev.x+panOffset.x} y={dev.y+panOffset.y} width={dev.w} height={dev.h} rx={6} fill="#0f172a" stroke={isSel?"#3b82f6":dev.color+"88"} strokeWidth={isSel?2:1.5} />
                    {/* Color bar */}
                    <rect x={dev.x+panOffset.x} y={dev.y+panOffset.y} width={4} height={dev.h} rx={2} fill={dev.color} opacity={0.8} />
                    {/* Label */}
                    <text x={dev.x+panOffset.x+dev.w/2} y={dev.y+panOffset.y+14} textAnchor="middle" fontSize={11} fill="#e2e8f0" fontFamily="Inter, sans-serif" fontWeight={600}>{dev.type}</text>
                    {/* Left ports */}
                    {leftPorts.map((port,pi)=>{
                      const spacing = dev.h/(leftPorts.length+1);
                      const py = dev.y+panOffset.y+spacing*(pi+1);
                      const px = dev.x+panOffset.x;
                      const sig = SIGNAL_TYPES.find(s=>s.id===port.signal);
                      const isConn = connecting && connecting.portId!==port.id;
                      return (
                        <g key={port.id} onClick={(e)=>handlePortClick(e,dev,port)} style={{cursor:"pointer"}}>
                          <circle cx={px} cy={py} r={isConn?6:5} fill={sig?sig.color:"#64748b"} stroke="#0f172a" strokeWidth={1.5} opacity={isConn?1:0.8} />
                          <text x={px+10} y={py+3} fontSize={8} fill="#94a3b8" fontFamily="'JetBrains Mono', monospace">{port.label}</text>
                        </g>
                      );
                    })}
                    {/* Right ports */}
                    {rightPorts.map((port,pi)=>{
                      const spacing = dev.h/(rightPorts.length+1);
                      const py = dev.y+panOffset.y+spacing*(pi+1);
                      const px = dev.x+panOffset.x+dev.w;
                      const sig = SIGNAL_TYPES.find(s=>s.id===port.signal);
                      const isConn = connecting && connecting.portId!==port.id;
                      return (
                        <g key={port.id} onClick={(e)=>handlePortClick(e,dev,port)} style={{cursor:"pointer"}}>
                          <circle cx={px} cy={py} r={isConn?6:5} fill={sig?sig.color:"#64748b"} stroke="#0f172a" strokeWidth={1.5} opacity={isConn?1:0.8} />
                          <text x={px-10} y={py+3} fontSize={8} fill="#94a3b8" fontFamily="'JetBrains Mono', monospace" textAnchor="end">{port.label}</text>
                        </g>
                      );
                    })}
                  </g>
                );
              })}

              {/* Empty state */}
              {devices.length===0 && (
                <text x="50%" y="50%" textAnchor="middle" fontSize={14} fill="#334155" fontFamily="Inter, sans-serif">Click devices from the library to add them to the canvas</text>
              )}
            </svg>

            {/* Instructions */}
            <div style={{position:"absolute",bottom:10,left:10,right:10,display:"flex",gap:12,fontSize:10,color:"#475569"}}>
              <span>{"\u2022"} Click library items to add</span>
              <span>{"\u2022"} Drag devices to move</span>
              <span>{"\u2022"} Click a port, then click another port to connect</span>
              <span>{"\u2022"} Click + Add Location for boundaries</span>
              <span>{"\u2022"} Double-click location label to edit</span>
              <span>{"\u2022"} Drag corners to resize locations</span>
            </div>
          </div>

          {/* BOM Panel */}
          {showBOM && (
            <div style={{width:360,background:"#080d17",borderLeft:"1px solid #1e293b",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
              <div style={{padding:"12px 14px",borderBottom:"1px solid #1e293b",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <span style={{fontSize:13,fontWeight:600,color:"#e2e8f0"}}>Bill of Materials</span>
                <span style={{fontSize:11,color:"#64748b"}}>{devices.length} devices · {connections.length} cables</span>
              </div>
              <div style={{flex:1,overflowY:"auto",padding:0}}>
                {/* Equipment BOM Table */}
                {devices.length === 0 ? (
                  <div style={{padding:20,textAlign:"center",color:"#334155",fontSize:12}}>Add devices to canvas to generate BOM</div>
                ) : (
                  <div>
                    <div style={{padding:"10px 14px 6px",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em"}}>Equipment Schedule</div>
                    <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                      <thead>
                        <tr>
                          <th style={{padding:"6px 10px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>#</th>
                          <th style={{padding:"6px 10px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Device</th>
                          <th style={{padding:"6px 6px",textAlign:"center",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Mfr</th>
                          <th style={{padding:"6px 6px",textAlign:"center",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Qty</th>
                          <th style={{padding:"6px 6px",textAlign:"right",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Unit $</th>
                          <th style={{padding:"6px 10px",textAlign:"right",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Ext $</th>
                        </tr>
                      </thead>
                      <tbody>
                        {generateBOM().map((item,i) => {
                          const unitPrice = bomPrices[item.type] !== undefined ? bomPrices[item.type] : (item.listPrice || 0);
                          const extPrice = unitPrice * item.qty;
                          return (
                            <tr key={i} style={{background:i%2===0?"transparent":"rgba(15,23,42,0.3)"}}>
                              <td style={{padding:"6px 10px",color:"#475569",borderBottom:"1px solid #1e293b"}}>{i+1}</td>
                              <td style={{padding:"6px 10px",borderBottom:"1px solid #1e293b"}}>
                                <div style={{color:"#e2e8f0",fontWeight:500,fontSize:11}}>{item.type}</div>
                              </td>
                              <td style={{padding:"6px 6px",textAlign:"center",color:"#94a3b8",borderBottom:"1px solid #1e293b",fontSize:10}}>{item.mfr}</td>
                              <td style={{padding:"6px 6px",textAlign:"center",borderBottom:"1px solid #1e293b"}}>
                                <span style={{background:"rgba(59,130,246,0.12)",color:"#60a5fa",padding:"2px 8px",borderRadius:10,fontWeight:600,fontSize:11}}>{item.qty}</span>
                              </td>
                              <td style={{padding:"6px 6px",textAlign:"right",borderBottom:"1px solid #1e293b"}}>
                                <input type="number" value={unitPrice} onChange={e=>{setBomPrices(prev=>({...prev,[item.type]:parseFloat(e.target.value)||0}));}} style={{width:60,padding:"3px 5px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontSize:10,fontFamily:"'JetBrains Mono',monospace",textAlign:"right",outline:"none"}} />
                              </td>
                              <td style={{padding:"6px 10px",textAlign:"right",borderBottom:"1px solid #1e293b",color:extPrice>0?"#60a5fa":"#475569",fontFamily:"'JetBrains Mono',monospace",fontSize:11,fontWeight:500}}>
                                {extPrice > 0 ? "$"+extPrice.toLocaleString() : "—"}
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                      <tfoot>
                        <tr>
                          <td colSpan={3} style={{padding:"8px 10px",fontWeight:700,color:"#e2e8f0",fontSize:11,borderTop:"2px solid #1e293b"}}>TOTAL</td>
                          <td style={{padding:"8px 6px",textAlign:"center",fontWeight:700,color:"#e2e8f0",fontSize:11,borderTop:"2px solid #1e293b"}}>{devices.length}</td>
                          <td style={{borderTop:"2px solid #1e293b"}}></td>
                          <td style={{padding:"8px 10px",textAlign:"right",fontWeight:700,color:"#60a5fa",fontFamily:"'JetBrains Mono',monospace",fontSize:12,borderTop:"2px solid #1e293b"}}>
                            {"$"+generateBOM().reduce((sum,item) => { const up = bomPrices[item.type] !== undefined ? bomPrices[item.type] : (item.listPrice||0); return sum + up * item.qty; }, 0).toLocaleString()}
                          </td>
                        </tr>
                      </tfoot>
                    </table>

                    {/* Cable Schedule */}
                    {connections.length > 0 && (
                      <div>
                        <div style={{padding:"14px 14px 6px",fontSize:10,fontWeight:700,color:"#64748b",textTransform:"uppercase",letterSpacing:"0.06em",borderTop:"1px solid #1e293b",marginTop:8}}>Cable Schedule</div>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:10}}>
                          <thead>
                            <tr>
                              <th style={{padding:"5px 10px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Cable</th>
                              <th style={{padding:"5px 6px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>From</th>
                              <th style={{padding:"5px 6px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>To</th>
                              <th style={{padding:"5px 6px",textAlign:"left",color:"#64748b",borderBottom:"1px solid #1e293b",fontWeight:600,fontSize:9,textTransform:"uppercase"}}>Signal</th>
                            </tr>
                          </thead>
                          <tbody>
                            {generateCableSchedule().map((cable,i) => (
                              <tr key={i} style={{background:i%2===0?"transparent":"rgba(15,23,42,0.3)"}}>
                                <td style={{padding:"5px 10px",color:"#94a3b8",borderBottom:"1px solid #1e293b",fontFamily:"'JetBrains Mono',monospace"}}>C{String(cable.id).padStart(2,"0")}</td>
                                <td style={{padding:"5px 6px",borderBottom:"1px solid #1e293b"}}>
                                  <div style={{color:"#e2e8f0",fontSize:10}}>{cable.from}</div>
                                  <div style={{color:"#475569",fontSize:9}}>{cable.fromPort}</div>
                                </td>
                                <td style={{padding:"5px 6px",borderBottom:"1px solid #1e293b"}}>
                                  <div style={{color:"#e2e8f0",fontSize:10}}>{cable.to}</div>
                                  <div style={{color:"#475569",fontSize:9}}>{cable.toPort}</div>
                                </td>
                                <td style={{padding:"5px 6px",borderBottom:"1px solid #1e293b"}}>
                                  <span style={{display:"inline-flex",alignItems:"center",gap:3,color:cable.color,fontSize:10,fontWeight:500}}>
                                    <span style={{width:8,height:2,background:cable.color,borderRadius:1,display:"inline-block"}}></span>{cable.signal}
                                  </span>
                                </td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </div>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }

    // ─── EDID & HDCP STRATEGY ──────────────────────────────────────

    function EDIDHDCPStrategy() {
      const emptyRow = {srcMake:"",srcRes:"4K 60 4:4:4",inter1:"",inter2:"",platform:"",hdcp:"On",dispMake:"",aspectRatio:"16:9",desiredRes:"1080p",frameRate:"60",colorSpace:"YCbCr",chroma:"4:4:4"};
      const [rows, setRows] = useState([{...emptyRow, srcMake:"Bright Sign Player 1",inter1:"Extron MQP 641 Switcher",inter2:"-",platform:"",hdcp:"On",dispMake:"Samsung QM65r",desiredRes:"1080p",colorSpace:"YCbCr",chroma:"4:4:4"}]);

      const updateRow = (i, field, val) => { const n=[...rows]; n[i]={...n[i],[field]:val}; setRows(n); };
      const addRow = () => setRows([...rows, {...emptyRow}]);
      const removeRow = (i) => setRows(rows.filter((_,j)=>j!==i));

      const resOptions = ["4K 60 4:4:4","4K 60 4:2:2","4K 60 4:2:0","4K 30 4:4:4","1080p","1080i","720p","WUXGA","SXGA+","XGA","Custom"];
      const arOptions = ["16:9","16:10","21:9","4:3","32:9","Custom"];
      const outResOptions = ["4K (3840x2160)","1080p (1920x1080)","1080i","720p (1280x720)","WUXGA (1920x1200)","SXGA+ (1400x1050)","XGA (1024x768)","Custom"];
      const frOptions = ["24","30","50","60","120","Custom"];
      const csOptions = ["RGB","YCbCr","BT.2020","Custom"];
      const chromaOptions = ["4:4:4","4:2:2","4:2:0"];
      const hdcpOptions = ["On","Off"];
      const platformOptions = ["","Apple","PC","Android","ChromeOS"];

      const cellStyle = {padding:"4px 3px",borderBottom:"1px solid #1e293b",verticalAlign:"top"};
      const inputStyle = {width:"100%",padding:"5px 6px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:4,color:"#e2e8f0",fontSize:11,outline:"none",boxSizing:"border-box"};
      const selectStyle = {...inputStyle,cursor:"pointer"};
      const thStyle = {padding:"6px 4px",fontSize:9,fontWeight:700,color:"#94a3b8",textAlign:"left",textTransform:"uppercase",letterSpacing:"0.04em",borderBottom:"2px solid #1e293b",whiteSpace:"nowrap",position:"sticky",top:0,background:"#0a0f1a",zIndex:2};

      // Check HDCP compatibility
      const getHDCPStatus = (row) => {
        if(row.hdcp==="Off") return {color:"#f59e0b",text:"Non-compliant",tip:"HDCP disabled \u2014 protected content may show black screen"};
        const is4K = row.srcRes.startsWith("4K");
        if(is4K) return {color:"#4ade80",text:"HDCP 2.2+ Required",tip:"4K UHD content requires HDCP 2.2 or higher on ALL devices in chain"};
        return {color:"#4ade80",text:"HDCP 1.4+",tip:"HD content requires minimum HDCP 1.4"};
      };

      // Check resolution compatibility
      const getResStatus = (row) => {
        const src4K = row.srcRes.startsWith("4K");
        const dst4K = row.desiredRes.startsWith("4K");
        if(src4K && !dst4K) return {color:"#f59e0b",text:"Downscale",tip:"Source is 4K but destination is lower \u2014 scaler may be needed"};
        if(!src4K && dst4K) return {color:"#ef4444",text:"Upscale",tip:"Cannot upscale source to 4K natively"};
        return {color:"#4ade80",text:"Match",tip:"Source and destination resolution compatible"};
      };

      return (
        <div>
          {/* EDID Strategy Info */}
          <div style={{marginBottom:20,padding:16,background:"rgba(15,23,42,0.5)",borderRadius:8,border:"1px solid #1e293b"}}>
            <h3 style={{fontSize:14,fontWeight:600,color:"#e2e8f0",marginBottom:8}}>EDID Strategy</h3>
            <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.7,marginBottom:10}}>An EDID strategy involves managing how display identification data is handled to ensure optimal performance and prevent common AV issues:</p>
            <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.8}}>
              <div><strong style={{color:"#e2e8f0"}}>Resolution mismatches</strong> \u2014 when a source outputs a resolution a display can't support</div>
              <div><strong style={{color:"#e2e8f0"}}>No signal errors</strong> \u2014 if the source doesn't recognize the display correctly</div>
              <div><strong style={{color:"#e2e8f0"}}>Audio dropouts</strong> \u2014 especially with HDMI setups when audio formats aren't negotiated properly</div>
            </div>
            <div style={{marginTop:12,fontSize:12,color:"#94a3b8",lineHeight:1.8}}>
              <div style={{fontWeight:600,color:"#e2e8f0",marginBottom:4}}>Key components of an EDID strategy:</div>
              <div><strong style={{color:"#60a5fa"}}>EDID Management Tools</strong> \u2014 using hardware (matrix switchers, scalers, or EDID emulators) to customize EDID info</div>
              <div><strong style={{color:"#60a5fa"}}>Predefined EDIDs</strong> \u2014 locking devices to specific profiles, preventing unexpected changes when devices are plugged/unplugged</div>
              <div><strong style={{color:"#60a5fa"}}>EDID Passthrough</strong> \u2014 allowing the source to read EDID directly from the display \u2014 useful for simple setups</div>
              <div><strong style={{color:"#60a5fa"}}>EDID Emulation</strong> \u2014 creating custom profiles for complex setups, ensuring compatibility across multiple displays</div>
            </div>
          </div>

          {/* HDCP Strategy Info */}
          <div style={{marginBottom:20,padding:16,background:"rgba(15,23,42,0.5)",borderRadius:8,border:"1px solid #1e293b"}}>
            <h3 style={{fontSize:14,fontWeight:600,color:"#e2e8f0",marginBottom:8}}>HDCP Strategy</h3>
            <p style={{fontSize:12,color:"#ef4444",fontWeight:600,marginBottom:10}}>**Using videoconferencing to share HDCP material violates copyright and is not supported. This IS the main reason we would set HDCP settings to non-compliant.</p>
            <p style={{fontSize:12,color:"#94a3b8",lineHeight:1.7,marginBottom:10}}>An HDCP Strategy refers to a plan to implement <strong style={{color:"#e2e8f0"}}>High-bandwidth Digital Content Protection (HDCP)</strong> \u2014 a security protocol developed by Intel to prevent unauthorized copying of digital audio and video content across HDMI, DisplayPort, or DVI.</p>
            <div style={{fontSize:12,color:"#94a3b8",lineHeight:1.8}}>
              <div><strong style={{color:"#e2e8f0"}}>Compliance & Licensing:</strong> Ensuring all hardware and software meet HDCP licensing requirements from DCP LLC</div>
              <div><strong style={{color:"#e2e8f0"}}>Device Compatibility:</strong> Making sure devices support the same HDCP version, avoiding handshake errors or black screens</div>
              <div><strong style={{color:"#e2e8f0"}}>Version Management:</strong> HDCP has multiple versions (1.4, 2.2, etc.). <strong style={{color:"#f59e0b"}}>HDCP 2.2 is required for 4K UHD</strong> content protection</div>
              <div><strong style={{color:"#e2e8f0"}}>Testing & Validation:</strong> Rigorous testing to detect compatibility issues in multi-device setups</div>
            </div>
          </div>

          {/* Signal Chain Table */}
          <div style={{marginBottom:16,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <h3 style={{fontSize:14,fontWeight:600,color:"#e2e8f0"}}>Signal Chain Planner</h3>
            <button onClick={addRow} style={{padding:"6px 14px",background:"rgba(59,130,246,0.1)",border:"1px dashed #3b82f6",borderRadius:6,color:"#60a5fa",fontSize:11,cursor:"pointer"}}>+ Add Row</button>
          </div>

          <div style={{overflowX:"auto",borderRadius:8,border:"1px solid #1e293b"}}>
            <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,minWidth:1200}}>
              <thead>
                <tr>
                  <th colSpan={2} style={{...thStyle,textAlign:"center",background:"rgba(59,130,246,0.08)",color:"#60a5fa",fontSize:10}}>Source</th>
                  <th colSpan={2} style={{...thStyle,textAlign:"center",background:"rgba(168,85,247,0.08)",color:"#a855f7",fontSize:10}}>Intermediary Devices</th>
                  <th colSpan={2} style={{...thStyle,textAlign:"center",background:"rgba(251,191,36,0.08)",color:"#fbbf24",fontSize:10}}>Settings</th>
                  <th colSpan={6} style={{...thStyle,textAlign:"center",background:"rgba(34,197,94,0.08)",color:"#22c55e",fontSize:10}}>Destination</th>
                  <th style={{...thStyle,width:30}}></th>
                </tr>
                <tr>
                  <th style={thStyle}>Source Make/Model</th>
                  <th style={thStyle}>Source Output Res</th>
                  <th style={thStyle}>Intermediary 1</th>
                  <th style={thStyle}>Intermediary 2</th>
                  <th style={thStyle}>Platform</th>
                  <th style={thStyle}>HDCP</th>
                  <th style={thStyle}>Display Make/Model</th>
                  <th style={thStyle}>Aspect Ratio</th>
                  <th style={thStyle}>Desired Resolution</th>
                  <th style={thStyle}>Frame Rate</th>
                  <th style={thStyle}>Color Space</th>
                  <th style={thStyle}>Chroma Sub</th>
                  <th style={thStyle}></th>
                </tr>
              </thead>
              <tbody>
                {rows.map((row,i) => {
                  const hdcpStatus = getHDCPStatus(row);
                  const resStatus = getResStatus(row);
                  return (
                    <tr key={i} style={{background:i%2===0?"transparent":"rgba(15,23,42,0.2)"}}>
                      <td style={cellStyle}><input value={row.srcMake} onChange={e=>updateRow(i,"srcMake",e.target.value)} placeholder="e.g., BrightSign" style={inputStyle} /></td>
                      <td style={cellStyle}><select value={row.srcRes} onChange={e=>updateRow(i,"srcRes",e.target.value)} style={selectStyle}>{resOptions.map(o=><option key={o} value={o}>{o}</option>)}</select></td>
                      <td style={{...cellStyle,background:"rgba(168,85,247,0.03)"}}><input value={row.inter1} onChange={e=>updateRow(i,"inter1",e.target.value)} placeholder="enc/dec, switcher" style={inputStyle} /></td>
                      <td style={{...cellStyle,background:"rgba(168,85,247,0.03)"}}><input value={row.inter2} onChange={e=>updateRow(i,"inter2",e.target.value)} placeholder="-" style={inputStyle} /></td>
                      <td style={cellStyle}><select value={row.platform} onChange={e=>updateRow(i,"platform",e.target.value)} style={selectStyle}>{platformOptions.map(o=><option key={o} value={o}>{o||"Select One"}</option>)}</select></td>
                      <td style={cellStyle}>
                        <select value={row.hdcp} onChange={e=>updateRow(i,"hdcp",e.target.value)} style={{...selectStyle,color:row.hdcp==="On"?"#4ade80":"#f59e0b",fontWeight:600}}>
                          {hdcpOptions.map(o=><option key={o} value={o}>{o}</option>)}
                        </select>
                      </td>

    function RFIManager() {
      const emptyRFI = {projectName:"",location:"",projectNum:"",trade:"Audio Visual",focusArea:"",attention:"",date:new Date().toISOString().split("T")[0],submittedBy:"",email:"",phone:"",company:""};
      const emptyItem = {question:"",response:"",status:"Open",priority:"Normal",dateAsked:"",dateAnswered:""};
      const [rfiList, setRfiList] = useState([{...emptyRFI, id:1, rfiNum:"RFI-001", items:[{...emptyItem,id:1}]}]);
      const [activeRFI, setActiveRFI] = useState(0);
      const [showNewForm, setShowNewForm] = useState(false);

      const rfi = rfiList[activeRFI] || rfiList[0];
      const updateRFI = (field, val) => { const n=[...rfiList]; n[activeRFI]={...n[activeRFI],[field]:val}; setRfiList(n); };
      const updateItem = (idx, field, val) => {
        const n=[...rfiList]; const items=[...n[activeRFI].items]; items[idx]={...items[idx],[field]:val};
        if(field==="response" && val && !items[idx].dateAnswered) items[idx].dateAnswered=new Date().toISOString().split("T")[0];
        if(field==="response" && val) items[idx].status="Answered";
        n[activeRFI]={...n[activeRFI],items}; setRfiList(n);
      };
      const addItem = () => { const n=[...rfiList]; const items=[...n[activeRFI].items]; items.push({...emptyItem,id:items.length+1,dateAsked:new Date().toISOString().split("T")[0]}); n[activeRFI]={...n[activeRFI],items}; setRfiList(n); };
      const removeItem = (idx) => { const n=[...rfiList]; const items=n[activeRFI].items.filter((_,i)=>i!==idx); n[activeRFI]={...n[activeRFI],items}; setRfiList(n); };
      const addRFI = () => {
        const num = rfiList.length+1;
        setRfiList([...rfiList,{...emptyRFI, id:num, rfiNum:"RFI-"+String(num).padStart(3,"0"), items:[{...emptyItem,id:1,dateAsked:new Date().toISOString().split("T")[0]}]}]);
        setActiveRFI(rfiList.length);
        setShowNewForm(false);
      };
      const deleteRFI = (idx) => { if(rfiList.length<=1) return; const n=rfiList.filter((_,i)=>i!==idx); setRfiList(n); if(activeRFI>=n.length) setActiveRFI(n.length-1); };

      const statusColors = {Open:"#f59e0b",Answered:"#22c55e",Closed:"#64748b","Needs Followup":"#ef4444"};
      const priorityColors = {Low:"#64748b",Normal:"#3b82f6",High:"#f59e0b",Urgent:"#ef4444"};

      const openCount = rfi.items.filter(i=>i.status==="Open").length;
      const answeredCount = rfi.items.filter(i=>i.status==="Answered").length;

      const inputStyle = {width:"100%",padding:"7px 10px",background:"#0f172a",border:"1px solid #1e293b",borderRadius:5,color:"#e2e8f0",fontSize:12,outline:"none",boxSizing:"border-box"};

      const selectStyle = {...inputStyle,cursor:"pointer"};

      const exportText = () => {
        let txt = "REQUEST FOR INFORMATION (RFI)\n"+("=").repeat(50)+"\n\n";
        txt += "RFI #: "+rfi.rfiNum+"\nDate: "+rfi.date+"\nProject: "+rfi.projectName+"\nLocation: "+rfi.location+"\nProject #: "+rfi.projectNum+"\nTrade: "+rfi.trade+"\nFocus Area: "+rfi.focusArea+"\nAttention: "+rfi.attention+"\n\n";
        txt += "Submitted By: "+rfi.submittedBy+"\nCompany: "+rfi.company+"\nEmail: "+rfi.email+"\nPhone: "+rfi.phone+"\n\n";
        txt += ("-").repeat(80)+"\n";
        txt += "Item#  | Status    | Priority | Question / Response\n";
        txt += ("-").repeat(80)+"\n";
        rfi.items.forEach((item,i) => {
          txt += String(i+1).padStart(2,"0")+"     | "+item.status.padEnd(9)+" | "+item.priority.padEnd(8)+" | Q: "+item.question+"\n";

              <div style={{fontSize:9,color:"#22c55e",fontWeight:600,textTransform:"uppercase"}}>Answered</div>
            </div>
            <div style={{flex:1,padding:10,borderRadius:8,background:"rgba(59,130,246,0.06)",border:"1px solid rgba(59,130,246,0.15)",textAlign:"center"}}>

      const [selectedUid, setSelectedUid] = useState(null);
      const [viewMode, setViewMode] = useState("3d"); // "3d" or "plan"

      const svgRef = React.useRef(null);

      const handleDeviceMouseDown = (e, uid) => {
        e.stopPropagation();
        setDragUid(uid);
        setSelectedUid(uid);
        const svg = svgRef.current;
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        setDragStart({x: svgP.x, y: svgP.y});
      };

      const handleSvgMouseMove = (e) => {
        if(!dragUid || !dragStart) return;
        const svg = svgRef.current;
        const pt = svg.createSVGPoint();
        pt.x = e.clientX; pt.y = e.clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        const dxPx = svgP.x - dragStart.x;
        const dyPx = svgP.y - dragStart.y;
        const dev = placedDevices.find(d=>d.uid===dragUid);
        if(!dev) return;

        if(viewMode==="plan") {
          const dxW = dxPx / planScale;
          const dyW = dyPx / planScale;
          if(dev.mountWall==="north"||dev.mountWall==="south") {
            const newX = Math.max(0, Math.min(roomW, dev.x + dxW));
            setPlacedDevices(prev=>prev.map(d=>d.uid===dragUid?{...d, x:newX}:d));
          } else if(dev.mountWall==="west"||dev.mountWall==="east") {
            const newY = Math.max(0, Math.min(roomL, dev.y + dyW));
            setPlacedDevices(prev=>prev.map(d=>d.uid===dragUid?{...d, y:newY}:d));
          } else {
            const newX = Math.max(0, Math.min(roomW, dev.x + dxW));
            const newY = Math.max(0, Math.min(roomL, dev.y + dyW));
            setPlacedDevices(prev=>prev.map(d=>d.uid===dragUid?{...d, x:newX, y:newY}:d));
          }
        } else {
          const s32 = 32*scale, s18 = 18*scale, s38 = 38*scale;
          if(dev.mountWall==="north"||dev.mountWall==="south"||dev.mountWall==="west"||dev.mountWall==="east") {
            if(dev.mountWall==="north"||dev.mountWall==="south") {
              const dxW = dxPx / s32;
              const dzW = -(dyPx - dxW * s18) / s38;
              const newX = Math.max(0, Math.min(roomW, dev.x + dxW));
              const newZ = Math.max(0, Math.min(roomH, dev.z + dzW));
              setPlacedDevices(prev=>prev.map(d=>d.uid===dragUid?{...d, x:newX, z:newZ}:d));
            } else {
              const dyW = -dxPx / s32;
              const dzW = -(dyPx + dyW * s18) / s38;
              const newY = Math.max(0, Math.min(roomL, dev.y + dyW));
              const newZ = Math.max(0, Math.min(roomH, dev.z + dzW));
              setPlacedDevices(prev=>prev.map(d=>d.uid===dragUid?{...d, y:newY, z:newZ}:d));
            }
          } else {
            const dxW = dxPx/(2*s32) + dyPx/(2*s18);
            const dyW = -dxPx/(2*s32) + dyPx/(2*s18);
            const newX = Math.max(0, Math.min(roomW, dev.x + dxW));
            const newY = Math.max(0, Math.min(roomL, dev.y + dyW));
            setPlacedDevices(prev=>prev.map(d=>d.uid===dragUid?{...d, x:newX, y:newY}:d));
          }
        }
        setDragStart({x: svgP.x, y: svgP.y});
      };

      const handleSvgMouseUp = () => { setDragUid(null); setDragStart(null); };

      const ft = 3.28084;
      const toDisplay = (m) => useFeet ? (m*ft).toFixed(1) : m.toFixed(1);
      const fromDisplay = (v) => useFeet ? v/ft : v;
      const u = useFeet ? "ft" : "m";

      const selectRoom = (rt) => {
        setRoomType(rt.id); setRoomW(rt.w); setRoomL(rt.l); setRoomH(rt.h);
        setTableSeats(rt.maxSeats);
        setTableWidth(rt.maxSeats <= 6 ? 1.0 : rt.maxSeats <= 12 ? 1.2 : 1.5);
        setTableWallDist(rt.l * 0.2);
        setPlacedDevices([]); setStep(2);
      };

      const addDeviceToRoom = (dev) => {
        const id = Date.now();
        let x=0.5, y=0.5, z=0;
        let mountWall = "north";
        if(dev.wall==="front" || dev.wall==="side") {
          // Wall-mounted device - use selectedWall
          mountWall = selectedWall;
          if(selectedWall==="north") { x=roomW/2; y=0.02; z=roomH*0.55; }
          else if(selectedWall==="south") { x=roomW/2; y=roomL-0.02; z=roomH*0.55; }
          else if(selectedWall==="west") { x=0.02; y=roomL/2; z=roomH*0.55; }
          else if(selectedWall==="east") { x=roomW-0.02; y=roomL/2; z=roomH*0.55; }
        }
        else if(dev.wall==="ceiling") { x=roomW/2; y=roomL/2; z=roomH-0.05; mountWall="ceiling"; }
        else if(dev.wall==="table") { x=roomW/2; y=roomL/2; z=0.76; mountWall="floor"; }
        else if(dev.wall==="floor") { x=roomW/2; y=roomL/2; z=0; mountWall="floor"; }
        setPlacedDevices(prev=>[...prev,{...dev,uid:id,x,y,z,mountWall}]);
      };

      const removeDevice = (uid) => setPlacedDevices(prev=>prev.filter(d=>d.uid!==uid));

      // Isometric projection helpers
      const isoX = (x, y) => 300 + (x - y) * 32;
      const isoY = (x, y, z) => 180 + (x + y) * 18 - z * 38;
      const scale = Math.min(1, 6/Math.max(roomW, roomL));

      const sX = (x, y) => 300 + (x - y) * 32 * scale;
      const sY = (x, y, z) => (140 + Math.max(0, 6-Math.max(roomW,roomL))*8) + (x + y) * 18 * scale - z * 38 * scale;

      // Plan view (top-down) projection
      const planScale = Math.min(460/roomW, 340/roomL);
      const planPad = 40;
      const pX = (x) => planPad + x * planScale;
      const pY = (y) => planPad + y * planScale;

      // Draw room walls as isometric
      const floorPts = `${sX(0,0,0)},${sY(0,0,0)} ${sX(roomW,0,0)},${sY(roomW,0,0)} ${sX(roomW,roomL,0)},${sY(roomW,roomL,0)} ${sX(0,roomL,0)},${sY(0,roomL,0)}`;
      const backWallPts = `${sX(0,0,0)},${sY(0,0,0)} ${sX(roomW,0,0)},${sY(roomW,0,0)} ${sX(roomW,0,roomH)},${sY(roomW,0,roomH)} ${sX(0,0,roomH)},${sY(0,0,roomH)}`;
      const leftWallPts = `${sX(0,0,0)},${sY(0,0,0)} ${sX(0,roomL,0)},${sY(0,roomL,0)} ${sX(0,roomL,roomH)},${sY(0,roomL,roomH)} ${sX(0,0,roomH)},${sY(0,0,roomH)}`;

      const rt = roomTypes.find(r=>r.id===roomType);

      if(step===1) {
        return (
          <div>
            <div style={{textAlign:"center",marginBottom:20}}>
              <h3 style={{fontSize:18,fontWeight:700,color:"#e2e8f0",marginBottom:4}}>Design Your Workspace</h3>
              <p style={{fontSize:12,color:"#64748b"}}>Select a room type to start placing AV equipment</p>
            </div>

            <div style={{display:"flex",gap:4,justifyContent:"center",marginBottom:20}}>
              <button onClick={()=>setUseFeet(false)} style={{padding:"5px 14px",borderRadius:5,fontSize:11,fontWeight:!useFeet?700:400,background:!useFeet?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.4)",border:"1px solid "+(!useFeet?"rgba(59,130,246,0.4)":"#1e293b"),color:!useFeet?"#60a5fa":"#64748b",cursor:"pointer"}}>Meters</button>
              <button onClick={()=>setUseFeet(true)} style={{padding:"5px 14px",borderRadius:5,fontSize:11,fontWeight:useFeet?700:400,background:useFeet?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.4)",border:"1px solid "+(useFeet?"rgba(59,130,246,0.4)":"#1e293b"),color:useFeet?"#60a5fa":"#64748b",cursor:"pointer"}}>Feet</button>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(3, 1fr)",gap:16,maxWidth:800,margin:"0 auto"}}>
              {roomTypes.slice(0,3).map(rt=>(
                <div key={rt.id} onClick={()=>selectRoom(rt)} style={{padding:20,background:"rgba(20,30,50,0.6)",borderRadius:14,border:"1px solid #1e293b",cursor:"pointer",transition:"all 0.25s",display:"flex",flexDirection:"column"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#3b82f6";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(59,130,246,0.1)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:2}}>{rt.name}</div>
                  <div style={{fontSize:11,color:"#60a5fa",fontWeight:600,marginBottom:12}}>{rt.people} people</div>
                  <svg viewBox="0 0 200 160" style={{width:"100%",height:150,marginBottom:12}}>
                    {(()=>{
                      const s = Math.min(1.4, 6.5/Math.max(rt.w,rt.l));
                      const sx=(x,y)=>100+(x-y)*10*s;
                      const sy=(x,y,z)=>65+(x+y)*6*s-z*16*s;
                      return (
                        <g>
                          <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(rt.w,0,0)},${sy(rt.w,0,0)} ${sx(rt.w,rt.l,0)},${sy(rt.w,rt.l,0)} ${sx(0,rt.l,0)},${sy(0,rt.l,0)}`} fill="#1a2744" stroke="#3b82f6" strokeWidth={0.8} opacity={0.6}/>
                          <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(rt.w,0,0)},${sy(rt.w,0,0)} ${sx(rt.w,0,rt.h)},${sy(rt.w,0,rt.h)} ${sx(0,0,rt.h)},${sy(0,0,rt.h)}`} fill="#121e36" stroke="#3b82f6" strokeWidth={0.8} opacity={0.5}/>
                          <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(0,rt.l,0)},${sy(0,rt.l,0)} ${sx(0,rt.l,rt.h)},${sy(0,rt.l,rt.h)} ${sx(0,0,rt.h)},${sy(0,0,rt.h)}`} fill="#0f1a2e" stroke="#3b82f6" strokeWidth={0.8} opacity={0.4}/>
                          {/* Table hint */}
                          {rt.w<=8 && <ellipse cx={sx(rt.w/2,rt.l/2,0)} cy={sy(rt.w/2,rt.l/2,0)} rx={Math.min(rt.w,2.5)*4*s} ry={Math.min(rt.l,1.5)*2.5*s} fill="#334155" opacity={0.3} stroke="#475569" strokeWidth={0.5}/>}
                          {/* Display on wall hint - isometric */}
                          <polygon points={`${sx(rt.w*0.2,0.05,rt.h*0.75)},${sy(rt.w*0.2,0.05,rt.h*0.75)} ${sx(rt.w*0.8,0.05,rt.h*0.75)},${sy(rt.w*0.8,0.05,rt.h*0.75)} ${sx(rt.w*0.8,0.05,rt.h*0.4)},${sy(rt.w*0.8,0.05,rt.h*0.4)} ${sx(rt.w*0.2,0.05,rt.h*0.4)},${sy(rt.w*0.2,0.05,rt.h*0.4)}`} fill="#3b82f6" opacity={0.12} stroke="#3b82f6" strokeWidth={0.6} strokeOpacity={0.4}/>
                        </g>
                      );
                    })()}
                  </svg>
                  <div style={{}}>
                    <div>
                      <div style={{fontSize:11,color:"#94a3b8",fontFamily:"'JetBrains Mono',monospace"}}>{toDisplay(rt.w)} × {toDisplay(rt.l)} × {toDisplay(rt.h)} {u}</div>
                      <div style={{fontSize:10,color:"#475569",marginTop:2}}>{rt.desc}</div>
                    </div>
                    
                  </div>
                </div>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:16,maxWidth:536,margin:"16px auto 0"}}>
              {roomTypes.slice(3,5).map(rt=>(
                <div key={rt.id} onClick={()=>selectRoom(rt)} style={{padding:20,background:"rgba(20,30,50,0.6)",borderRadius:14,border:"1px solid #1e293b",cursor:"pointer",transition:"all 0.25s",display:"flex",flexDirection:"column"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#3b82f6";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(59,130,246,0.1)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
                  <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:2}}>{rt.name}</div>
                  <div style={{fontSize:11,color:"#60a5fa",fontWeight:600,marginBottom:12}}>{rt.people} people</div>
                  <svg viewBox="0 0 200 160" style={{width:"100%",height:150,marginBottom:12}}>
                    {(()=>{
                      const s = Math.min(1.4, 6.5/Math.max(rt.w,rt.l));
                      const sx=(x,y)=>100+(x-y)*10*s;
                      const sy=(x,y,z)=>65+(x+y)*6*s-z*16*s;
                      return (
                        <g>
                          <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(rt.w,0,0)},${sy(rt.w,0,0)} ${sx(rt.w,rt.l,0)},${sy(rt.w,rt.l,0)} ${sx(0,rt.l,0)},${sy(0,rt.l,0)}`} fill="#1a2744" stroke="#3b82f6" strokeWidth={0.8} opacity={0.6}/>
                          <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(rt.w,0,0)},${sy(rt.w,0,0)} ${sx(rt.w,0,rt.h)},${sy(rt.w,0,rt.h)} ${sx(0,0,rt.h)},${sy(0,0,rt.h)}`} fill="#121e36" stroke="#3b82f6" strokeWidth={0.8} opacity={0.5}/>
                          <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(0,rt.l,0)},${sy(0,rt.l,0)} ${sx(0,rt.l,rt.h)},${sy(0,rt.l,rt.h)} ${sx(0,0,rt.h)},${sy(0,0,rt.h)}`} fill="#0f1a2e" stroke="#3b82f6" strokeWidth={0.8} opacity={0.4}/>
                          <ellipse cx={sx(rt.w/2,rt.l/2,0)} cy={sy(rt.w/2,rt.l/2,0)} rx={Math.min(rt.w,3)*3.5*s} ry={Math.min(rt.l,1.8)*2.5*s} fill="#334155" opacity={0.3} stroke="#475569" strokeWidth={0.5}/>
                          <polygon points={`${sx(rt.w*0.2,0.05,rt.h*0.75)},${sy(rt.w*0.2,0.05,rt.h*0.75)} ${sx(rt.w*0.8,0.05,rt.h*0.75)},${sy(rt.w*0.8,0.05,rt.h*0.75)} ${sx(rt.w*0.8,0.05,rt.h*0.4)},${sy(rt.w*0.8,0.05,rt.h*0.4)} ${sx(rt.w*0.2,0.05,rt.h*0.4)},${sy(rt.w*0.2,0.05,rt.h*0.4)}`} fill="#3b82f6" opacity={0.12} stroke="#3b82f6" strokeWidth={0.6} strokeOpacity={0.4}/>
                        </g>
                      );
                    })()}
                  </svg>
                  <div style={{}}>
                    <div>
                      <div style={{fontSize:11,color:"#94a3b8",fontFamily:"'JetBrains Mono',monospace"}}>{toDisplay(rt.w)} × {toDisplay(rt.l)} × {toDisplay(rt.h)} {u}</div>
                      <div style={{fontSize:10,color:"#475569",marginTop:2}}>{rt.desc}</div>
                    </div>
                    
                  </div>
                </div>
              ))}
            </div>
            {roomTypes.length > 5 && (
              <div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:16,maxWidth:536,margin:"16px auto 0"}}>
                {roomTypes.slice(5).map(rt=>(
                  <div key={rt.id} onClick={()=>selectRoom(rt)} style={{padding:20,background:"rgba(20,30,50,0.6)",borderRadius:14,border:"1px solid #1e293b",cursor:"pointer",transition:"all 0.25s",display:"flex",flexDirection:"column"}} onMouseEnter={e=>{e.currentTarget.style.borderColor="#3b82f6";e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.boxShadow="0 8px 24px rgba(59,130,246,0.1)";}} onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e293b";e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.boxShadow="none";}}>
                    <div style={{fontSize:16,fontWeight:700,color:"#e2e8f0",marginBottom:2}}>{rt.name}</div>
                    <div style={{fontSize:11,color:"#60a5fa",fontWeight:600,marginBottom:12}}>{rt.people} people</div>
                    <svg viewBox="0 0 200 160" style={{width:"100%",height:150,marginBottom:12}}>
                      {(()=>{
                        const s = Math.min(1.4, 6.5/Math.max(rt.w,rt.l));
                        const sx=(x,y)=>100+(x-y)*10*s;
                        const sy=(x,y,z)=>65+(x+y)*6*s-z*16*s;
                        return (
                          <g>
                            <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(rt.w,0,0)},${sy(rt.w,0,0)} ${sx(rt.w,rt.l,0)},${sy(rt.w,rt.l,0)} ${sx(0,rt.l,0)},${sy(0,rt.l,0)}`} fill="#1a2744" stroke="#3b82f6" strokeWidth={0.8} opacity={0.6}/>
                            <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(rt.w,0,0)},${sy(rt.w,0,0)} ${sx(rt.w,0,rt.h)},${sy(rt.w,0,rt.h)} ${sx(0,0,rt.h)},${sy(0,0,rt.h)}`} fill="#121e36" stroke="#3b82f6" strokeWidth={0.8} opacity={0.5}/>
                            <polygon points={`${sx(0,0,0)},${sy(0,0,0)} ${sx(0,rt.l,0)},${sy(0,rt.l,0)} ${sx(0,rt.l,rt.h)},${sy(0,rt.l,rt.h)} ${sx(0,0,rt.h)},${sy(0,0,rt.h)}`} fill="#0f1a2e" stroke="#3b82f6" strokeWidth={0.8} opacity={0.4}/>
                            {/* Table hint */}
                            <ellipse cx={sx(rt.w/2,rt.l/2,0)} cy={sy(rt.w/2,rt.l/2,0)} rx={Math.min(rt.w,3)*3*s} ry={Math.min(rt.l,1.5)*2*s} fill="#334155" opacity={0.3} stroke="#475569" strokeWidth={0.5}/>
                            {/* Display on wall hint - isometric */}
                            <polygon points={`${sx(rt.w*0.2,0.05,rt.h*0.75)},${sy(rt.w*0.2,0.05,rt.h*0.75)} ${sx(rt.w*0.8,0.05,rt.h*0.75)},${sy(rt.w*0.8,0.05,rt.h*0.75)} ${sx(rt.w*0.8,0.05,rt.h*0.4)},${sy(rt.w*0.8,0.05,rt.h*0.4)} ${sx(rt.w*0.2,0.05,rt.h*0.4)},${sy(rt.w*0.2,0.05,rt.h*0.4)}`} fill="#3b82f6" opacity={0.12} stroke="#3b82f6" strokeWidth={0.6} strokeOpacity={0.4}/>
                          </g>
                        );
                      })()}
                    </svg>
                    <div style={{}}>
                      <div>
                        <div style={{fontSize:11,color:"#94a3b8",fontFamily:"'JetBrains Mono',monospace"}}>{toDisplay(rt.w)} × {toDisplay(rt.l)} × {toDisplay(rt.h)} {u}</div>
                        <div style={{fontSize:10,color:"#475569",marginTop:2}}>{rt.desc}</div>
                      </div>
                      
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      return (
        <div style={{display:"flex",gap:0,margin:"-20px -24px",height:"calc(100vh - 136px)",overflow:"hidden"}}>
          {/* Left: Device Catalog */}
          <div style={{width:220,background:"#080d17",borderRight:"1px solid #1e293b",display:"flex",flexDirection:"column",overflow:"hidden",flexShrink:0}}>
            <div style={{padding:"10px 12px",borderBottom:"1px solid #1e293b"}}>
              <div style={{fontSize:12,fontWeight:600,color:"#e2e8f0",marginBottom:4}}>{rt?.name}</div>
              <div style={{fontSize:10,color:"#64748b"}}>{toDisplay(roomW)} × {toDisplay(roomL)} × {toDisplay(roomH)} {u}</div>
              <button onClick={()=>{setStep(1);setPlacedDevices([]);}} style={{marginTop:6,width:"100%",padding:"4px",background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.2)",borderRadius:4,color:"#60a5fa",fontSize:9,cursor:"pointer"}}>Change Room Type</button>
            </div>

            {/* Scrollable sidebar content */}
            <div style={{flex:1,overflowY:"auto",overflowX:"hidden",minHeight:0}}>

            {/* Room dimensions */}
            <div style={{padding:"8px 12px",borderBottom:"1px solid #1e293b"}}>
              <div style={{fontSize:9,fontWeight:600,color:"#64748b",textTransform:"uppercase",marginBottom:6}}>Room Size</div>
              {[{label:"Width",val:roomW,set:setRoomW,min:2,max:20},{label:"Length",val:roomL,set:setRoomL,min:2,max:25},{label:"Height",val:roomH,set:setRoomH,min:2,max:5}].map(d=>(
                <div key={d.label} style={{marginBottom:6}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94a3b8",marginBottom:2}}>
                    <span>{d.label}</span><span style={{fontFamily:"'JetBrains Mono',monospace",color:"#e2e8f0"}}>{toDisplay(d.val)} {u}</span>
                  </div>
                  <input type="range" min={d.min} max={d.max} step={0.1} value={d.val} onChange={e=>d.set(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#3b82f6",height:4}} />
                </div>
              ))}
            </div>

            {/* Table Layout */}
            <div style={{padding:"8px 12px",borderBottom:"1px solid #1e293b"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:9,fontWeight:600,color:"#64748b",textTransform:"uppercase"}}>Table Layout</div>
                <button onClick={()=>setShowTable(!showTable)} style={{padding:"2px 8px",borderRadius:4,fontSize:8,background:showTable?"rgba(34,197,94,0.12)":"rgba(239,68,68,0.08)",border:"1px solid "+(showTable?"rgba(34,197,94,0.3)":"rgba(239,68,68,0.2)"),color:showTable?"#22c55e":"#f87171",cursor:"pointer"}}>{showTable?"On":"Off"}</button>
              </div>
              {showTable && (
                <div>
                  {/* Table shape */}
                  <div style={{fontSize:8,color:"#64748b",marginBottom:4,fontWeight:600}}>Shape</div>
                  <div style={{display:"flex",gap:4,marginBottom:8}}>
                    {[{id:"rectangular",label:"Rect",icon:"\u25AD"},{id:"tapered",label:"Taper",icon:"\u2B21"},{id:"round",label:"Round",icon:"\u25CB"}].map(s=>(
                      <button key={s.id} onClick={()=>setTableShape(s.id)} style={{flex:1,padding:"6px 2px",borderRadius:5,fontSize:9,fontWeight:tableShape===s.id?700:400,background:tableShape===s.id?"rgba(59,130,246,0.15)":"rgba(15,23,42,0.4)",border:"1px solid "+(tableShape===s.id?"rgba(59,130,246,0.4)":"#1e293b"),color:tableShape===s.id?"#60a5fa":"#64748b",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                        <span style={{fontSize:14}}>{s.icon}</span>{s.label}
                      </button>
                    ))}
                  </div>
                  {/* Seats */}
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94a3b8",marginBottom:2}}>
                      <span>Seats</span><span style={{fontFamily:"'JetBrains Mono',monospace",color:"#e2e8f0"}}>{tableSeats}</span>
                    </div>
                    <input type="range" min={2} max={24} step={1} value={tableSeats} onChange={e=>setTableSeats(parseInt(e.target.value))} style={{width:"100%",accentColor:"#22c55e",height:4}} />
                  </div>
                  {/* Table width */}
                  <div style={{marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94a3b8",marginBottom:2}}>
                      <span>Table Width</span><span style={{fontFamily:"'JetBrains Mono',monospace",color:"#e2e8f0"}}>{toDisplay(tableWidth)} {u}</span>
                    </div>
                    <input type="range" min={0.4} max={2.5} step={0.05} value={tableWidth} onChange={e=>setTableWidth(parseFloat(e.target.value))} style={{width:"100%",accentColor:"#22c55e",height:4}} />
                  </div>
                  {/* Distance to wall */}
                  <div style={{marginBottom:4}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"#94a3b8",marginBottom:2}}>
